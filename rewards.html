<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOSS CASE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #0F0F1E; color: white; overflow: hidden; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* Рулетка */
        .roulette-wrapper { position: relative; width: 100%; max-width: 400px; height: 120px; overflow: hidden; border: 2px solid #00D1FF; border-radius: 20px; background: #1A1A2E; box-shadow: 0 0 30px rgba(0, 209, 255, 0.2); }
        .roulette-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 4px; background: #FF4757; z-index: 10; transform: translateX(-50%); box-shadow: 0 0 15px #FF4757; }
        .item-list { display: flex; position: absolute; left: 0; top: 0; height: 100%; transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1); }
        .reward-item { min-width: 100px; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; border-right: 1px solid rgba(255,255,255,0.05); background: linear-gradient(180deg, #1A1A2E, #16213e); }
        .reward-item img { width: 50px; height: 50px; margin-bottom: 5px; }
        .reward-item span { font-size: 10px; font-weight: 900; text-transform: uppercase; }

        .btn-open { margin-top: 40px; padding: 20px 60px; background: linear-gradient(90deg, #00D1FF, #0077FF); border-radius: 20px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; box-shadow: 0 10px 20px rgba(0, 119, 255, 0.3); transition: 0.3s; }
        .btn-open:disabled { opacity: 0.3; filter: grayscale(1); }

        .win-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(10px); }
        .win-card { text-align: center; animation: pop 0.5s cubic-bezier(0.17, 0.89, 0.32, 1.27); }
        @keyframes pop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
      <h1 class="text-2xl font-black italic mb-2">BOSS <span class="text-sky-400">CASE</span></h1>
    <p class="text-[10px] opacity-40 uppercase font-black tracking-widest mb-10">Твой ежедневный бонус</p>

    <div class="roulette-wrapper">
        <div class="roulette-line"></div>
        <div id="item-list" class="item-list"></div>
    </div>

    <button id="spin-btn" onclick="spin()" class="btn-open">Открыть кейс</button>
    <p id="timer" class="mt-4 text-[10px] font-black opacity-30 uppercase"></p>

    <!-- Модалка выигрыша -->
    <div id="win-modal" class="win-modal">
        <div class="win-card">
            <div class="text-6xl mb-4">🎁</div>
            <h2 class="text-3xl font-black mb-2 uppercase">Твой приз!</h2>
            <p id="win-name" class="text-xl font-bold text-sky-400 mb-8 uppercase"></p>
            <button onclick="location.reload()" class="px-10 py-4 bg-white text-black font-black rounded-xl uppercase text-xs">Забрать</button>
        </div>
    </div>

    <script>
        const rewards = [
            { name: '10 ₽', img: '💰', chance: 40, value: 10 },
            { name: '50 ₽', img: '💵', chance: 20, value: 50 },
            { name: 'Скидка 10%', img: '🎟️', chance: 20, value: 'sale10' },
            { name: 'Статус VIP', img: '👑', chance: 10, value: 'vip' },
            { name: '100 ₽', img: '💎', chance: 10, value: 100 }
        ];

        const list = document.getElementById('item-list');
        let fullList = [];

        // Генерируем ленту (80 предметов для эффекта долгой прокрутки)
        function initRoulette() {
            for(let i=0; i<80; i++) {
                const rand = rewards[Math.floor(Math.random() * rewards.length)];
                fullList.push(rand);
                const div = document.createElement('div');
                div.className = 'reward-item';
                div.innerHTML = `<span class="text-2xl">${rand.img}</span><span>${rand.name}</span>`;
                list.appendChild(div);
            }
        }

        async function spin() {
            const btn = document.getElementById('spin-btn');
            btn.disabled = true;

            // Выбираем победный предмет (например, 70-й в списке)
            const winIndex = 70;
            const itemWidth = 101; // ширина предмета + граница
            const offset = (winIndex * itemWidth) - (200 - itemWidth/2); // Центрируем

            list.style.transform = `translateX(-${offset}px)`;

            setTimeout(() => {
                const prize = fullList[winIndex];
                document.getElementById('win-name').innerText = prize.name;
                document.getElementById('win-modal').style.display = 'flex';
                
                // Тут завтра добавим сохранение приза в Supabase
            }, 5500);
        }

        initRoulette();
    </script>
</body>
</html>
