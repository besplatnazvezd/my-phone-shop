<!-- Сохрани как leaderboard.html -->
<div class="glass p-6 animate-fade-in">
    <div class="flex gap-2 mb-6 bg-black/20 p-1 rounded-xl">
        <button onclick="loadTop('spent')" id="btn-spent" class="flex-1 py-2 rounded-lg text-[10px] font-black uppercase bg-sky-500">Траты</button>
        <button onclick="loadTop('refs')" id="btn-refs" class="flex-1 py-2 rounded-lg text-[10px] font-black uppercase">Рефералы</button>
    </div>
    
    <div id="leader-list" class="flex flex-col gap-3">
        <!-- Сюда подгрузим топ 10 из базы -->
    </div>
</div>

<script>
async function loadTop(type) {
    const list = document.getElementById('leader-list');
    list.innerHTML = '<p class="text-center opacity-30 text-[10px]">ЗАГРУЗКА ТОПА...</p>';
    
    // Переключаем кнопки
    document.getElementById('btn-spent').classList.toggle('bg-sky-500', type==='spent');
    document.getElementById('btn-refs').classList.toggle('bg-sky-500', type==='refs');

    let query = type === 'spent' 
        ? sb.from('profiles').select('first_name, total_spent').order('total_spent', {ascending: false}).limit(10)
        : sb.from('profiles').select('first_name, id').limit(100); // Для рефов логика сложнее, завтра допишем

    const { data } = await query;
    
    list.innerHTML = data.map((u, i) => `
        <div class="flex justify-between items-center p-4 bg-white/5 rounded-2xl border border-white/5">
            <div class="flex items-center gap-3">
                <span class="text-lg">${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : i+1}</span>
                <span class="text-[11px] font-black uppercase">${u.first_name}</span>
            </div>
            <span class="text-sky-400 font-black text-xs">${type === 'spent' ? u.total_spent + ' ₽' : 'БОСС'}</span>
        </div>
    `).join('');
}
loadTop('spent');
</script>
