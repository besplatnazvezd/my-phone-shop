<div class="px-6 pb-20">
    <h2 class="text-xl font-black italic uppercase mb-6">Корзина</h2>
    <div id="cart-items" class="flex flex-col gap-4 mb-8">
        <!-- Товары из корзины -->
    </div>
    
    <div class="glass p-6 sticky bottom-0">
        <div class="flex justify-between items-center mb-6">
            <span class="text-xs font-bold opacity-50 uppercase">Итого к оплате:</span>
            <span id="cart-total" class="text-2xl font-black text-sky-400">0.00 ₽</span>
        </div>
        <button onclick="startCheckout()" class="w-full py-5 bg-sky-500 text-white rounded-2xl font-black uppercase text-sm shadow-xl shadow-sky-500/20">Перейти к оформлению</button>
    </div>
</div>

<script>
let cart = JSON.parse(localStorage.getItem('boss_cart') || '[]');

function renderCart() {
    const cont = document.getElementById('cart-items');
    if(cart.length === 0) {
        cont.innerHTML = '<div class="text-center py-20 opacity-20 font-black uppercase">Тут пока пусто, Босс</div>';
        return;
    }
    
    cont.innerHTML = cart.map((item, index) => `
        <div class="glass p-4 flex gap-4 items-center">
            <img src="${item.img}" class="w-16 h-16 rounded-xl object-cover">
            <div class="flex-1">
                <p class="text-[11px] font-black uppercase mb-1">${item.name}</p>
                <p class="text-sky-400 font-black text-xs">${item.price} ₽</p>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="updateQty(${index}, -1)" class="w-8 h-8 glass flex items-center justify-center font-black">-</button>
                <span class="font-black text-sm">${item.qty}</span>
                <button onclick="updateQty(${index}, 1)" class="w-8 h-8 glass flex items-center justify-center font-black">+</button>
            </div>
        </div>
    `).join('');
    
    const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
    document.getElementById('cart-total').innerText = total.toFixed(2) + ' ₽';
}

function updateQty(i, delta) {
    cart[i].qty += delta;
    if(cart[i].qty <= 0) cart.splice(i, 1);
    localStorage.setItem('boss_cart', JSON.stringify(cart));
    renderCart();
}
renderCart();
</script>
