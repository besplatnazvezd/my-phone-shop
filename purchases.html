<!-- Сохрани как purchases.html -->
<div class="px-6">
    <h2 class="text-xl font-black italic uppercase mb-6">Мои покупки</h2>
    <div id="orders-list" class="flex flex-col gap-4">
        <!-- Подгрузим из таблицы orders -->
    </div>
</div>

<script>
async function loadOrders() {
    const { data } = await sb.from('orders').select('*').eq('user_id', user.id).order('created_at', {ascending: false});
    const list = document.getElementById('orders-list');
    
    if(!data || data.length === 0) {
        list.innerHTML = '<p class="text-center opacity-20 py-10 uppercase font-black">Заказов пока нет</p>';
        return;
    }

    list.innerHTML = data.map(o => `
        <div class="glass p-5 border-l-4 ${o.status==='Выполнено'?'border-green-500':'border-sky-500'}">
            <div class="flex justify-between items-start mb-2">
                <p class="text-[11px] font-black uppercase">${o.product_name}</p>
                <span class="text-[9px] px-2 py-1 bg-white/5 rounded-md opacity-50 uppercase">${o.status}</span>
            </div>
            <p class="text-sky-400 font-black text-xs">${o.amount} ₽</p>
            <p class="text-[8px] opacity-30 mt-3 uppercase font-bold">${new Date(o.created_at).toLocaleDateString()}</p>
        </div>
    `).join('');
}
loadOrders();
</script>
