<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOSS STORE - ТЕБЕ ПОДАРОК!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Montserrat', sans-serif; overflow: hidden; }
        .gift-box { position: relative; width: 150px; height: 120px; background: #E63946; margin: 0 auto; border-radius: 8px; cursor: pointer; transition: transform 0.3s; }
        .gift-box:active { transform: scale(0.9); }
        .ribbon-v { position: absolute; left: 65px; width: 20px; height: 100%; background: #457B9D; z-index: 2; }
        .ribbon-h { position: absolute; top: 50px; width: 100%; height: 20px; background: #457B9D; z-index: 2; }
        .lid { position: absolute; top: -15px; left: -5px; width: 160px; height: 30px; background: #f12c3b; border-radius: 5px; z-index: 3; transition: 0.5s; }
        .open .lid { transform: translateY(-80px) rotate(20deg); opacity: 0; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.08); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div id="gift-screen" class="text-center">
        <div id="instruction" class="mb-10 animate-bounce text-yellow-500 font-black italic uppercase">Нажми на коробку!</div>
        
        <div class="gift-box" onclick="openGift()">
            <div class="lid"></div>
            <div class="ribbon-v"></div>
            <div class="ribbon-h"></div>
        </div>

        <div id="content" class="hidden mt-10">
            <div class="glass p-8 rounded-[40px] border-yellow-500/30">
                <h1 class="text-3xl font-black text-yellow-500 italic uppercase mb-2">Сюрприз!</h1>
                <p class="text-gray-400 text-xs mb-4">Тебе подарили:</p>
                <div id="item-name" class="text-xl font-bold mb-6 text-white uppercase">...</div>
                
                <div class="text-[10px] text-gray-400 mb-6 leading-relaxed">
                    Чтобы забрать товар, напишите админу <br>
                    <a href="https://t.me/nmproda" class="text-yellow-500 font-bold text-sm">@nmproda</a> <br>
                                        или оставьте свой юзернейм ниже:
                </div>

                <input type="text" id="user-nick" placeholder="@твой_ник" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-center mb-4 text-white">
                
                <button onclick="sendToAdmin()" class="w-full py-4 bg-yellow-500 text-black rounded-2xl font-black uppercase text-xs">Получить товар</button>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const item = urlParams.get('item') || "Цифровой товар";
        document.getElementById('item-name').innerText = item;

        function openGift() {
            document.querySelector('.gift-box').classList.add('open');
            document.getElementById('instruction').classList.add('hidden');
            
            // Салют
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#EAB308', '#ffffff', '#457B9D'] });
            
            // Ракеты (боковые салюты)
            var end = Date.now() + (3 * 1000);
            (function frame() {
                confetti({ particleCount: 2, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#EAB308'] });
                confetti({ particleCount: 2, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#ffffff'] });
                if (Date.now() < end) { requestAnimationFrame(frame); }
            }());

            setTimeout(() => {
                document.getElementById('content').classList.remove('hidden');
                document.getElementById('content').classList.add('animate-fade-in');
            }, 600);
        }

        function sendToAdmin() {
            const nick = document.getElementById('user-nick').value;
            if(!nick) return alert("Введите ваш @username");
            alert("Данные отправлены! Админ @nmproda свяжется с вами.");
            window.location.href = "https://t.me/nmproda";
        }
    </script>
</body>
</html>
