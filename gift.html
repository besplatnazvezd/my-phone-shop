<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOSS STORE - ГРАНДИОЗНЫЙ СЮРПРИЗ!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Montserrat', sans-serif; overflow: hidden; }
        
        /* Анимация дрожания коробки перед открытием */
        @keyframes shake {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(5deg); }
            50% { transform: rotate(0deg); }
            75% { transform: rotate(-5deg); }
            100% { transform: rotate(0deg); }
        }
        
        .gift-box { 
            position: relative; width: 150px; height: 120px; 
            background: linear-gradient(45deg, #E63946, #b01e28); 
            margin: 0 auto; border-radius: 8px; cursor: pointer; 
            box-shadow: 0 0 50px rgba(230, 57, 70, 0.5);
            animation: shake 0.5s infinite;
        }

        .gift-box:hover { animation: none; transform: scale(1.1); }
        .open .gift-box { animation: none; transform: scale(0); transition: 0.5s; }

        .ribbon-v { position: absolute; left: 65px; width: 20px; height: 100%; background: #EAB308; z-index: 2; box-shadow: inset 0 0 10px rgba(0,0,0,0.2); }
        .ribbon-h { position: absolute; top: 50px; width: 100%; height: 20px; background: #EAB308; z-index: 2; box-shadow: inset 0 0 10px rgba(0,0,0,0.2); }
        .lid { position: absolute; top: -15px; left: -5px; width: 160px; height: 30px; background: #f12c3b; border-radius: 5px; z-index: 3; transition: 0.8s cubic-bezier(0.22, 1, 0.36, 1); }
        
        .open .lid { transform: translateY(-200px) rotate(45deg); opacity: 0; }
        
        .glass { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(30px); 
            border: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 0 80px rgba(234, 179, 8, 0.1);
        }

        @keyframes grandEntrance {
            0% { opacity: 0; transform: scale(0.5) translateY(100px); filter: blur(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
                    }
        .animate-grand { animation: grandEntrance 1s cubic-bezier(0.17, 0.67, 0.83, 0.67) forwards; }

        /* Сияние вокруг текста */
        .glow-text { text-shadow: 0 0 20px rgba(234, 179, 8, 0.8); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div id="gift-screen" class="text-center">
        <div id="instruction" class="mb-10 text-yellow-500 font-black italic uppercase tracking-widest text-xl">
            Для тебя сюрприз...<br>Нажми на коробку!
        </div>
        
        <div id="box-container" class="relative" onclick="openGift()">
            <div class="gift-box">
                <div class="lid"></div>
                <div class="ribbon-v"></div>
                <div class="ribbon-h"></div>
            </div>
        </div>

        <div id="content" class="hidden mt-10">
            <div class="glass p-10 rounded-[50px] relative overflow-hidden">
                <h1 class="text-4xl font-black text-yellow-500 italic uppercase mb-2 glow-text">Поздравляем!</h1>
                <p class="text-gray-400 text-sm mb-6 uppercase tracking-[5px]">Эксклюзивный подарок:</p>
                
                <div id="item-name" class="text-3xl font-black mb-8 text-white uppercase tracking-tighter leading-none">...</div>
                
                <div class="text-[12px] text-gray-400 mb-8 leading-relaxed font-medium">
                    <span class="text-white">Чтобы забрать товар:</span><br>
                    Нажмите кнопку ниже, введите ник и отправьте <br>автоматическое сообщение админу.
                </div>

                <input type="text" id="user-nick" placeholder="@твой_ник" class="w-full bg-white/10 border-2 border-yellow-500/20 p-5 rounded-3xl text-center mb-6 text-white text-lg font-bold outline-none focus:border-yellow-500 transition-all shadow-inner" spellcheck="false">

                <button onclick="sendToAdmin()" class="w-full py-5 bg-yellow-500 text-black rounded-[25px] font-black uppercase text-sm tracking-widest shadow-[0_10px_40px_rgba(234,179,8,0.4)] active:scale-95 transition-all">
                    Забрать подарок сейчас
                </button>
            </div>
        </div>
    </div>

    <script>
                const urlParams = new URLSearchParams(window.location.search);
        const item = urlParams.get('item') || "VIP ТОВАР";
        const sender = urlParams.get('from') || "Анонимный благодетель";
        
        document.getElementById('item-name').innerText = item;

        function openGift() {
            const container = document.getElementById('box-container');
            container.classList.add('open');
            document.getElementById('instruction').style.display = 'none';

            // --- ГРАНДИОЗНЫЙ НЕВООБРАЗИМЫЙ САЛЮТ ---
            
            // 1. Мощный стартовый взрыв из центра
            confetti({
                particleCount: 400,
                spread: 100,
                origin: { y: 0.6 },
                colors: ['#FFD700', '#ffffff', '#E63946', '#457B9D'],
                shapes: ['star'],
                scalar: 1.2
            });

            // 2. Запуск боковых пушек (Шоу на 8 секунд)
            var duration = 8 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 45, spread: 360, ticks: 100, zIndex: 0 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                var particleCount = 80 * (timeLeft / duration);
                
                // Левая пушка
                confetti(Object.assign({}, defaults, { 
                    particleCount, 
                    origin: { x: 0, y: 0.8 },
                    angle: 60,
                    colors: ['#EAB308', '#ffffff']
                }));
                // Правая пушка
                confetti(Object.assign({}, defaults, { 
                    particleCount, 
                    origin: { x: 1, y: 0.8 },
                    angle: 120,
                    colors: ['#EAB308', '#E63946']
                }));
                
                // Случайные взрывы в небе (Firework style)
                if (Math.random() > 0.7) {
                    confetti({
                        particleCount: 50,
                        startVelocity: 30,
                        spread: 360,
                        origin: { x: randomInRange(0.2, 0.8), y: randomInRange(0.2, 0.5) },
                        colors: ['#00ff00', '#ff00ff', '#ffff00'],
                        shapes: ['circle']
                    });
                }
            }, 200);

            // 3. Золотой дождь сверху
            setTimeout(() => {
                var end = Date.now() + 5000;
                (function frame() {
                    confetti({
                        particleCount: 2,
                        angle: -90,
                        startVelocity: 0,
                        spread: 180,
                        origin: { x: Math.random(), y: 0 },
                        colors: ['#FFD700']
                    });
                    if (Date.now() < end) {
                        requestAnimationFrame(frame);
                    }
                }());
            }, 1000);

            // Плавное появление контента
            setTimeout(() => {
                container.style.display = 'none';
                const content = document.getElementById('content');
                content.classList.remove('hidden');
                content.classList.add('animate-grand');
            }, 800);
        }

        function sendToAdmin() {
            const recipientNick = document.getElementById('user-nick').value;
            if(!recipientNick) {
                alert("Введите ваш ник, чтобы мы знали, кому выдавать!");
                return;
            }

            // Формируем текст сообщения
            const message = `Привет! Получил подарок "${item}" от клиента ${sender}. Мой ник: ${recipientNick}. Выдай заказ! Спасибо!`;
            
            const telegramUrl = `https://t.me/nmproda?text=${encodeURIComponent(message)}`;
            
            // Красивое уведомление перед уходом
            alert("Поздравляем! Сейчас вы перейдете в чат к админу nmproda. Просто отправьте ему готовое сообщение.");
            window.location.href = telegramUrl;
        }
    </script>
</body>
</html>
