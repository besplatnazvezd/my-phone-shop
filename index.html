<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOSS NEURAL 2100</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Manrope:wght@300;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-magenta: #bc13fe;
            --neon-emerald: #00ff9d;
            --bg-deep: #02040a;
        }

        body {
            font-family: 'Manrope', sans-serif;
            background-color: var(--bg-deep);
            color: #fff;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* АНИМИРОВАННАЯ ПЛАЗМА НА ФОНЕ */
        .plasma-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1a1e2e 0%, #02040a 100%);
        }
        .plasma-bg::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at center, var(--neon-magenta) 0%, transparent 40%),
                        radial-gradient(circle at 80% 20%, var(--neon-cyan) 0%, transparent 30%);
            opacity: 0.12;
            animation: rotate 25s linear infinite;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .grid-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            mask-image: radial-gradient(circle, black, transparent 85%);
        }

        .neon-text { text-shadow: 0 0 12px var(--neon-cyan); font-family: 'Orbitron', sans-serif; }
                .neon-border { border: 1px solid rgba(0, 242, 255, 0.3); box-shadow: 0 0 20px rgba(0, 242, 255, 0.1); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.08); }
        
        .cat-btn.active {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 25px var(--neon-cyan);
            border-color: var(--neon-cyan);
            font-weight: 900;
        }

        .holo-card {
            background: rgba(0, 242, 255, 0.05);
            border: 1px solid var(--neon-cyan);
            transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .holo-card.flipped { transform: rotateY(180deg) scale(1.1); background: var(--neon-cyan); color: #000; }

        .page { display: none; animation: slideUp 0.6s ease-out forwards; }
        .page.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        .scanline {
            width: 100%; height: 2px; background: rgba(0, 242, 255, 0.2);
            position: absolute; animation: scan 3s linear infinite; z-index: 10;
        }
        @keyframes scan { from { top: -10%; } to { top: 110%; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div class="plasma-bg"></div>
    <div class="grid-overlay"></div>

    <!-- HEADER -->
    <header class="p-6 sticky top-0 z-50 glass border-b border-white/5">
        <div class="flex justify-between items-center mb-6">
            <div>
                <p class="text-[8px] font-black text-cyan-400 uppercase tracking-[0.5em] mb-1">Quantum Network</p>
                <h1 id="user-name" class="text-2xl font-black italic neon-text tracking-tighter uppercase">NEO-BOSS</h1>
            </div>
            <div class="glass px-4 py-2 rounded-2xl border-cyan-500/30 flex items-center gap-3">
                <div class="w-2 h-2 rounded-full bg-cyan-400 animate-pulse shadow-[0_0_10px_#00f2ff]"></div>
                <span id="user-balance" class="font-bold text-[10px] tracking-widest uppercase">0 CRD</span>
            </div>
        </div>

        <div class="relative">
            <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-cyan-500/50 w-4 h-4"></i>
            <input type="text" id="search" placeholder="SCANNING DATABASE..." class="w-full bg-black/40 border border-white/10 pl-12 pr-4 py-4 rounded-2xl outline-none focus:border-cyan-500 text-[10px] tracking-widest font-bold">
        </div>

        <div id="categories-scroll" class="flex gap-3 overflow-x-auto no-scrollbar py-4"></div>
    </header>

    <main class="px-6 pb-32">
        <!-- КАТАЛОГ -->
        <section id="page-home" class="page active">
            <div id="catalog" class="grid grid-cols-1 gap-4 mt-4">
                <div class="h-28 glass rounded-[30px] animate-pulse"></div>
                <div class="h-28 glass rounded-[30px] animate-pulse"></div>
            </div>
            <div id="load-error" class="hidden text-center py-10">
                <p class="text-rose-500 font-bold mb-4 uppercase text-xs">Signal Lost</p>
                <button onclick="loadCatalog()" class="px-6 py-3 bg-cyan-500 text-black font-black rounded-xl text-[10px] uppercase">Retry Connection</button>
            </div>
        </section>

        <!-- МИНИ-ИГРА -->
        <section id="page-game" class="page text-center">
            <div class="py-10">
                <h2 class="text-3xl font-black italic neon-text mb-2 uppercase">Neural Hack</h2>
                <p class="text-cyan-500/60 text-[9px] uppercase tracking-widest mb-10">Identify correct node for 3% discount</p>
                <div class="flex justify-center gap-4">
                    <div class="holo-card w-24 h-32 rounded-2xl flex items-center justify-center cursor-pointer relative overflow-hidden" onclick="playGame(this, 0)">
                        <div class="scanline"></div><i data-lucide="fingerprint" class="w-8 h-8 text-cyan-500"></i>
                    </div>
                    <div class="holo-card w-24 h-32 rounded-2xl flex items-center justify-center cursor-pointer relative overflow-hidden" onclick="playGame(this, 1)">
                        <div class="scanline"></div><i data-lucide="fingerprint" class="w-8 h-8 text-cyan-500"></i>
                    </div>
                    <div class="holo-card w-24 h-32 rounded-2xl flex items-center justify-center cursor-pointer relative overflow-hidden" onclick="playGame(this, 2)">
                        <div class="scanline"></div><i data-lucide="fingerprint" class="w-8 h-8 text-cyan-500"></i>
                    </div>
                </div>
                <p id="game-status" class="mt-8 text-[10px] font-black uppercase tracking-[0.3em] h-4"></p>
            </div>
        </section>

        <!-- КОРЗИНА -->
        <section id="page-cart" class="page">
            <h2 class="text-3xl font-black neon-text mb-8 uppercase italic">Cargo Bay</h2>
            <div id="cart-list" class="space-y-4"></div>
            <div id="cart-empty" class="text-center py-20 text-cyan-900 font-bold uppercase tracking-widest">Empty Signal...</div>
            <div id="cart-checkout" class="mt-10 hidden">
                <div class="glass p-8 rounded-[40px] border border-cyan-500/20">
                    <div class="flex justify-between items-end mb-8">
                        <span class="text-[10px] font-bold text-cyan-500 uppercase tracking-widest">Total Energy</span>
                        <div class="text-right">
                            <span id="cart-total-old" class="text-xs text-rose-500/50 line-through mr-2 hidden"></span>
                            <span id="cart-total" class="text-4xl font-black text-white italic">0 CRD</span>
                        </div>
                    </div>
                    <input type="text" id="order-data" placeholder="ENTER NEURAL ID..." class="w-full bg-black/60 border border-cyan-500/30 p-5 rounded-2xl mb-6 outline-none focus:border-cyan-500 text-cyan-400 font-bold text-xs tracking-widest uppercase">
                    <button onclick="startCheckout()" id="btn-pay" class="w-full bg-white text-black py-5 rounded-2xl font-black text-lg uppercase tracking-widest">Authorize Transfer</button>
                </div>
            </div>
        </section>
    </main>

    <!-- МОДАЛКА ТОВАРА -->
    <div id="modal" class="fixed inset-0 z-[100] bg-black/95 backdrop-blur-xl hidden flex items-center justify-center p-6">
        <div class="w-full glass rounded-[40px] p-8 border border-cyan-400/30">
            <div class="flex flex-col items-center text-center">
                <img id="modal-img" class="w-32 h-32 rounded-3xl object-cover mb-6 neon-border">
                <h2 id="modal-title" class="text-2xl font-black neon-text mb-2 italic uppercase"></h2>
                <div class="flex items-center gap-3 mb-6">
                    <span id="modal-price-old" class="text-sm text-rose-500 line-through hidden"></span>
                    <span id="modal-price" class="text-2xl font-bold text-cyan-400 uppercase"></span>
                </div>
                <div class="w-full bg-white/5 p-4 rounded-2xl mb-8 max-h-32 overflow-y-auto no-scrollbar">
                    <pid="modal-desc" class="text-slate-400 text-[11px] leading-relaxed"></p>
                </div>
                <div class="flex gap-3 w-full">
                    <button onclick="closeModal()" class="flex-1 py-4 text-[10px] font-bold text-slate-500 uppercase">Abort</button>
                    <button onclick="addToCart()" class="flex-[2] bg-cyan-500 text-black py-4 rounded-xl font-black text-[10px] uppercase">Link to Bay</button>
                </div>
            </div>
        </div>
    </div>

    <!-- УСПЕХ -->
    <div id="success-screen" class="fixed inset-0 z-[200] bg-black hidden flex flex-col items-center justify-center p-10">
        <div class="w-24 h-24 border-4 border-cyan-500 rounded-full flex items-center justify-center animate-pulse">
            <i data-lucide="shield-check" class="w-12 h-12 text-cyan-400"></i>
        </div>
        <h2 class="mt-8 text-xl font-black neon-text uppercase">Authorized</h2>
    </div>

    <!-- NAV -->
    <nav class="fixed bottom-8 left-10 right-10 z-50">
        <div class="glass rounded-[30px] p-2 flex justify-around items-center border border-white/10">
            <button onclick="switchPage('home')" id="nav-home" class="p-4 text-cyan-400"><i data-lucide="layout-grid"></i></button>
            <button onclick="switchPage('game')" id="nav-game" class="p-4 text-slate-500"><i data-lucide="cpu"></i></button>
            <button onclick="switchPage('cart')" id="nav-cart" class="p-4 text-slate-500 relative">
                <i data-lucide="shopping-cart"></i>
                <span id="cart-badge" class="absolute top-3 right-3 w-2 h-2 bg-rose-500 rounded-full hidden"></span>
            </button>
        </div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const CSV_URL = 'https://docs.google.com/spreadsheets/d/1q9vPlWM9t934ACzIwbZU4_EDtvpJdfO09-jodyIi9Ew/export?format=csv'; // ВСТАВЬ СВОЮ ССЫЛКУ СЮДА
        const ADMIN_ID = "7727345054";

        let state = {
            items: [], cart: [], categories: ['Все'], activeCat: 'Все', selected: null,
            discount: parseFloat(localStorage.getItem('boss_discount')) || 1.0,
            gamePlayed: localStorage.getItem('boss_game_played') === 'true'
        };

        window.onload = async () => {
            lucide.createIcons();
            document.getElementById('user-name').innerText = (tg.initDataUnsafe.user?.first_name || 'NEO-BOSS').toUpperCase();
            await loadCatalog();
        };

        async function loadCatalog() {
            const container = document.getElementById('catalog');
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                const rows = text.split(/\r?\n/).slice(1);
                state.items = rows.map(row => {
                    const c = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    return {
                        cat: c[0]?.replace(/"/g, '').trim(),
                        name: c[1]?.replace(/"/g, '').trim(),
                        price: parseFloat(c[2]),
                        desc: c[3]?.replace(/"/g, '').trim(),
                        img: c[4]?.replace(/"/g, '').trim()
                    };
                }).filter(it => it.name && !isNaN(it.price));

                state.categories = ['Все', ...new Set(state.items.map(i => i.cat))];
                document.getElementById('load-error').classList.add('hidden');
                renderCategories();
                renderCatalog(state.items);
            } catch (e) {
                document.getElementById('load-error').classList.remove('hidden');
                container.innerHTML = '';
            }
        }

        function renderCategories() {
            const container = document.getElementById('categories-scroll');
            container.innerHTML = state.categories.map(c => `
                <button onclick="filterCat('${c}')" class="cat-btn ${state.activeCat === c ? 'active' : ''} glass px-6 py-3 rounded-2xl text-[9px] font-black uppercase tracking-widest whitespace-nowrap">
                    ${c}
                </button>
            `).join('');
        }

        function renderCatalog(data) {
            const container = document.getElementById('catalog');
            container.innerHTML = data.map(it => {
                const finalPrice = (it.price * state.discount).toFixed(0);
                return `
                <div onclick="openModal('${it.name}')" class="glass p-5 rounded-[30px] flex items-center gap-5 border-white/5 active:scale-95 transition-all">
                    <img src="${it.img}" class="w-16 h-16 rounded-2xl object-cover glass neon-border" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3081/3081840.png'">
                    <div class="flex-1 min-w-0">
                        <p class="text-[7px] font-black text-cyan-400 uppercase tracking-[0.3em] mb-1">${it.cat}</p>
                        <h4 class="font-bold text-sm italic truncate">${it.name}</h4>
                        <div class="flex items-center gap-3 mt-1">
                            ${state.discount < 1 ? `<span class="text-[10px] text-rose-500/50 line-through">${it.price}</span>` : ''}
                            <span class="font-black text-white text-lg">${finalPrice} <span class="text-[8px] text-cyan-400">CRD</span></span>
                        </div>
                    </div>
                </div>
            `}).join('');
            lucide.createIcons();
        }

        function filterCat(c) {
            state.activeCat = c; renderCategories();
            renderCatalog(c === 'Все' ? state.items : state.items.filter(i => i.cat === c));
            tg.HapticFeedback.impactOccurred('light');
        }

        document.getElementById('search').oninput = (e) => {
            const val = e.target.value.toLowerCase();
            renderCatalog(state.items.filter(i => i.name.toLowerCase().includes(val) && (state.activeCat === 'Все' || i.cat === state.activeCat)));
        };

        function openModal(name) {
            const it = state.items.find(x => x.name === name);
            state.selected = it;
            document.getElementById('modal-title').innerText = it.name;
            document.getElementById('modal-img').src = it.img;
            const finalPrice = (it.price * state.discount).toFixed(0);
            if(state.discount < 1) {
                document.getElementById('modal-price-old').innerText = it.price + ' CRD';
                document.getElementById('modal-price-old').classList.remove('hidden');
            } else document.getElementById('modal-price-old').classList.add('hidden');
            document.getElementById('modal-price').innerText = finalPrice + ' CRD';
            document.getElementById('modal-desc').innerText = it.desc || 'NO DATA';
            document.getElementById('modal').classList.remove('hidden');
            tg.HapticFeedback.impactOccurred('medium');
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        function addToCart() {
            state.cart.push({ ...state.selected, finalPrice: (state.selected.price * state.discount) });
            updateCartUI(); closeModal();
            tg.HapticFeedback.notificationOccurred('success');
        }

        function updateCartUI() {
            const badge = document.getElementById('cart-badge');
            const list = document.getElementById('cart-list');
            const checkout = document.getElementById('cart-checkout');
            const empty = document.getElementById('cart-empty');

            if(state.cart.length > 0) {
                badge.classList.remove('hidden'); empty.classList.add('hidden'); checkout.classList.remove('hidden');
                let total = 0;
                list.innerHTML = state.cart.map((it, i) => {
                    total += it.finalPrice;
                    return `<div class="glass p-5 rounded-3xl flex items-center gap-4">
                        <img src="${it.img}" class="w-12 h-12 rounded-xl object-cover">
                        <div class="flex-1"><p class="font-black text-[10px] italic">${it.name}</p></div>
                        <button onclick="state.cart.splice(${i},1);updateCartUI();" class="text-rose-500/40 p-2"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>`
                }).join('');
                document.getElementById('cart-total').innerText = total.toFixed(0) + ' CRD';
            } else {
                badge.classList.add('hidden'); empty.classList.remove('hidden'); checkout.classList.add('hidden');
            }
            lucide.createIcons();
        }

        function playGame(el, index) {
            if(state.gamePlayed) return;
            el.classList.add('flipped'); state.gamePlayed = true;
            localStorage.setItem('boss_game_played', 'true');
            const win = index !== 1;
            setTimeout(() => {
                if(win) {
                    state.discount = 0.97; localStorage.setItem('boss_discount', '0.97');
                    document.getElementById('game-status').innerText = "HACK SUCCESS: 3% OFF";
                    document.getElementById('game-status').style.color = "var(--neon-emerald)";
                    confetti({ particleCount: 150, spread: 70 }); renderCatalog(state.items);
                } else {
                    document.getElementById('game-status').innerText = "HACK FAILED";
                    document.getElementById('game-status').style.color = "#f43f5e";
                }
                tg.HapticFeedback.notificationOccurred(win ? 'success' : 'error');
            }, 600);
        }

        function startCheckout() {
            const data = document.getElementById('order-data').value;
            if(!data) return tg.showAlert("ID REQUIRED");
            document.getElementById('btn-pay').innerText = "AUTHORIZING...";
            setTimeout(() => {
                document.getElementById('success-screen').classList.remove('hidden');
                const orderMsg = `⚡️ [NEURAL ORDER]\n👤 FROM: ${tg.initDataUnsafe.user?.username || 'ANON'}\n💰 TOTAL: ${document.getElementById('cart-total').innerText}\n🆔 ID: ${data}\n📦 ITEMS:\n` + state.cart.map(i => `- ${i.name}`).join('\n');
                tg.sendData(JSON.stringify({ admin_id: ADMIN_ID, message: orderMsg }));
                setTimeout(() => tg.close(), 2500);
            }, 1500);
        }

        function switchPage(p) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.getElementById('page-' + p).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => b.classList.replace('text-cyan-400', 'text-slate-500'));
            document.getElementById('nav-' + p).classList.replace('text-slate-500', 'text-cyan-400');
            tg.HapticFeedback.impactOccurred('medium');
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
