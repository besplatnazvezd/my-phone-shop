<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOSS STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --main: #EAB308; --bg: #000; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: #fff; padding-bottom: 120px; overflow-x: hidden; touch-action: manipulation; }
        .glass { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(15px); }
        .btn-primary { background: var(--main); color: #000; font-weight: 900; text-transform: uppercase; border-radius: 18px; transition: 0.2s; }
        .btn-primary:active { transform: scale(0.95); }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,10,10,0.98); border-top: 1px solid rgba(255,255,255,0.1); padding: 12px 10px 25px 10px; display: flex; justify-content: space-around; z-index: 1000; border-radius: 30px 30px 0 0; }
        .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #555; }
        .nav-btn.active { color: var(--main); }
        .cat-chip { white-space: nowrap; padding: 10px 20px; border-radius: 99px; font-size: 10px; font-weight: 900; background: #111; border: 1px solid #222; text-transform: uppercase; }
        .cat-chip.active { background: var(--main); color: #000; }
        .scratch-container { width: 280px; height: 160px; margin: 0 auto; position: relative; overflow: hidden; border-radius: 20px; }
        .scratch-canvas { position: absolute; top: 0; left: 0; z-index: 2; touch-action: none; cursor: crosshair; }
        .scratch-prize { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #111; border: 2px solid var(--main); z-index: 1; border-radius: 20px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <header class="p-6 text-center">
        <h1 class="text-3xl font-black italic uppercase tracking-tighter text-yellow-500">Boss Store</h1>
                <p class="text-[8px] opacity-30 uppercase tracking-[4px] font-bold">TikTok Premium Services</p>
    </header>

    <!-- Категории -->
    <div id="cats-nav" class="flex overflow-x-auto gap-2 px-5 mb-6 no-scrollbar"></div>

    <!-- Основной контент -->
    <div id="app-content" class="px-5">
        <div class="text-center py-20 opacity-20 uppercase font-black tracking-widest">Загрузка товаров...</div>
    </div>

    <!-- КОРЗИНА -->
    <div id="cart-bar" class="fixed bottom-24 left-4 right-4 glass p-4 rounded-[25px] flex justify-between items-center hidden z-[500] border border-yellow-500/30 shadow-2xl">
        <div>
            <p id="total-price" class="text-xl font-black text-yellow-500">0 ₽</p>
            <p id="discount-label" class="text-[7px] text-green-500 font-bold uppercase hidden">Скидка применена!</p>
        </div>
        <div class="flex gap-2">
            <button onclick="clearCart()" class="px-4 py-3 text-[9px] font-black bg-red-600 text-white rounded-xl uppercase">Отмена</button>
            <button onclick="openPay()" class="btn-primary px-6 py-3 text-[9px]">Оформить</button>
        </div>
    </div>

    <!-- НАВИГАЦИЯ -->
    <nav class="nav-bar">
        <button onclick="navigate('shop')" id="n-shop" class="nav-btn active">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" stroke-width="2"/></svg>
            <span class="text-[9px] font-black uppercase">Магазин</span>
        </button>
        <button onclick="navigate('scratch')" id="n-scratch" class="nav-btn">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-width="2"/></svg>
            <span class="text-[9px] font-black uppercase">Удача</span>
        </button>
        <button onclick="navigate('support')" id="n-support" class="nav-btn">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" stroke-width="2"/></svg>
                        <span class="text-[9px] font-black uppercase">Связь</span>
        </button>
    </nav>

    <!-- МОДАЛКА ОПЛАТЫ -->
    <div id="pay-modal" class="fixed inset-0 bg-black/95 flex items-center justify-center hidden z-[2000] p-6">
        <div class="bg-[#111] w-full max-w-sm p-8 rounded-[35px] text-center border border-white/10 shadow-2xl">
            <h2 class="text-2xl font-black mb-6 uppercase text-yellow-500 italic">Оплата</h2>
            <div class="space-y-3 mb-8 text-left">
                <div onclick="copyText('4100119121976236')" class="bg-white/5 p-4 rounded-xl border border-white/5">
                    <p class="text-[8px] opacity-40 uppercase font-black">ЮMoney</p>
                    <p class="text-sm font-black">4100 1191 2197 6236</p>
                </div>
                <div onclick="copyText('2200701955299232')" class="bg-white/5 p-4 rounded-xl border border-white/5">
                    <p class="text-[8px] opacity-40 uppercase font-black">Карта Т-Банк</p>
                    <p class="text-sm font-black">2200 7019 5529 9232</p>
                </div>
            </div>
            <button onclick="finishPay()" class="w-full py-5 btn-primary text-sm mb-4">Я ОПЛАТИЛ(А)</button>
            <button onclick="closePay()" class="text-[10px] font-black opacity-30 uppercase">Закрыть</button>
        </div>
    </div>

    <!-- УСПЕХ -->
    <div id="success-modal" class="fixed inset-0 bg-black/95 flex items-center justify-center hidden z-[3000] p-6">
        <div class="bg-[#111] w-full max-w-sm p-10 rounded-[40px] text-center border border-yellow-500/30">
            <div class="text-6xl mb-6">✅</div>
            <h2 class="text-2xl font-black mb-4 uppercase">Заказ в работе!</h2>
            <button onclick="window.open('https://t.me/nmproda')" class="w-full py-5 btn-primary">МЕНЕДЖЕР</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        const BOT_TOKEN = '8637015814:AAH_4-QvH1DQB3XrYO-4MzbEz0nIwpNXN0w';
        const ADMIN_ID = '8553862867';
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/1q9vPlWM9t934ACzIwbZU4_EDtvpJdfO09-jodyIi9Ew/export?format=csv';

        let state = JSON.parse(localStorage.getItem('boss_final_state')) || {
            cart: [], discount: 0, lastScratch: 0, totalSpent: 0
        };
        let products = [];
        let currentCat = 'Все';
        let shopQuantities = {};

        function save() { localStorage.setItem('boss_final_state', JSON.stringify(state)); }

        async function loadTable() {
            try {
                const res = await fetch(CSV_URL);
                const data = await res.text();
                const rows = data.split('\n').slice(1);
                products = rows.map(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length < 3) return null;
                    return {
                        cat: cols[0].replace(/"/g, '').trim(),
                        name: cols[1].replace(/"/g, '').trim(),
                        price: parseFloat(cols[2]) || 0,
                        desc: cols[3] ? cols[3].replace(/"/g, '').trim() : '',
                        img: cols[4] ? cols[4].replace(/"/g, '').trim() : 'https://via.placeholder.com/300'
                    };
                }).filter(p => p !== null);
                navigate('shop');
            } catch (e) {
                document.getElementById('app-content').innerHTML = "Ошибка загрузки таблицы 😭";
            }
        }

        function navigate(page) {
            const content = document.getElementById('app-content');
            const cats = document.getElementById('cats-nav');
            
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('n-' + page).classList.add('active');
            
            cats.classList.toggle('hidden', page !== 'shop');
            updateCartUI();

            if (page === 'shop') {
                const uniqueCats = ['Все', ...new Set(products.map(p => p.cat))];
                cats.innerHTML = uniqueCats.map(c => `
                    <button onclick="setCategory('${c}')" class="cat-chip ${currentCat === c ? 'active' : ''}">${c}</button>
                `).join('');

                const filtered = currentCat === 'Все' ? products : products.filter(p => p.cat === currentCat);
                content.innerHTML = `<div class="grid grid-cols-2 gap-4">` + filtered.map((p, i) => {
                    const pIdx = products.indexOf(p);
                    if (!shopQuantities[pIdx]) shopQuantities[pIdx] = 1;
                    return `
                    <div class="glass p-3 rounded-[25px] flex flex-col border border-white/5">
                        <img src="${p.img}" class="w-full aspect-square object-cover rounded-[18px] mb-2">
                        <h3 class="text-[9px] font-black uppercase truncate">${p.name}</h3>
                        <p class="text-[7px] opacity-40 mb-2 h-4 overflow-hidden">${p.desc}</p>
                        <div class="mt-auto">
                            <div class="flex items-center justify-between bg-white/5 rounded-lg mb-2 p-1">
                                <button onclick="changeQty(${pIdx}, -1)" class="w-6 h-6 font-black">-</button>
                                <span class="text-[10px] font-black" id="q-${pIdx}">${shopQuantities[pIdx]}</span>
                                <button onclick="changeQty(${pIdx}, 1)" class="w-6 h-6 font-black">+</button>
                            </div>
                            <div class="text-sm font-black text-yellow-500 mb-2 text-center">${p.price} ₽</div>
                            <button onclick="addToCart(${pIdx})" class="w-full py-2 btn-primary text-[8px]">Добавить</button>
                        </div>
                    </div>`;
                }).join('') + `</div>`;
            }

            if (page === 'scratch') {
                const canPlay = (Date.now() - state.lastScratch) > 86400000;
                content.innerHTML = `
                    <div class="text-center">
                        <h2 class="text-xl font-black mb-10 italic text-yellow-500 uppercase">Сотри и получи скидку</h2>
                        <div class="scratch-container" id="scr-cont">
                            <div class="scratch-prize">
                                <span class="text-4xl mb-2">🎁</span>
                                <span id="prize-text" class="text-xl font-black italic">???</span>
                            </div>
                            <canvas id="scratch-canvas" class="scratch-canvas"></canvas>
                        </div>
                        ${!canPlay ? '<p class="mt-8 text-[10px] opacity-20 font-black uppercase">Уже использовано сегодня</p>' : ''}
                    </div>`;
                if(canPlay) initScratch();
            }

            if (page === 'support') {
                content.innerHTML = `
                    <div class="space-y-4">
                        <div onclick="window.open('https://t.me/nmproda')" class="glass p-6 rounded-[25px] flex items-center gap-4 border-l-4 border-yellow-500">
                            <div class="w-10 h-10 bg-yellow-500 rounded-lg flex items-center justify-center text-black font-black">M</div>
                            <div><p class="font-black text-sm uppercase">Менеджер</p><p class="text-[10px] opacity-40">@nmproda</p></div>
                        </div>
                    </div>`;
            }
        }

        function setCategory(c) { currentCat = c; navigate('shop'); }

        function changeQty(idx, delta) {
            shopQuantities[idx] = Math.max(1, (shopQuantities[idx] || 1) + delta);
            document.getElementById('q-' + idx).innerText = shopQuantities[idx];
        }

        function addToCart(idx) {
            const p = products[idx];
            const qty = shopQuantities[idx];
            state.cart.push({ ...p, q: qty });
            save();
            updateCartUI();
            tg.HapticFeedback.notificationOccurred('success');
        }

        function updateCartUI() {
            const bar = document.getElementById('cart-bar');
            if (state.cart.length === 0 || document.getElementById('n-shop').className.includes('inactive')) {
                bar.classList.add('hidden');
                return;
            }
            bar.classList.remove('hidden');
            let total = state.cart.reduce((sum, item) => sum + (item.price * item.q), 0);
            let final = Math.floor(total * (1 - state.discount / 100));
            document.getElementById('total-price').innerText = final + " ₽";
            document.getElementById('discount-label').classList.toggle('hidden', state.discount <= 0);
        }

        function clearCart() { state.cart = []; save(); updateCartUI(); }

        function initScratch() {
            const canvas = document.getElementById('scratch-canvas');
            const ctx = canvas.getContext('2d');
            const prize = Math.floor(Math.random() * 11) + 5; // 5-15%
            document.getElementById('prize-text').innerText = "-" + prize + "%";
            
            canvas.width = 280; canvas.height = 160;
            ctx.fillStyle = '#333'; ctx.fillRect(0,0,280,160);
            ctx.fillStyle = '#EAB308'; ctx.font = '900 20px Montserrat'; ctx.textAlign = 'center'; ctx.fillText('BOSS STORE', 140, 90);

            let pressed = false;
            const draw = (e) => {
                if(!pressed) return;
                const rect = canvas.getBoundingClientRect();
                const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
                const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath(); ctx.arc(x, y, 20, 0, Math.PI*2); ctx.fill();
                
                // Проверка стертости
                const data = ctx.getImageData(0,0,280,160).data;
                let count = 0;
                for(let i=3; i<data.length; i+=4) if(data[i] === 0) count++;
                if(count > (data.length/4) * 0.5) {
                    canvas.style.display = 'none';
                    state.discount = prize; state.lastScratch = Date.now(); save();
                    confetti(); updateCartUI();
                }
            };
            canvas.onmousedown = canvas.ontouchstart = () => pressed = true;
            window.onmouseup = window.ontouchend = () => pressed = false;
            canvas.onmousemove = canvas.ontouchmove = draw;
        }

        function openPay() { document.getElementById('pay-modal').classList.remove('hidden'); }
        function closePay() { document.getElementById('pay-modal').classList.add('hidden'); }
        function copyText(t) { navigator.clipboard.writeText(t); tg.showAlert("Скопировано!"); }

        async function finishPay() {
            const user = tg.initDataUnsafe.user || {id: 0, username: 'guest'};
            let total = 0;
            const itemsList = state.cart.map(i => {
                total += (i.price * i.q);
                return `${i.name} — ${i.q} шт.`;
            }).join('\n🛒 ');
            
            const final = Math.floor(total * (1 - state.discount / 100));
            const msg = `🚀 НОВЫЙ ЗАКАЗ\n👤 @${user.username} (ID: ${user.id})\n🛒 ${itemsList}\n💰 Итого: ${final} ₽`;

            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ chat_id: ADMIN_ID, text: msg })
                });
                state.totalSpent += final;
                state.cart = []; save();
                closePay();
                document.getElementById('success-modal').classList.remove('hidden');
                confetti();
            } catch (e) { tg.showAlert("Ошибка отправки заказа!"); }
        }

        window.onload = loadTable;
    </script>
</body>
</html>
