.wheel-container { position: relative; width: 280px; height: 280px; margin: 20px auto; }
.wheel { width: 100%; height: 100%; border-radius: 50%; background: conic-gradient(#1a1a1a 0deg 60deg, #ffd700 60deg 120deg, #1a1a1a 120deg 180deg, #ffd700 180deg 240deg, #1a1a1a 240deg 300deg, #ffd700 300deg 360deg); border: 4px solid #ffd700; box-shadow: 0 0 30px rgba(255,215,0,0.5); transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99); position: relative; }
.wheel::before { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 50px; height: 50px; background: linear-gradient(135deg, #ffd700, #b8860b); border-radius: 50%; border: 3px solid #1a1a1a; z-index: 2; }
.wheel-inner { position: absolute; top: 10px; left: 10px; right: 10px; bottom: 10px; border-radius: 50%; background: #0a0a0a; }
.pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid #ffd700; z-index: 10; filter: drop-shadow(0 0 10px rgba(255,215,0,0.8)); }
.spin-btn { background: linear-gradient(135deg, #ffd700, #b8860b); color: #000; font-weight: bold; padding: 15px 40px; border: none; border-radius: 30px; font-size: 18px; cursor: pointer; margin-top: 20px; box-shadow: 0 0 20px rgba(255,215,0,0.5); }
.spin-btn:disabled { background: #333; color: #666; cursor: not-allowed; box-shadow: none; }
.discount-active { background: linear-gradient(135deg, #1a1a1a, #2a2a2a); border: 2px solid #ffd700; border-radius: 15px; padding: 20px; margin-top: 20px; text-align: center; animation: glow 1.5s ease-in-out infinite alternate; }
@keyframes glow { from { box-shadow: 0 0 10px rgba(255,215,0,0.3); } to { box-shadow: 0 0 25px rgba(255,215,0,0.8); } }
.discount-badge { display: inline-block; background: linear-gradient(135deg, #ffd700, #b8860b); color: #000; padding: 8px 20px; border-radius: 20px; font-weight: bold; margin-bottom: 10px; }
.urgent-btn { background: linear-gradient(135deg, #ff4444, #cc0000); color: #fff; border: none; padding: 15px 30px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; animation: pulse 1s infinite; box-shadow: 0 0 20px rgba(255,0,0,0.6); }
@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
.empty-result { color: #666; font-size: 18px; margin-top: 20px; }
.cooldown-result { color: #ffd700; font-size: 18px; margin-top: 20px; }

        async function init() {

        async function loadData() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();

                products = rows.map((row, i) => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    const clean = (s) => s ? s.replace(/^"|"$/g, '').trim() : '';
                    return { ID: i, Category: clean(cols[0]), Name: clean(cols[1]), Price: parseFloat(clean(cols[2])) || 0, Description: clean(cols[3]), Image: clean(cols[4]) };
                }).filter(p => p.Name && p.Price > 0);
                renderPage();
            } catch (e) { document.getElementById('main-content').innerHTML = "<div class='text-center mt-20 opacity-30 italic'>Загрузка...</div>"; }
