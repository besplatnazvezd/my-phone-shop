<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOSS STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --main: #EAB308; --bg: #000; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: #fff; padding-bottom: 140px; overflow-x: hidden; }
        
        .glass { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(15px); }
        .btn-primary { background: var(--main); color: #000; font-weight: 900; text-transform: uppercase; border-radius: 20px; transition: 0.2s; }
        .btn-primary:active { transform: scale(0.95); }
        
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,10,10,0.95); border-top: 1px solid rgba(255,255,255,0.05); padding: 12px 10px 25px 10px; display: flex; justify-content: space-around; z-index: 1000; border-radius: 35px 35px 0 0; }
        .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #444; transition: 0.3s; }
        .nav-btn.active { color: var(--main); }

        .cat-chip { white-space: nowrap; padding: 10px 22px; border-radius: 99px; font-size: 10px; font-weight: 900; background: #111; border: 1px solid #222; text-transform: uppercase; }
        .cat-chip.active { background: var(--main); color: #000; border-color: var(--main); }

        .scratch-container { width: 280px; height: 160px; margin: 0 auto; position: relative; }
        .scratch-canvas { position: absolute; top: 0; left: 0; z-index: 2; border-radius: 20px; touch-action: none; }
        .scratch-prize { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #111; border-radius: 20px; border: 2px solid var(--main); z-index: 1; }

        .qty-btn { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.1); border-radius: 8px; font-weight: 900; }
                .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <header class="p-8 text-center">
        <h1 class="text-3xl font-black italic uppercase tracking-tighter text-yellow-500">Boss Store</h1>
        <p class="text-[7px] opacity-30 uppercase tracking-[5px] font-bold">The Luxury Choice</p>
    </header>

    <div id="cats-nav" class="flex overflow-x-auto gap-2 px-5 mb-6 no-scrollbar"></div>

    <div id="app-content" class="px-5"></div>

    <!-- КОРЗИНА -->
    <div id="cart-bar" class="fixed bottom-28 left-4 right-4 glass p-4 rounded-[30px] flex justify-between items-center hidden z-[500] shadow-2xl border border-yellow-500/20">
        <div>
            <p id="total-price" class="text-2xl font-black italic text-yellow-500">0 ₽</p>
            <p id="discount-label" class="text-[8px] text-green-500 font-bold uppercase tracking-wider hidden">Скидка активирована</p>
        </div>
        <div class="flex gap-2">
            <button onclick="window.clearCart()" class="px-4 py-2 text-[8px] font-black border border-red-500 text-red-500 rounded-xl uppercase bg-red-500/10">Отмена</button>
            <button onclick="window.openPay()" class="btn-primary px-8 py-4 text-[10px]">Оформить</button>
        </div>
    </div>

    <!-- МЕНЮ -->
    <nav class="nav-bar">
        <button onclick="window.nav('shop')" id="n-shop" class="nav-btn active">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" stroke-width="2"/></svg>
            <span class="text-[9px] font-black uppercase">Шоп</span>
        </button>
        <button onclick="window.nav('status')" id="n-status" class="nav-btn">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" stroke-width="2"/></svg>
            <span class="text-[9px] font-black uppercase">Статус</span>
        </button>
        <button onclick="window.nav('scratch')" id="n-scratch" class="nav-btn">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-width="2"/></svg>
                        <span class="text-[9px] font-black uppercase">Удача</span>
        </button>
        <button onclick="window.nav('support')" id="n-support" class="nav-btn">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" stroke-width="2"/></svg>
            <span class="text-[9px] font-black uppercase">Связь</span>
        </button>
    </nav>

    <!-- ОПЛАТА И УСПЕХ (МОДАЛКИ) - ОСТАВЛЯЕМ КАК БЫЛИ -->
    <div id="pay-modal" class="fixed inset-0 bg-black/95 flex items-center justify-center hidden z-[2000] p-6">
        <div class="bg-[#111] w-full max-w-sm p-8 rounded-[40px] text-center border border-white/10 shadow-2xl">
            <h2 class="text-2xl font-black mb-6 uppercase text-yellow-500 italic">Оплата</h2>
            <div class="space-y-3 mb-8">
                <div onclick="window.copy('4100119121976236')" class="bg-white/5 p-4 rounded-2xl text-left border border-white/5 cursor-pointer">
                    <p class="text-[9px] opacity-30 uppercase font-black">ЮMoney</p>
                    <p class="text-sm font-black italic tracking-tighter">4100 1191 2197 6236</p>
                </div>
                <div onclick="window.copy('2200701955299232')" class="bg-white/5 p-4 rounded-2xl text-left border border-white/5 cursor-pointer">
                    <p class="text-[9px] opacity-30 uppercase font-black">Карта Т-Банк</p>
                    <p class="text-sm font-black italic tracking-tighter">2200 7019 5529 9232</p>
                </div>
            </div>
            <button onclick="window.finishPay()" class="w-full py-5 btn-primary text-sm mb-4">Я ОПЛАТИЛ(А)</button>
            <button onclick="window.closePay()" class="text-[10px] font-black opacity-30 uppercase tracking-widest">Назад</button>
        </div>
    </div>

    <div id="success-modal" class="fixed inset-0 bg-black/95 flex items-center justify-center hidden z-[3000] p-6">
        <div class="bg-[#111] w-full max-w-sm p-10 rounded-[40px] text-center border border-yellow-500/30 shadow-xl">
            <div class="text-6xl mb-6">✅</div>
            <h2 class="text-2xl font-black mb-4 uppercase">Заказ принят!</h2>
            <button onclick="window.open('https://t.me/nmproda')" class="w-full py-6 btn-primary text-sm">МЕНЕДЖЕР</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        const BOT_TOKEN = '8637015814:AAH_4-QvH1DQB3XrYO-4MzbEz0nIwpNXN0w';
        const ADMIN_ID = '8553862867';
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/1q9vPlWM9t934ACzIwbZU4_EDtvpJdfO09-jodyIi9Ew/export?format=csv';

        window.db = JSON.parse(localStorage.getItem('boss_v7_data')) || {
            cart: [], discount: 0, lastScratch: 0, totalSpent: 0, history: []
        };
        window.products = [];
        window.currentCat = 'Все';
        window.quantities = {}; // Для выбора кол-ва в магазине

        window.save = () => localStorage.setItem('boss_v7_data', JSON.stringify(window.db));

        window.nav = (p) => {
            const app = document.getElementById('app-content');
            const cats = document.getElementById('cats-nav');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('n-'+p).classList.add('active');
            
            cats.classList.toggle('hidden', p !== 'shop');
            window.updateCart();

            if (p === 'shop') {
                const unique = ['Все', ...new Set(window.products.map(x => x.cat))];
                cats.innerHTML = unique.map(c => `<button onclick="window.setCat('${c}')" class="cat-chip ${window.currentCat === c ? 'active' : ''}">${c}</button>`).join('');
                const filtered = window.currentCat === 'Все' ? window.products : window.products.filter(x => x.cat === window.currentCat);
                
                app.innerHTML = `<div class="grid grid-cols-2 gap-4">` + filtered.map((prod, i) => {
                    const realIdx = window.products.indexOf(prod);
                    if (!window.quantities[realIdx]) window.quantities[realIdx] = 1;
                    return `
                    <div class="glass p-3 rounded-[30px] flex flex-col relative border border-white/5">
                        <img src="${prod.img}" class="w-full aspect-square object-cover rounded-[22px] mb-2">
                        <h3 class="text-[9px] font-black uppercase truncate px-1">${prod.name}</h3>
                        <p class="text-[7px] opacity-40 px-1 mb-2 leading-tight h-5 overflow-hidden">${prod.desc}</p>
                        <div class="mt-auto">
                            <div class="flex items-center justify-between mb-2 px-1">
                                <button onclick="window.changeQty(${realIdx}, -1)" class="qty-btn text-white">-</button>
                                <span id="qty-${realIdx}" class="text-xs font-black">$\
                        <p class="text-[9px] opacity-30 uppercase font-black">Карта Т-Банк</p>
                    <p class="text-sm font-black italic tracking-tighter">2200 7019 5529 9232</p>
                </div>
            </div>
            <button onclick="window.finishPay()" class="w-full py-5 btn-primary text-sm mb-4">Я ОПЛАТИЛ(А)</button>
            <button onclick="window.closePay()" class="text-[10px] font-black opacity-30 uppercase tracking-widest">Назад</button>
        </div>
    </div>

    <div id="success-modal" class="fixed inset-0 bg-black/95 flex items-center justify-center hidden z-[3000] p-6">
        <div class="bg-[#111] w-full max-w-sm p-10 rounded-[40px] text-center border border-yellow-500/30 shadow-xl">
            <div class="text-6xl mb-6">✅</div>
            <h2 class="text-2xl font-black mb-4 uppercase">Заказ принят!</h2>
            <button onclick="window.open('https://t.me/nmproda')" class="w-full py-6 btn-primary text-sm">МЕНЕДЖЕР</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        const BOT_TOKEN = '8637015814:AAH_4-QvH1DQB3XrYO-4MzbEz0nIwpNXN0w';
        const ADMIN_ID = '8553862867';
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/1q9vPlWM9t934ACzIwbZU4_EDtvpJdfO09-jodyIi9Ew/export?format=csv';

        window.db = JSON.parse(localStorage.getItem('boss_v7_data')) || {
            cart: [], discount: 0, lastScratch: 0, totalSpent: 0, history: []
        };
        window.products = [];
        window.currentCat = 'Все';
        window.quantities = {}; // Для выбора кол-ва в магазине

        window.save = () => localStorage.setItem('boss_v7_data', JSON.stringify(window.db));

        window.nav = (p) => {
            const app = document.getElementById('app-content');
            const cats = document.getElementById('cats-nav');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('n-'+p).classList.add('active');
            
            cats.classList.toggle('hidden', p !== 'shop');
            window.updateCart();

            if (p === 'shop') {
                const unique = ['Все', ...new Set(window.products.map(x => x.cat))];
                cats.innerHTML = unique.map(c => `<button onclick="window.setCat('${c}')" class="cat-chip ${window.currentCat === c ? 'active' : ''}">${c}</button>`).join('');
                const filtered = window.currentCat === 'Все' ? window.products : window.products.filter(x => x.cat === window.currentCat);
                
                app.innerHTML = `<div class="grid grid-cols-2 gap-4">` + filtered.map((prod, i) => {
                    const realIdx = window.products.indexOf(prod);
                    if (!window.quantities[realIdx]) window.quantities[realIdx] = 1;
                    return `
                    <div class="glass p-3 rounded-[30px] flex flex-col relative border border-white/5">
                        <img src="${prod.img}" class="w-full aspect-square object-cover rounded-[22px] mb-2">
                        <h3 class="text-[9px] font-black uppercase truncate px-1">${prod.name}</h3>
                        <p class="text-[7px] opacity-40 px-1 mb-2 leading-tight h-5 overflow-hidden">${prod.desc}</p>
                        <div class="mt-auto">
                            <div class="flex items-center justify-between mb-2 px-1">
                                <button onclick="window.changeQty(${realIdx}, -1)" class="qty-btn text-white">-</button>
                                <span id="qty-${realIdx}" class="text-xs font-black">${window.quantities[realIdx]}</span>
                                <button onclick="window.changeQty(${realIdx}, 1)" class="qty-btn text-white">+</button>
                            </div>
                            <div class="text-lg font-black italic text-yellow-500 mb-2 text-center">${prod.price} ₽</div>
                            <button onclick="window.add(${realIdx})" class="w-full py-3 btn-primary text-[9px]">В КОРЗИНУ</button>
                        </div>
                    </div>`;
                }).join('') + `</div>`;
            }

            if (p === 'scratch') {
                const canPlay = (Date.now() - window.db.lastScratch) > 86400000;
                app.innerHTML = `
                <div class="text-center py-6">
                    <h2 class="text-2xl font-black mb-2 uppercase italic text-yellow-500">Удача</h2>
                    <p class="text-[10px] opacity-40 mb-10 uppercase font-black">Сотри и получи скидку</p>
                    <div class="scratch-container">
                        <div class="scratch-prize"><span class="text-4xl mb-2">🎁</span><span id="prize-text" class="text-xl font-black italic">???</span></div>
                        <canvas id="scratch-canvas" class="scratch-canvas"></canvas>
                    </div>
                    ${!canPlay ? `<p class="mt-10 text-[10px] font-black opacity-20 uppercase">Заходи завтра!</p>` : ''}
                </div>`;
                if(canPlay) window.initScratch();
            }

            if (p === 'status') {
                app.innerHTML = `<div class="glass p-8 rounded-[40px] text-center border-yellow-500/20"><p class="text-[9px] opacity-30 uppercase mb-2">Потрачено</p><h2 class="text-4xl font-black italic">${window.db.totalSpent} ₽</h2></div>`;
            }

            if (p === 'support') {
                app.innerHTML = `<div onclick="window.open('https://t.me/nmproda')" class="glass p-8 rounded-[40px] flex items-center gap-6 border-l-4 border-yellow-500"><div class="w-12 h-12 bg-yellow-500 rounded-xl flex items-center justify-center text-black font-black">M</div><div><p class="font-black uppercase italic">Менеджер</p><p class="text-xs opacity-40">@nmproda</p></div></div>`;
            }
        };

        window.changeQty = (idx, delta) => {
            window.quantities[idx] = Math.max(1, (window.quantities[idx] || 1) + delta);
            const el = document.getElementById(`qty-${idx}`);
            if(el) el.innerText = window.quantities[idx];
        };

        window.add = (idx) => {
            const q = window.quantities[idx] || 1;
            const item = {...window.products[idx], q: q};
            window.db.cart.push(item);
            tg.HapticFeedback.impactOccurred('medium');
            window.updateCart();
            tg.showAlert(`Добавлено: ${item.name} (${q} шт.)`);
        };

        window.updateCart = () => {
            const bar = document.getElementById('cart-bar');
            if(window.db.cart.length === 0 || !document.getElementById('n-shop').classList.contains('active')) {
                bar.classList.add('hidden'); return;
            }
            bar.classList.remove('hidden');
            let t = 0; window.db.cart.forEach(p => t += (p.price * p.q));
            const final = Math.floor(t * (1 - window.db.discount/100));
            document.getElementById('total-price').innerText = final + " ₽";
            document.getElementById('discount-label').classList.toggle('hidden', window.db.discount <= 0);
        };

        window.initScratch = () => {
            const canvas = document.getElementById('scratch-canvas');
            const ctx = canvas.getContext('2d');
            const prizeVal = Math.floor(Math.random() * 6) + 5; 
            document.getElementById('prize-text').innerText = `-${prizeVal}%`;
            canvas.width = 280; canvas.height = 160;
            ctx.fillStyle = '#444'; ctx.fillRect(0,0,280,160);
            ctx.fillStyle = '#666'; ctx.font = '900 20px Montserrat'; ctx.textAlign = 'center'; ctx.fillText('BOSS STORE', 140, 90);
            let isDone = false;
            const scrub = (e) => {
                if(isDone) return;
                const rect = canvas.getBoundingClientRect();
                const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
                const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath(); ctx.arc(x, y, 25, 0, Math.PI*2); ctx.fill();
                const pix = ctx.getImageData(0,0,280,160).data;
                let trans = 0; for(let i=3; i<pix.length; i+=4) if(pix[i] === 0) trans++;
                if(trans > (pix.length/4) * 0.5) {
                    isDone = true; canvas.style.display = 'none';
                    window.db.discount = prizeVal; window.db.lastScratch = Date.now(); window.save();
                    confetti(); window.updateCart();
                }
            };
            canvas.addEventListener('mousemove', scrub); canvas.addEventListener('touchstart', scrub);
        };

        window.openPay = () => document.getElementById('pay-modal').classList.remove('hidden');
        window.closePay = () => document.getElementById('pay-modal').classList.add('hidden');
        window.clearCart = () => { window.db.cart = []; window.save(); window.updateCart(); };
        window.copy = (t) => { navigator.clipboard.writeText(t); tg.showAlert("Скопировано!"); };

        window.finishPay = async () => {
            const user = tg.initDataUnsafe.user || {id: 0, username: 'guest'};
            let total = 0;
            const itemsMsg = window.db.cart.map(x => {
                total += (x.price * x.q);
                return `${x.name} — ${x.q} шт.`;
            }).join('\n🛒 ');
            
            const final = Math.floor(total * (1 - window.db.discount/100));
            const msg = `🚀 НОВЫЙ ЗАКАЗ\n👤 @${user.username} (ID: ${user.id})\n🛒 ${itemsMsg}\n💰 Итого: ${final} ₽`;

            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ chat_id: ADMIN_ID, text: msg })
                });
                window.db.totalSpent += final;
                window.db.history.push({date: new Date().toLocaleDateString(), sum: final});
                window.db.cart = []; window.save();
                window.closePay();
                document.getElementById('success-modal').classList.remove('hidden');
                confetti();
            } catch (e) { tg.showAlert("Ошибка!"); }
        };

        async function init() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                window.products = text.split('\n').slice(1).map(r => {
                    const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if(!c[1]) return null;
                    return { cat: c[0].replace(/"/g,''), name: c[1].replace(/"/g,''), price: parseFloat(c[2]), desc: c[3] ? c[3].replace(/"/g,'') : '', img: c[4] ? c[4].replace(/"/g,'').trim() : '' };
                }).filter(p => p);
                window.nav('shop');
            } catch (e) { console.error(e); }
        }
        init();
    </script>
</body>
</html>
