<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TG Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #030303; }
        .cyber-font { font-family: 'Orbitron', sans-serif; }
        .neon-glow { box-shadow: 0 0 20px rgba(129, 140, 248, 0.3); }
        .neon-border { border-color: rgba(129, 140, 248, 0.4); }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col justify-between p-4 overflow-hidden">

    <!-- Экран загрузки (Анализ) -->
    <div id="loading-screen" class="flex-grow flex flex-col items-center justify-center space-y-6">
        <div class="relative w-24 h-24">
            <div class="absolute inset-0 rounded-full border-4 border-indigo-500/20"></div>
            <div class="absolute inset-0 rounded-full border-4 border-indigo-500 border-t-transparent animate-spin"></div>
        </div>
        <div class="text-center">
            <h2 class="cyber-font text-lg font-bold tracking-widest text-indigo-400">АНАЛИЗ ПРОФИЛЯ</h2>
            <p id="loading-status" class="text-xs text-zinc-500 mt-2">Подключение к Telegram API...</p>
        </div>
    </div>

    <!-- Основной экран с карточкой (Скрыт при загрузке) -->
    <div id="main-screen" class="hidden flex-grow flex flex-col justify-between py-4 animate-fade-in">
        
        <!-- Верхняя инфо-панель -->
        <div class="text-center">
            <span class="text-[10px] cyber-font uppercase tracking-[0.3em] text-indigo-400">Твой TG Ранг готов</span>
            <h1 class="text-2xl font-extrabold mt-1">Твой Профиль</h1>
        </div>

        <!-- КАРТОЧКА ПЕРСОНАЖА -->
        <div class="bg-zinc-950/80 border-2 neon-border rounded-[32px] p-6 neon-glow relative overflow-hidden my-auto max-w-sm mx-auto w-full">
            <!-- Свечение на фоне -->
            <div class="absolute -top-12 -left-12 w-32 h-32 bg-indigo-500/20 rounded-full blur-3xl"></div>
            <div class="absolute -bottom-12 -right-12 w-32 h-32 bg-purple-500/20 rounded-full blur-3xl"></div>
                        <div class="relative z-10 flex flex-col items-center">
                <!-- Аватарка -->
                <div class="w-20 h-20 rounded-full border-2 border-indigo-400 overflow-hidden bg-zinc-900 flex items-center justify-center">
                    <img id="user-avatar" src="" class="w-full h-full object-cover hidden">
                    <span id="avatar-fallback" class="cyber-font text-2xl text-indigo-400">TG</span>
                </div>

                <!-- Имя и Ранг -->
                <h3 id="user-name" class="text-xl font-extrabold mt-3">@username</h3>
                <span id="user-rank" class="cyber-font text-[10px] font-bold px-3 py-1 rounded-full bg-indigo-500/10 text-indigo-400 border border-indigo-500/30 uppercase mt-2">ЭПИЧЕСКИЙ</span>

                <!-- Разделитель -->
                <div class="w-full h-[1px] bg-zinc-800 my-5"></div>

                <!-- Статистика -->
                <div class="w-full space-y-3">
                    <div class="flex justify-between items-center text-xs">
                        <span class="text-zinc-500">Telegram ID:</span>
                        <span id="stat-id" class="font-mono font-bold text-zinc-300">123456789</span>
                    </div>
                    <div class="flex justify-between items-center text-xs">
                        <span class="text-zinc-500">Дата регистрации:</span>
                        <span id="stat-year" class="font-bold text-zinc-300">~ 2018 год</span>
                    </div>
                    <div class="flex justify-between items-center text-xs">
                        <span class="text-zinc-500">Возраст аккаунта:</span>
                        <span id="stat-age" class="font-bold text-zinc-300">6 лет</span>
                    </div>
                    <div class="flex justify-between items-center text-xs">
                        <span class="text-zinc-500">Premium Статус:</span>
                        <span id="stat-premium" class="font-bold text-emerald-400">Активен</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Кнопки действий -->
        <div class="space-y-2 px-4">
                      <button onclick="shareResult()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-4 rounded-2xl text-xs cyber-font font-bold uppercase tracking-wider transition-all">
                Поделиться профилем
            </button>
            <p class="text-[9px] text-zinc-600 text-center">Калибровка ранга основана на глобальной базе Telegram ID</p>
        </div>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        
        window.onload = () => {
            if (tg) {
                tg.ready();
                tg.expand();
            }
            
            // Имитация процесса "Анализа"
            const statuses = [
                "Сканирование Telegram ID...",
                "Определение даты регистрации...",
                "Проверка Premium статуса...",
                "Генерация карточки ранга..."
            ];
            
            let currentStatus = 0;
            const interval = setInterval(() => {
                if (currentStatus < statuses.length) {
                    document.getElementById('loading-status').innerText = statuses[currentStatus];
                    currentStatus++;
                } else {
                    clearInterval(interval);
                    showProfile();
                }
            }, 800);
        };

        function showProfile() {
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
          // 1. Получаем реальные данные из Telegram
            const user = tg?.initDataUnsafe?.user || {
                id: 489302193,
                first_name: "Пользователь",
                username: "guest",
                is_premium: true
            };

            // 2. Рассчитываем возраст и ранг по Telegram ID
            const id = user.id;
            let regYear = 2024;
            let rank = "Новичок";
            let color = "text-zinc-400";

            if (id < 100000000) { regYear = 2014; rank = "ЛЕГЕНДА"; }
            else if (id < 250000000) { regYear = 2016; rank = "ДРЕВНИЙ"; }
            else if (id < 700000000) { regYear = 2018; rank = "ЭПИЧЕСКИЙ"; }
            else if (id < 2000000000) { regYear = 2021; rank = "РЕДКИЙ"; }
            else { regYear = 2024; rank = "ОБЫЧНЫЙ"; }

            const currentYear = new Date().getFullYear();
            const age = currentYear - regYear;

            // 3. Заполняем данные на карточке
            document.getElementById('user-name').innerText = user.username ? `@${user.username}` : user.first_name;
            document.getElementById('user-rank').innerText = rank;
            document.getElementById('stat-id').innerText = id;
            document.getElementById('stat-year').innerText = `~ ${regYear} год`;
            document.getElementById('stat-age').innerText = `${age} ${getYearWord(age)}`;
            document.getElementById('stat-premium').innerText = user.is_premium ? "АКТИВЕН" : "ОТСУТСТВУЕТ";
            document.getElementById('stat-premium').className = user.is_premium ? "font-bold text-indigo-400" : "font-bold text-zinc-500";

            if (user.photo_url) {
                document.getElementById('user-avatar').src = user.photo_url;
                document.getElementById('user-avatar').classList.remove('hidden');
                document.getElementById('avatar-fallback').classList.add('hidden');
            }
        }

        function getYearWord(age) {
            if (age === 1) return "год";
            if (age > 1 && age < 5) return "года";
            return "лет";
        }

        // Кнопка поделиться
        function shareResult() {
            const text = "🔥 Узнай свой ранг в Telegram! Я проверил свой аккаунт и мой ранг — " + document.getElementById('user-rank').innerText;
            const botUrl = "https://t.me/ТВОЙ_БОТ"; // Поменяй на юзернейм своего бота
            
            tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(botUrl)}&text=${encodeURIComponent(text)}`);
        }
    </script>
</body>
</html>
