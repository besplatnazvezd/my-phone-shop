            const qty = parseInt(document.getElementById(`qty-${idx}`).value) || 1;
            for (let i = 0; i < qty; i++) cart.push(products[idx]);
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            updateUI();
            document.getElementById(`qty-${idx}`).value = 1;
        }

        function updateUI() {
            const total = cart.reduce((s, p) => s + p.Price, 0);
            document.getElementById('total-price').innerText = total + ' ₽';
            document.getElementById('cart-count').innerText = cart.length;
            const bar = document.getElementById('checkout-bar');
            if (cart.length > 0) bar.classList.remove('hidden'); else bar.classList.add('hidden');
        }

        function copyText(txt, msg) {
            const el = document.createElement('textarea');
            el.value = txt; document.body.appendChild(el);
            el.select(); document.execCommand('copy');
            document.body.removeChild(el);
            tg.showAlert(msg);
            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        }

        async function confirmOrder() {
            const btn = document.getElementById('main-confirm-btn');
            const total = cart.reduce((s, p) => s + p.Price, 0);
            btn.innerText = "ОТПРАВКА...";
            const userData = tg.initDataUnsafe.user;
            const userName = userData ? userData.first_name : "CLIENT";
            const userLink = userData ? `tg://user?id=${userData.id}` : "#";
            const itemsMap = {};
            cart.forEach(item => itemsMap[item.Name] = (itemsMap[item.Name] || 0) + 1);
            const itemsList = Object.entries(itemsMap).map(([name, count]) => `• ${name} x${count}`).join('\n');
            const adminText = `🚀 *НОВЫЙ ЗАКАЗ BOSS STORE*\n\n👤 Клиент: [${userName}](${userLink})\n🆔 ID: \`${userData ? userData.id : '?'}\`\n🛒 Товары:\n${itemsList}\n💰 Итого: *${total} ₽*`;
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ chat_id: ADMIN_ID, text: adminText, parse_mode: 'Markdown' }) });
                document.getElementById('pay-modal').classList.remove('hidden');
                cart = []; updateUI();
            } catch (e) { tg.showAlert("Ошибка!"); }
            btn.innerText = "Оформить заказ";
        }
        loadData();
    </script>
</body>
</html>
