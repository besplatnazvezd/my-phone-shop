<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOSS NEURAL OS v.2100</title>

    <!-- СИСТЕМНЫЕ СКРИПТЫ -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500;800&display=swap" rel="stylesheet">

    <style>
        /* ЯДРО СТИЛЕЙ СИСТЕМЫ */
        :root[data-theme="dark"] {
            --bg: #05060a;
            --panel: rgba(10, 12, 18, 0.9);
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.4);
            --text-main: #ffffff;
            --text-dim: #5c6370;
            --border: rgba(0, 242, 255, 0.15);
            --card-bg: rgba(255, 255, 255, 0.02);
        }

        :root[data-theme="light"] {
            --bg: #f5f7fa;
            --panel: rgba(255, 255, 255, 0.95);
            --accent: #0066ff;
            --accent-glow: rgba(0, 102, 255, 0.2);
            --text-main: #0f172a;
            --text-dim: #64748b;
            --border: rgba(0, 102, 255, 0.1);
            --card-bg: #ffffff;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg);
            color: var(--text-main);
            transition: background 0.4s ease, color 0.4s ease;
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        .neural-grid {
            position: fixed; inset: 0;
            background-image: 
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
            mask-image: radial-gradient(circle at 50% 50%, black, transparent 95%);
            opacity: 0.3;
        }

        /* НЕЙРО-ЧИПЫ КАТЕГОРИЙ */
        .cat-chip {
            padding: 8px 16px;
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--card-bg);
                      color: var(--text-dim);
            transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
            letter-spacing: 1px;
        }
        .cat-chip.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .glass {
            background: var(--panel);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border);
        }

        .product-card {
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--border);
            transition: transform 0.2s ease, border-color 0.2s ease;
        }
        .product-card:active {
            transform: scale(0.97);
            border-color: var(--accent);
        }

        /* СИМУЛЯТОР БАНКА */
        .pay-stub {
            position: fixed; inset: 0;
            background: #000; z-index: 1000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .bank-card {
            width: 280px; height: 170px;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 20px; padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: cardFloat 3s ease-in-out infinite;
        }
        @keyframes cardFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        ::-webkit-scrollbar { display: none; }
        .font-sync { font-family: 'Syncopate', sans-serif; }
        .font-orb { font-family: 'Orbitron', sans-serif; }
    </style>
</head>

    <script>
        /* СИСТЕМНЫЙ СЕЙФ */
        const _VAULT = {
            CSV: 'https://docs.google.com/spreadsheets/d/1q9vPlWM9t934ACzIwbZU4_EDtvpJdfO09-jodyIi9Ew/export?format=csv',
            ADMIN: "7727345054",
            EMAIL: "supportnmproda@gmail.com",
            LANG: localStorage.getItem('v21_lang') || 'RU',
            THEME: localStorage.getItem('v21_theme') || 'dark'
        };

        /* ЛОКАЛЬНАЯ АВТОНОМНАЯ БАЗА (ЕСЛИ СЕТЬ НЕ ОТВЕЧАЕТ) */
        const FALLBACK_DATABASE = [
            { cat: "IT и обучение", name: "Боты и сайты", price: 0, desc: "Разработка авто-систем и веб-платформ под ключ.", img: "https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?w=500" },
            { cat: "IT и обучение", name: "Бот-визитка ТГ", price: 699, desc: "Интерактивный бот для презентации личного бренда или компании.", img: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=500" },
            { cat: "IT и обучение", name: "Структура лендинга", price: 249, desc: "Создание продающей структуры и логики посадочной страницы.", img: "https://images.unsplash.com/photo-1507238691740-187a5b1d37b8?w=500" },
            { cat: "IT и обучение", name: "Сбор данных (парсинг)", price: 299, desc: "Автоматизированный парсинг и структурирование данных.", img: "https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=500" },
            { cat: "IT и обучение", name: "Арт QR-код", price: 150, desc: "Генерация стилизованных дизайнерских QR-кодов с логотипом.", img: "https://images.unsplash.com/photo-1605810230434-7631ac76ec81?w=500" }
        ];

        const TRANSLATIONS = {
            RU: { ref_title: "НЕЙРО-СЕТЬ", ref_desc: "Развивайте сеть и получайте 10% от транзакций ваших рефералов.", ref_copy: "Копировать линк", faq_title: "ИНФО-ЦЕНТР", cart_empty: "СИГНАЛ ПУСТ", total: "Итого", buy_btn: "Оплатить через ЮKassa", add_to_cart: "В КОРЗИНУ", support_text: "СВЯЗЬ С АРХИТЕКТОРОМ:", search: "Поиск данных..." },
            EN: { ref_title: "NEURAL NETWORK", ref_desc: "Grow the network and earn 10% from your referrals.", ref_copy: "Copy ID Link", faq_title: "INFO HUB", cart_empty: "SIGNAL EMPTY", total: "Total Amount", buy_btn: "Authorize Payment", add_to_cart: "ADD TO BAG", support_text: "CONTACT ARCHITECT:", search: "Searching database..." }
        };

        const FAQ = [
            { q: "Как я получу товар?", a: "После оплаты данные придут в ваш Telegram или Email в течение 10 минут." },
            { q: "Безопасно ли это?", a: "Мы используем официальный шлюз ЮKassa. Ваши данные защищены." },
            { q: "Можно ли сделать возврат?", a: "Да, если товар не был активирован и возникла техническая проблема." }
        ];

        /* БЕЗОПАСНАЯ ИНИЦИАЛИЗАЦИЯ TELEGRAM SDK */
        const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : {
            expand: () => {},
            HapticFeedback: { impactOccurred: () => {}, selectionChanged: () => {}, notificationOccurred: () => {} },
            showAlert: (msg) => alert(msg),
            close: () => {},
            sendData: () => {},
            initDataUnsafe: {}
        };

        let state = { items: [], cart: [], activeCat: 'Все' };

        window.onload = () => {
            try {
                document.documentElement.setAttribute('data-theme', _VAULT.THEME);
                applyThemeUI();
                updateLangUI();
                renderFAQ();
                loadDB();
                tg.expand();
                
                const clientName = (tg.initDataUnsafe?.user?.first_name || 'ADMIN').toUpperCase();
                document.getElementById('user-name').innerText = clientName;
                document.getElementById('ref-link-display').innerText = `https://t.me/BossStoreBot?start=ref${tg.initDataUnsafe?.user?.id || _VAULT.ADMIN}`;
            } catch (err) {
                console.error("Initialization Failed:", err);
            }
        };

        /* ПОЛНОСТЬЮ ОТКАЗОУСТОЙЧИВЫЙ ЗАГРУЗЧИК БАЗЫ */
        async function loadDB() {
            try {
                // Создаем контроллер таймаута на 3 секунды
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 3000);

                const res = await fetch(_VAULT.CSV, { signal: controller.signal });
                clearTimeout(timeoutId);

                if(!res.ok) throw new Error("Server response error");
                const text = await res.text();
                
                const rows = text.split(/\r?\n/).filter(row => row.trim() !== '').slice(1);
                state.items = rows.map(row => {
                    const columns = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    return { 
                        cat: columns[0]?.replace(/"/g, '').trim(), 
                        name: columns[1]?.replace(/"/g, '').trim(), 
                        price: parseFloat(columns[2]), 
                        desc: columns[3]?.replace(/"/g, '').trim(), 
                        img: columns[4]?.replace(/"/g, '').trim() 
                    };
                }).filter(it => it.name && !isNaN(it.price));

                if (state.items.length === 0) throw new Error("Empty sheet parsing results");

            } catch (e) {
                console.warn("[SYSTEM WARNING]: Switching to Fallback Offline Mode.", e);
                state.items = FALLBACK_DATABASE;
            } finally {
                renderCats();
                renderCards(state.items);
            }
        }

        function renderCats() {
            const cats = ['Все', ...new Set(state.items.map(i => i.cat).filter(Boolean))];
            document.getElementById('categories').innerHTML = cats.map(c => `
                <button onclick="filterCat('${c}')" class="cat-chip ${state.activeCat === c ? 'active' : ''}">${c}</button>
            `).join('');
        }

        function renderCards(data) {
            const container = document.getElementById('catalog');
            container.innerHTML = data.map(it => `
                <div onclick="openModal('${it.name}')" class="product-card p-4 flex items-center gap-4">
                    <img src="${it.img}" class="w-16 h-16 object-cover rounded-xl border border-white/5 shadow-xl" onerror="this.src='https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?w=150'">
                    <div class="flex-1">
                        <span class="text-[7px] text-cyan-500 font-orb uppercase tracking-widest">${it.cat || 'SERVICES'}</span>
                        <h3 class="font-bold text-[13px] uppercase tracking-tight">${it.name}</h3>
                        <p class="text-base font-orb font-black mt-1 text-cyan-400">${it.price.toLocaleString()}</p>
                    </div>
                </div>
            `).join('');
        }

        function filterCat(c) {
            state.activeCat = c;
            renderCats();
            renderCards(c === 'Все' ? state.items : state.items.filter(i => i.cat === c));
            tg.HapticFeedback.impactOccurred('light');
        }

        /* КОРЗИНА И ОФОРМЛЕНИЕ */
        function openModal(name) {
            const it = state.items.find(x => x.name === name);
            if (!it) return;
            state.selected = it;
            document.getElementById('modal-title').innerText = it.name;
            document.getElementById('modal-img').src = it.img;
            document.getElementById('modal-price').innerText = it.price.toLocaleString();
            document.getElementById('modal-desc').innerText = it.desc || 'System data packet: encrypted.';
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        function toCart() {
            state.cart.push(state.selected);
            updateCart();
            closeModal();
          tg.HapticFeedback.notificationOccurred('success');
        }

        function updateCart() {
            const badge = document.getElementById('cart-badge');
            const box = document.getElementById('cart-box');
            const list = document.getElementById('cart-list');
            const empty = document.getElementById('cart-empty');
            if(state.cart.length > 0) {
                badge.classList.remove('hidden'); box.classList.remove('hidden'); empty.classList.add('hidden');
                let total = 0;
                list.innerHTML = state.cart.map((it, i) => {
                    total += it.price;
                    return `
                    <div class="glass p-4 rounded-2xl flex items-center gap-4">
                        <img src="${it.img}" class="w-10 h-10 object-cover rounded-lg" onerror="this.src='https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?w=150'">
                        <div class="flex-1 text-[10px] font-bold uppercase">${it.name}</div>
                        <button onclick="state.cart.splice(${i},1);updateCart();" class="text-red-500 opacity-50 px-2">Удалить</button>
                    </div>`;
                }).join('');
                document.getElementById('total-val').innerText = total.toLocaleString();
            } else { badge.classList.add('hidden'); box.classList.add('hidden'); empty.classList.remove('hidden'); }
        }

        /* ИМИТАЦИЯ БАНКА */
        function startPayment() {
            const contact = document.getElementById('order-to').value;
            if(!contact) return tg.showAlert("Введите контакты для связи!");
            
            const totalSum = document.getElementById('total-val').innerText;
            document.getElementById('pay-amount').innerText = totalSum;
            document.getElementById('payment-terminal').style.display = 'flex';
            
            setTimeout(() => { 
                document.getElementById('pay-progress').style.width = "100%"; 
                document.getElementById('pay-status').innerText = "Оплата подтверждена..."; 
            }, 500);

            setTimeout(() => {
                const msg = `💠 [НОВЫЙ ЗАКАЗ]\n👤 КЛИЕНТ: @${tg.initDataUnsafe?.user?.username || 'anon'}\n💰 СУММА: ${totalSum}\n📍 КОНТАКТ: ${contact}\n📝 ИНСТРУКЦИЯ: ${document.getElementById('order-msg').value}\n📦 ПАКЕТЫ:\n` + state.cart.map(i => `- ${i.name}`).join('\n');
                tg.sendData(JSON.stringify({ admin_id: _VAULT.ADMIN, message: msg }));
                
                try {
                    confetti({ particleCount: 150, spread: 60 });
                } catch(err){}
                
                setTimeout(() => tg.close(), 1500);
            }, 3500);
        }

        /* ВСПОМОГАТЕЛЬНЫЕ СИСТЕМЫ */
        function copyRef() {
            const userId = tg.initDataUnsafe?.user?.id || _VAULT.ADMIN;
            navigator.clipboard.writeText(`https://t.me/BossStoreBot?start=ref${userId}`);
            tg.showAlert("Реферальная ссылка скопирована!");
        }

        function copyEmail() {
            navigator.clipboard.writeText(_VAULT.EMAIL);
            tg.showAlert("Адрес почты скопирован в буфер обмена!");
        }

        function renderFAQ() {
            document.getElementById('faq-list').innerHTML = FAQ.map(f => `
                <div class="glass p-5 rounded-2xl" onclick="this.querySelector('p').classList.toggle('hidden')">
                    <div class="flex justify-between items-center text-[10px] font-bold uppercase font-orb">
                        <span>${f.q}</span>
                        <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                    </div>
                    <p class="mt-3 text-[10px] opacity-40 leading-relaxed hidden">${f.a}</p>
                </div>
            `).join('');
        }

        function switchPage(p) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.getElementById('page-' + p).classList.add('active');
            
            document.querySelectorAll('nav button').forEach(b => {
                b.style.color = "rgb(107, 114, 128)"; // gray-500
            });
            document.getElementById('nav-' + p).style.color = "var(--accent)";
            window.scrollTo(0,0);
        }

        function toggleLang() {
            _VAULT.LANG = _VAULT.LANG === 'RU' ? 'EN' : 'RU';
            localStorage.setItem('v21_lang', _VAULT.LANG);
            updateLangUI();
        }

        function updateLangUI() {
            const d = TRANSLATIONS[_VAULT.LANG];
            document.querySelectorAll('[data-t]').forEach(el => {
                el.innerText = d[el.getAttribute('data-t')];
            });
            document.getElementById('lang-btn').innerText = _VAULT.LANG;
            document.getElementById('search').placeholder = d.search;
        }

        function toggleTheme() {
            _VAULT.THEME = _VAULT.THEME === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', _VAULT.THEME);
            localStorage.setItem('v21_theme', _VAULT.THEME);
            applyThemeUI();
        }

        function applyThemeUI() {
            const iconSvg = document.getElementById('theme-icon');
            if (_VAULT.THEME === 'light') {
                iconSvg.innerHTML = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>`;
            } else {
                iconSvg.innerHTML = `<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>`;
            }
        }

        document.getElementById('search').oninput = (e) => {
            const v = e.target.value.toLowerCase();
            renderCards(state.items.filter(i => i.name.toLowerCase().includes(v)));
        };
    </script>
</body>
</html>
