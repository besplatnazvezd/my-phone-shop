<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOSS STORE - PREMIUM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #FFD700; --dark-bg: #000000; --card-bg: #0a0a0a; }
        body { font-family: 'Montserrat', sans-serif; background: var(--dark-bg); color: #fff; margin: 0; padding-bottom: 100px; -webkit-font-smoothing: antialiased; }

        /* Эстетичные карточки */
        .boss-card { background: var(--card-bg); border: 1px solid rgba(255, 215, 0, 0.05); border-radius: 24px; overflow: hidden; position: relative; transition: all 0.3s ease; }
        .boss-card:active { transform: scale(0.98); }
        .btn-gold { background: linear-gradient(180deg, #FFD700 0%, #BA8B02 100%); color: #000; font-weight: 900; text-transform: uppercase; border-radius: 14px; transition: 0.2s; box-shadow: 0 4px 15px rgba(255, 215, 0, 0.2); }
        
        /* РЕДКОСТЬ (Standoff) */
        .rarity-common { border-bottom: 4px solid #4b69ff; background: linear-gradient(180deg, rgba(75,105,255,0.1) 0%, transparent 100%); }
        .rarity-rare { border-bottom: 4px solid #8847ff; background: linear-gradient(180deg, rgba(136,71,255,0.1) 0%, transparent 100%); }
        .rarity-epic { border-bottom: 4px solid #d32ee6; background: linear-gradient(180deg, rgba(211,46,230,0.1) 0%, transparent 100%); }
        .rarity-arcane { border-bottom: 4px solid #eb4b4b; background: linear-gradient(180deg, rgba(235,75,75,0.1) 0%, transparent 100%); }

        /* РУЛЕТКА */
        .roulette-wrapper { position: relative; width: 100%; height: 140px; overflow: hidden; background: #050505; border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; }
        .roulette-strip { display: flex; position: absolute; left: 0; transition: transform 8s cubic-bezier(0.1, 0, 0.05, 1); will-change: transform; }
        .roulette-item { min-width: 110px; height: 140px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-right: 1px solid rgba(255,255,255,0.02); }
                .roulette-pointer { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: var(--gold); z-index: 10; box-shadow: 0 0 15px var(--gold); transform: translateX(-50%); }

        /* ТАБ БАР */
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(5,5,5,0.95); backdrop-filter: blur(10px); border-top: 1px solid rgba(255,255,255,0.05); padding: 12px 10px 30px; display: flex; justify-content: space-around; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #444; font-size: 9px; font-weight: 800; text-transform: uppercase; transition: 0.3s; }
        .nav-item.active { color: var(--gold); }

        /* МОДАЛКИ */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 5000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .hidden { display: none !important; }

        /* СКРЕТЧ КАРТА */
        #scratch-container { position: relative; width: 280px; height: 160px; background: #111; border-radius: 20px; overflow: hidden; display: flex; items: center; justify-content: center; }
        canvas { position: absolute; top: 0; left: 0; z-index: 10; cursor: crosshair; touch-action: none; }

        .vip-progress-bg { background: rgba(255,255,255,0.05); height: 6px; border-radius: 10px; overflow: hidden; }
        .vip-progress-fill { background: var(--gold); height: 100%; box-shadow: 0 0 10px var(--gold); }

        /* Загрузка */
        #loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="loader"><div class="animate-spin rounded-full h-10 w-10 border-t-2 border-yellow-500"></div></div>
    <div id="toast" class="fixed top-5 left-1/2 -translate-x-1/2 bg-yellow-500 text-black px-6 py-2 rounded-full font-black text-[10px] z-[10000] hidden">СКОПИРОВАНО</div>

    <main id="main-view" class="px-5 pt-8">
        <!-- Сюда рендерится контент -->
    </main>

    <!-- РУЛЕТКА МОДАЛКА -->
    <div id="modal-roulette" class="modal hidden">
        <div class="w-full text-center">
                        <h2 class="text-xl font-black italic text-yellow-500 uppercase mb-8 tracking-tighter">ОТКРЫТИЕ КЕЙСА</h2>
            <div class="roulette-wrapper">
                <div class="roulette-pointer"></div>
                <div id="roulette-strip" class="roulette-strip"></div>
            </div>
            <div id="won-display" class="hidden mt-10 animate-pulse">
                <p class="text-[10px] opacity-40 uppercase mb-2">Предмет получен:</p>
                <h3 id="won-item-name" class="text-2xl font-black text-yellow-500 uppercase italic"></h3>
                <button onclick="claimPrize()" class="btn-gold px-12 py-4 mt-8 text-[10px]">ЗАБРАТЬ В ИНВЕНТАРЬ</button>
            </div>
        </div>
    </div>

    <!-- ОПЛАТА МОДАЛКА -->
    <div id="modal-pay" class="modal hidden">
        <div class="boss-card w-full max-w-sm p-8 text-center border-yellow-500/20">
            <h2 class="text-yellow-500 font-black italic uppercase mb-6">Оплата Кейса</h2>
            <div class="space-y-4 mb-8">
                <div onclick="copyText('4100119121976236')" class="bg-white/5 p-4 rounded-2xl text-left active:scale-95 transition">
                    <p class="text-[8px] opacity-40 uppercase">ЮMoney</p>
                    <p class="font-bold text-sm">4100 1191 2197 6236</p>
                </div>
                <div onclick="copyText('2200701955299232')" class="bg-white/5 p-4 rounded-2xl text-left active:scale-95 transition">
                    <p class="text-[8px] opacity-40 uppercase">Карта</p>
                    <p class="font-bold text-sm">2200 7019 5529 9232</p>
                </div>
            </div>
            <button onclick="startMysteryRoll()" class="btn-gold w-full py-5 text-[10px]">Я ОПЛАТИЛА</button>
        </div>
    </div>

    <nav class="nav-bar">
        <div onclick="render('shop')" id="nav-shop" class="nav-item active"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a8 8 0 100 16 8 8 0 000-16zM9 9V5a1 1 0 112 0v4h3a1 1 0 110 2h-4v4a1 1 0 11-2 0v-4H6a1 1 0 110-2h3z"/></svg><span>Шоп</span></div>
        <div onclick="render('luck')" id="nav-luck" class="nav-item"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M11 3a1 1 0 10-2 0v1a1 1 0 102 0V3zM5.884 4.47a1 1 0 10-1.415 1.413l.708.709a1 1 0 101.414-1.414l-.707-.708zM14.116 4.47l-.707.708a1 1 0 101.414 1.414l.708-.709a1 1 0 10-1.415-1.412zM11 8a3 3 0 10-6 0 3 3 0 006 0zM2.5 10a1 1 0 100 2h1a1 1 0 100-2h-1zM15.5 10a1 1 0 100 2h1a1 1 0 100-2h-1zM3 15.364a1 1 0 101.414 1.414l.707-.707a1 1 0 10-1.414-1.414l-.707.707zM16.293 15.364l-.707-.707a1 1 0 10-1.414 1.414l.707.707a1 1 0 101.414-1.414zM9 15v1a1 1 0 102 0v-1a1 1 0 10-2 0z"/></svg><span>Удача</span></div>
        <div onclick="render('status')" id="nav-status" class="nav-item"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M2 10a8 8 0 018-8v8h8a8 8 0 11-16 0z"/><path d="M12 2.252A8.014 8.014 0 0117.748 8H12V2.252z"/></svg><span>Статус</span></div>
        <div onclick="render('support')" id="nav-support" class="nav-item"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M18 10c0 3.866-3.582 7-8 7a8.841 8.841 0 01-4.083-.98L2 17l1.338-3.123C2.493 12.767 2 11.434 2 10c0-3.866 3.582-7 8-7s8 3.134 8 7z"/></svg><span>Связь</span></div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        const CSV_URL = 'https://docs.google.com/spreadsheets/d/1q9vPlWM9t934ACzIwbZU4_EDtvpJdfO09-jodyIi9Ew/export?format=csv';

        let state = JSON.parse(localStorage.getItem('BOSS_PREMIUM_V1')) || { discount: 0, lastLuck: 0, spent: 1177469 };
        
        const POOL = [
            { n: "1000 звёзд", r: "arcane", i: "⭐" },
            { n: "Прем на год", r: "arcane", i: "👑" },
            { n: "Прем на 6 месяцев", r: "epic", i: "💎" },
            { n: "500 звёзд", r: "epic", i: "🌟" },
            { n: "Канал Анонимность", r: "rare", i: "🕶️" },
            { n: "Бонус-код", r: "rare", i: "🏷️" },
            { n: "100 звёзд", r: "common", i: "✨" },
            { n: "ТГ Аккаунт", r: "common", i: "📱" }
        ];

        let winningItem = null;

        function isMysteryTime() {
            const msk = new Date(new Date().getTime() + (new Date().getTimezoneOffset() + 180) * 60000);
            return msk.getHours() === 0;
        }

        async function render(page) {
            const view = document.getElementById('main-view');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('nav-'+page).classList.add('active');
            
            if(page === 'shop') {
                view.innerHTML = `
                <header class="text-center mb-8">
                    <h1 class="text-2xl font-black italic text-yellow-500 uppercase italic">ДОБРЫЙ ДЕНЬ, BOSS</h1>
                    <p class="text-[8px] opacity-20 tracking-[5px] font-bold">WELCOME BOSS SYSTEM</p>
                </header>`;

                if(isMysteryTime()) {
                    view.innerHTML += `
                    <div onclick="openMysteryPay()" class="boss-card p-6 mb-8 border border-yellow-500/30 bg-gradient-to-br from-yellow-500/10 to-transparent flex items-center justify-between">
                        <div>
                            <h3 class="text-sm font-black italic text-yellow-500 uppercase leading-none">MYSTERY CASE</h3>
                            <p class="text-[7px] opacity-40 uppercase mt-2 font-bold tracking-widest">LIMITED EDITION • 1 HOUR ONLY</p>
                        </div>
                        <div class="text-right">
                            <span class="text-lg font-black italic">499 ₽</span>
                        </div>
                    </div>`;
                }

                const grid = document.createElement('div');
                grid.className = 'grid grid-cols-2 gap-5 pb-10';
                view.appendChild(grid);

                const res = await fetch(CSV_URL);
                const text = await res.text();
                const rows = text.split('\n').slice(1);
                
                grid.innerHTML = rows.map(r => {
                    const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if(!c[1]) return '';
                    const name = c[1].replace(/"/g,''), price = c[2], desc = c[3]?.replace(/"/g,'') || '', img = c[4]?.replace(/"/g,'') || '', stock = parseInt(c[5]) || 0;
                    const out = stock <= 0;
                    return `
                    <div class="boss-card p-4 flex flex-col ${out ? 'opacity-40' : ''}">
                        <div class="relative mb-4">
                            <img src="${img}" class="w-full aspect-square object-contain bg-white/5 rounded-2xl p-2">
                        </div>
                        <h3 class="text-[10px] font-black text-yellow-500 uppercase mb-1 truncate">${name}</h3>
                        <p class="text-[7px] opacity-40 uppercase font-bold mb-3 h-4 truncate">${desc}</p>
                        <div class="mt-auto">
                            <div class="flex justify-between items-center mb-3">
                                <span class="text-xs font-black italic">${price} ₽</span>
                                <span class="text-[7px] font-black ${out ? 'text-red-500' : 'text-green-500'} uppercase">${out ? 'SOLD OUT' : stock+' ШТ.'}</span>
                            </div>
                            <button onclick="buy('${name}',${price})" ${out ? 'disabled' : ''} class="btn-gold w-full py-2.5 text-[9px]">${out ? 'ЖДЕМ' : 'ДОБАВИТЬ'}</button>
                        </div>
                    </div>`;
                }).join('');
                document.getElementById('loader').style.display = 'none';
            }

            if(page === 'luck') {
                const available = (Date.now() - state.lastLuck) > 86400000;
                view.innerHTML = `
                <div class="flex flex-col items-center pt-10">
                    <h2 class="text-yellow-500 font-black italic uppercase mb-8">Стирай и выигрывай</h2>
                    <div id="scratch-container" class="boss-card">
                        <div class="text-5xl font-black text-yellow-500" id="scratch-res">${state.discount > 0 ? '-'+state.discount+'%' : '?'}</div>
                        ${available ? '<canvas id="scratch-canvas"></canvas>' : ''}
                    </div>
                    <p class="text-[9px] opacity-40 uppercase font-bold mt-10 tracking-widest">ПРИХОДИ ЗАВТРА ЗА НОВОЙ СКИДКОЙ!</p>
                </div>`;
                if(available) initScratch();
            }

            if(page === 'status') {
                view.innerHTML = `
                <div class="boss-card p-8 bg-gradient-to-b from-white/5 to-transparent">
                    <p class="text-[8px] font-black text-yellow-500 uppercase mb-6 italic tracking-widest">КАРТОЧКА БОССА</p>
                    <div class="mb-10">
                        <div class="flex justify-between text-[10px] font-black mb-3 italic"><span>ПРОГРЕСС VIP</span><span>${state.spent.toLocaleString()} / 5,000,000 ₽</span></div>
                        <div class="vip-progress-bg"><div class="vip-progress-fill" style="width:${Math.min(state.spent/50000, 100)}%"></div></div>
                    </div>
                    <div class="grid grid-cols-2 gap-y-6 gap-x-4 text-[9px] font-black uppercase opacity-60">
                        <div><p class="opacity-40 mb-1">ID КЛИЕНТА</p>${tg.initDataUnsafe.user?.id || '7727345054'}</div>
                        <div><p class="opacity-40 mb-1">USER</p>@${tg.initDataUnsafe.user?.username || 'nmproda'}</div>
                        <div><p class="opacity-40 mb-1">СКИДКА</p>${state.discount}%</div>
                        <div><p class="opacity-40 mb-1">РЕГИСТРАЦИЯ</p>17.04.2026</div>
                    </div>
                </div>`;
            }

            if(page === 'support') {
                view.innerHTML = `
                <div class="space-y-4 pt-10">
                    <div onclick="window.open('https://t.me/+P3p-W1BvO8syMzVi')" class="boss-card p-6 flex items-center justify-between group active:scale-95 transition">
                        <div class="flex items-center gap-6"><span class="text-3xl">📢</span><div><h3 class="font-black uppercase italic text-sm">КАНАЛ БОССА</h3><p class="text-[8px] opacity-30 uppercase font-bold">НОВОСТИ И ОБНОВЛЕНИЯ</p></div></div>
                        <svg class="w-4 h-4 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"/></svg>
                    </div>
                    <div onclick="window.open('https://t.me/nmproda')" class="boss-card p-6 flex items-center justify-between group active:scale-95 transition">
                        <div class="flex items-center gap-6"><span class="text-3xl">🤵</span><div><h3 class="font-black uppercase italic text-sm">МЕНЕДЖЕР</h3><p class="text-[8px] opacity-30 uppercase font-bold">@NMPRODA</p></div></div>
                        <svg class="w-4 h-4 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"/></svg>
                    </div>
                </div>`;
            }
        }

        function openMysteryPay() { document.getElementById('modal-pay').classList.remove('hidden'); }

        function startMysteryRoll() {
            document.getElementById('modal-pay').classList.add('hidden');
            document.getElementById('modal-roulette').classList.remove('hidden');
            
            const strip = document.getElementById('roulette-strip');
            let content = '';
            for(let i=0; i<80; i++) {
                const item = POOL[Math.floor(Math.random()*POOL.length)];
                content += `<div class="roulette-item rarity-${item.r}"><span class="text-3xl mb-2">${item.i}</span><span class="text-[8px] font-black uppercase text-center">${item.n}</span></div>`;
            }
            strip.innerHTML = content;

            const winIdx = 70;
            winningItem = POOL[Math.floor(Math.random()*POOL.length)];
            const winEl = strip.querySelectorAll('.roulette-item')[winIdx];
            winEl.innerHTML = `<span class="text-3xl mb-2">${winningItem.i}</span><span class="text-[8px] font-black uppercase text-center">${winningItem.n}</span>`;
            winEl.className = `roulette-item rarity-${winningItem.r}`;

            setTimeout(() => {
                const offset = (winIdx * 110) - (document.querySelector('.roulette-wrapper').offsetWidth / 2) + 55;
                strip.style.transform = `translateX(-${offset}px)`;
            }, 100);

            setTimeout(() => {
                document.getElementById('won-display').classList.remove('hidden');
                document.getElementById('won-item-name').innerText = winningItem.n;
                tg.HapticFeedback.notificationOccurred('success');
            }, 8500);
        }

        function claimPrize() {
            window.open(`https://t.me/nmproda?text=Босс, оплатила кейс! Выпал приз: ${winningItem.n}. Мой ID: ${tg.initDataUnsafe.user?.id || 'Queen'}`);
            location.reload();
        }

        function buy(name, price) {
            const final = Math.floor(price * (1 - state.discount/100));
            window.open(`https://t.me/nmproda?text=Босс, хочу купить: ${name}. Цена со скидкой: ${final} ₽. Мой ID: ${tg.initDataUnsafe.user?.id || 'Queen'}`);
        }

        function initScratch() {
            const can = document.getElementById('scratch-canvas'), ctx = can.getContext('2d');
            can.width = 280; can.height = 160;
            ctx.fillStyle = '#222'; ctx.fillRect(0,0,280,160);
            ctx.fillStyle = '#FFD700'; ctx.font = '900 20px Montserrat'; ctx.fillText('BOSS STORE', 70, 90);
            
            let painting = false;
            const clear = (e) => {
                if(!painting) return;
                const rect = can.getBoundingClientRect();
                const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
                const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath(); ctx.arc(x, y, 20, 0, Math.PI*2); ctx.fill();
                
                const pixels = ctx.getImageData(0,0,280,160).data;
                let trans = 0;
                for(let i=3; i<pixels.length; i+=4) if(pixels[i] === 0) trans++;
                if(trans > pixels.length/4 * 0.6) {
                    can.remove();
                    state.discount = Math.floor(Math.random()*3)+1;
                    state.lastLuck = Date.now();
                    save();
                    document.getElementById('scratch-res').innerText = `-${state.discount}%`;
                }
            };
            can.addEventListener('mousedown', () => painting = true);
            can.addEventListener('touchstart', () => painting = true);
            window.addEventListener('mouseup', () => painting = false);
            window.addEventListener('touchend', () => painting = false);
            can.addEventListener('mousemove', clear);
            can.addEventListener('touchmove', clear);
        }

        function copyText(t) {
            navigator.clipboard.writeText(t);
            const toast = document.getElementById('toast');
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 1500);
            tg.HapticFeedback.impactOccurred('heavy');
        }

        function save() { localStorage.setItem('BOSS_PREMIUM_V1', JSON.stringify(state)); }
        
        render('shop');
    </script>
</body>
</html>
