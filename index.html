            --border: rgba(0, 242, 255, 0.15);

        :root[data-theme="light"] {
            --bg: #f5f7fa;
            --panel: rgba(255, 255, 255, 0.95);
            --accent: #0066ff;
            --text-main: #0f172a;
            --text-dim: #64748b;
            --border: rgba(0, 102, 255, 0.1);
            --card-bg: #ffffff;

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg);
            color: var(--text-main);
            transition: background 0.4s ease;
            overflow-x: hidden;
            user-select: none;

        .neural-grid {
            position: fixed; inset: 0;
            background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 30px 30px; z-index: -1;
            mask-image: radial-gradient(circle at 50% 50%, black, transparent 95%);
            opacity: 0.3;
        }

        .cat-chip {
            padding: 8px 16px; font-size: 9px; font-weight: 800; text-transform: uppercase;
            border-radius: 10px; border: 1px solid var(--border); background: var(--card-bg);
            color: var(--text-dim); transition: 0.3s; white-space: nowrap; letter-spacing: 1px;
        }
        .cat-chip.active {
            background: var(--accent); color: #000; border-color: var(--accent);

              .glass { background: var(--panel); backdrop-filter: blur(25px); border: 1px solid var(--border); }
        .product-card { background: var(--card-bg); border-radius: 20px; border: 1px solid var(--border); transition: 0.3s; }

        };

        const TRANSLATIONS = {
            RU: { ref_title: "НЕЙРО-СЕТЬ", ref_desc: "Развивайте сеть и получайте 10% от транзакций ваших рефералов.", ref_copy: "Копировать линк", faq_title: "ИНФО-ЦЕНТР", cart_empty: "СИГНАЛ ПУСТ", total: "Итого", buy_btn: "Оплатить через ЮKassa", add_to_cart: "В КОРЗИНУ", support_text: "СВЯЗЬ С АРХИТЕКТОРОМ:", search: "Поиск данных..." },
            EN: { ref_title: "NEURAL NETWORK", ref_desc: "Grow the network and earn 10% from your referrals.", ref_copy: "Copy ID Link", faq_title: "INFO HUB", cart_empty: "SIGNAL EMPTY", total: "Total Amount", buy_btn: "Authorize Payment", add_to_cart: "ADD TO BAG", support_text: "CONTACT ARCHITECT:", search: "Searching database..." }
        };

        const FAQ = [
            { q: "Как я получу товар?", a: "После оплаты услуга/товар придет в ваш Telegram или Email, который вы указали." },
            { q: "Безопасно ли это?", a: "Мы используем официальный шлюз ЮKassa. Ваши данные защищены." },
            { q: "Можно ли сделать возврат?", a: "Да, если товар не был активирован и возникла техническая проблема." }
        ];

        const tg = window.Telegram.WebApp;
        let state = { items: [], cart: [], activeCat: 'Все' };

        window.onload = () => {
            document.documentElement.setAttribute('data-theme', _VAULT.THEME);
            updateLangUI();
            loadDB();
            renderFAQ();
            lucide.createIcons();
            tg.expand();
            document.getElementById('user-name').innerText = (tg.initDataUnsafe.user?.first_name || 'ADMIN').toUpperCase();
        };

        async function loadDB() {
            const container = document.getElementById('catalog');
            const errorBox = document.getElementById('error-box');
            try {
                const r = await fetch(_VAULT.CSV);
                if(!r.ok) throw new Error();
                const t = await r.text();
                const rows = t.split(/\r?\n/).filter(row => row.trim() !== '').slice(1);
                state.items = rows.map(row => {
                    const c = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    return { cat: c[0]?.replace(/"/g, '').trim(), name: c[1]?.replace(/"/g, '').trim(), price: parseFloat(c[2]), desc: c[3]?.replace(/"/g, '').trim(), img: c[4]?.replace(/"/g, '').trim() };
                }).filter(it => it.name && !isNaN(it.price));

                errorBox.classList.add('hidden');
                renderCats();
                renderCards(state.items);
            } catch (e) {
                container.innerHTML = '';
                errorBox.classList.remove('hidden');
            }
        }

        function renderCats() {
            const cats = ['Все', ...new Set(state.items.map(i => i.cat).filter(Boolean))];
            document.getElementById('categories').innerHTML = cats.map(c => `<button onclick="filterCat('${c}')" class="cat-chip ${state.activeCat === c ? 'active' : ''}">${c}</button>`).join('');
        }

        function renderCards(data) {
            const container = document.getElementById('catalog');
            container.innerHTML = data.map(it => `
                <div onclick="openModal('${it.name}')" class="product-card p-4 flex items-center gap-4">
                    <img src="${it.img}" class="w-16 h-16 object-cover rounded-xl border border-white/5 shadow-xl" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3081/3081840.png'">
                    <div class="flex-1">
                        <span class="text-[7px] text-cyan-500 font-orb uppercase tracking-widest">${it.cat}</span>
                        <h3 class="font-bold text-[13px] uppercase tracking-tight">${it.name}</h3>
                        <p class="text-base font-orb font-black mt-1 text-cyan-400">${it.price.toLocaleString()}</p>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function filterCat(c) {
            state.activeCat = c;
            renderCats();
            renderCards(c === 'Все' ? state.items : state.items.filter(i => i.cat === c));
            tg.HapticFeedback.impactOccurred('light');
        }

        function openModal(name) {
            const it = state.items.find(x => x.name === name);
            state.selected = it;
            document.getElementById('modal-title').innerText = it.name;
            document.getElementById('modal-img').src = it.img;
            document.getElementById('modal-price').innerText = it.price.toLocaleString();
            document.getElementById('modal-desc').innerText = it.desc || 'Packet encrypted.';
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        function toCart() {
            state.cart.push(state.selected);
            updateCart();
            closeModal();
            tg.HapticFeedback.notificationOccurred('success');
        }

        function updateCart() {
            const badge = document.getElementById('cart-badge');
            const box = document.getElementById('cart-box');
            const list = document.getElementById('cart-list');
            const empty = document.getElementById('cart-empty');
            if(state.cart.length > 0) {
                badge.classList.remove('hidden'); box.classList.remove('hidden'); empty.classList.add('hidden');
                let total = 0;
                list.innerHTML = state.cart.map((it, i) => {
                    total += it.price;
                    return `<div class="glass p-4 rounded-2xl flex items-center gap-4"><img src="${it.img}" class="w-10 h-10 object-cover rounded-lg"><div class="flex-1 text-[10px] font-bold uppercase">${it.name}</div><button onclick="state.cart.splice(${i},1);updateCart();" class="text-red-500 opacity-50"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div>`;
                }).join('');
                document.getElementById('total-val').innerText = total.toLocaleString();
            } else { badge.classList.add('hidden'); box.classList.add('hidden'); empty.classList.remove('hidden'); }
            lucide.createIcons();
        }

        function startPayment() {
            if(!document.getElementById('order-to').value) return tg.showAlert("Введите контакты!");
            document.getElementById('payment-terminal').style.display = 'flex';
            setTimeout(() => { document.getElementById('pay-progress').style.width = "100%"; document.getElementById('pay-status').innerText = "Redirecting to Bank..."; }, 500);
            setTimeout(() => {
                const msg = `💠 [ORDER 2100]\n👤 BY: @${tg.initDataUnsafe.user?.username || 'anon'}\n💰 TOTAL: ${document.getElementById('total-val').innerText}\n📍 DEST: ${document.getElementById('order-to').value}\n📦 ITEMS:\n` + state.cart.map(i => `- ${i.name}`).join('\n');
                tg.sendData(JSON.stringify({ admin_id: _VAULT.ADMIN, message: msg }));
                confetti({ particleCount: 150, spread: 60 });
                setTimeout(() => tg.close(), 2000);
            }, 3500);
        }

        function copyRef() { navigator.clipboard.writeText("https://t.me/BossStoreBot?start=ref" + (tg.initDataUnsafe.user?.id || '7727345054')); tg.showAlert("Линк скопирован!"); }
        function copyEmail() { navigator.clipboard.writeText(_VAULT.EMAIL); tg.showAlert("Email скопирован!"); }
        
        function renderFAQ() {
            document.getElementById('faq-list').innerHTML = FAQ.map(f => `<div class="glass p-5 rounded-2xl" onclick="this.querySelector('p').classList.toggle('hidden')"><div class="flex justify-between items-center text-[10px] font-bold uppercase font-orb"><span>${f.q}</span><i data-lucide="chevron-down" class="w-3 h-3"></i></div><p class="mt-3 text-[10px] opacity-40 leading-relaxed hidden">${f.a}</p></div>`).join('');
            lucide.createIcons();
        }

        function switchPage(p) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.getElementById('page-' + p).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => b.classList.replace('text-cyan-400', 'text-gray-500'));
            document.getElementById('nav-' + p).classList.replace('text-gray-500', 'text-cyan-400');
            window.scrollTo(0,0);
        }

        function toggleLang() { _VAULT.LANG = _VAULT.LANG === 'RU' ? 'EN' : 'RU'; localStorage.setItem('v21_lang', _VAULT.LANG); updateLangUI(); }
        function updateLangUI() { const d = TRANSLATIONS[_VAULT.LANG]; document.querySelectorAll('[data-t]').forEach(el => { el.innerText = d[el.getAttribute('data-t')]; }); document.getElementById('lang-btn').innerText = _VAULT.LANG; document.getElementById('search').placeholder = d.search; }
        function toggleTheme() { _VAULT.THEME = _VAULT.THEME === 'dark' ? 'light' : 'dark'; document.documentElement.setAttribute('data-theme', _VAULT.THEME); localStorage.setItem('v21_theme', _VAULT.THEME); lucide.createIcons(); }

        document.getElementById('search').oninput = (e) => { const v = e.target.value.toLowerCase(); renderCards(state.items.filter(i => i.name.toLowerCase().includes(v))); };
    </script>
</body>
</html>
