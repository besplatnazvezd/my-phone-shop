<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOSS STORE PREMIER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --main: #EAB308; --vip: #A855F7; }
        body { font-family: 'Montserrat', sans-serif; background: #000; color: #fff; padding-bottom: 140px; }
        .glass { background: #111; border: 1px solid rgba(255, 255, 255, 0.1); }
        .nav-btn { color: #666; transition: 0.3s; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-btn.active { color: var(--main); }
        
        /* КНОПКИ */
        .btn-primary { background: var(--main); color: #000; font-weight: 900; text-transform: uppercase; border-radius: 18px; transition: 0.2s; }
        .btn-primary:active { transform: scale(0.95); }
        
        @keyframes fire { 0% { box-shadow: 0 0 5px #ff4400; } 50% { box-shadow: 0 0 20px #ffbb00; } 100% { box-shadow: 0 0 5px #ff4400; } }
        .hot-btn { animation: fire 1s infinite; background: linear-gradient(90deg, #ff8800, #ff0000) !important; color: #fff !important; }

        .cat-btn { white-space: nowrap; padding: 12px 24px; border-radius: 99px; font-size: 11px; font-weight: 900; text-transform: uppercase; background: #1a1a1a; border: 1px solid #333; }
        .cat-btn.active { background: var(--main); color: #000; border-color: var(--main); }

        #wheel-svg { width: 100%; height: 100%; transition: transform 5s cubic-bezier(0.1, 0, 0.2, 1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <header class="p-8 text-center">
        <h1 id="main-logo" class="text-4xl font-black italic uppercase tracking-tighter" style="color: var(--main)">Boss Store</h1>
        <p class="text-[8px] text-gray-500 uppercase tracking-[4px] font-bold">Digital Empire</p>
    </header>

    <!-- КАТЕГОРИИ -->
    <div id="cats" class="flex overflow-x-auto gap-3 px-5 mb-8 no-scrollbar"></div>

    <!-- ТОВАРЫ -->
    <div id="app" class="px-5 grid grid-cols-2 gap-4"></div>
        <!-- КОРЗИНА -->
    <div id="cart-bar" class="fixed bottom-28 left-4 right-4 bg-[#111] border border-white/10 p-5 rounded-[30px] flex justify-between items-center hidden z-50 shadow-2xl">
        <div>
            <p id="total-price" class="text-2xl font-black italic" style="color: var(--main)">0 ₽</p>
            <p class="text-[8px] text-green-500 font-bold uppercase">Скидка применена</p>
        </div>
        <button onclick="window.openPay()" id="checkout-btn" class="btn-primary px-10 py-4 text-xs">ОФОРМИТЬ</button>
    </div>

    <!-- МЕНЮ -->
    <nav class="fixed bottom-0 left-0 right-0 bg-[#0a0a0a] border-t border-white/5 p-6 flex justify-around items-center z-[100] rounded-t-[40px]">
        <button onclick="window.nav('shop')" id="n-shop" class="nav-btn active"><svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" stroke-width="2"/></svg><span class="text-[9px] font-black uppercase">Шоп</span></button>
        <button onclick="window.nav('reviews')" id="n-reviews" class="nav-btn"><svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" stroke-width="2"/></svg><span class="text-[9px] font-black uppercase">Отзывы</span></button>
        <button onclick="window.nav('lucky')" id="n-lucky" class="nav-btn"><svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-width="2"/></svg><span class="text-[9px] font-black uppercase">Удача</span></button>
        <button onclick="window.nav('support')" id="n-support" class="nav-btn"><svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" stroke-width="2"/></svg><span class="text-[9px] font-black uppercase">Связь</span></button>
    </nav>

    <!-- ОКНО ОПЛАТЫ -->
    <div id="pay-modal" class="fixed inset-0 bg-black/95 flex items-center justify-center hidden z-[200] p-6">
                <div class="bg-[#111] w-full max-w-sm p-8 rounded-[40px] text-center border border-white/10 shadow-2xl">
            <h2 class="text-2xl font-black mb-6 uppercase" style="color: var(--main)">Оплата</h2>
            <div class="space-y-4 mb-8">
                <div onclick="window.copy('4100119121976236')" class="bg-white/5 p-4 rounded-2xl text-left active:bg-white/10">
                    <p class="text-[10px] opacity-40 uppercase font-black mb-1">ЮMoney</p>
                    <p class="text-base font-black tracking-tighter">4100 1191 2197 6236</p>
                </div>
                <div onclick="window.copy('2200701955299232')" class="bg-white/5 p-4 rounded-2xl text-left active:bg-white/10">
                    <p class="text-[10px] opacity-40 uppercase font-black mb-1">Карта Т-Банк</p>
                    <p class="text-base font-black tracking-tighter">2200 7019 5529 9232</p>
                </div>
                <div onclick="window.copy('+79501700787')" class="bg-white/5 p-4 rounded-2xl text-left active:bg-white/10">
                    <p class="text-[10px] opacity-40 uppercase font-black mb-1">СБП (Т-Банк / Сбер)</p>
                    <p class="text-base font-black tracking-tighter">+7 950 170 07 87</p>
                </div>
            </div>
            <button onclick="window.finishPay()" class="w-full py-6 btn-primary hot-btn text-sm">Я ОПЛАТИЛ(А)</button>
            <button onclick="window.closePay()" class="mt-6 text-xs opacity-30 uppercase font-bold text-white">Вернуться назад</button>
        </div>
    </div>

    <!-- ОКНО УСПЕХА -->
    <div id="success-modal" class="fixed inset-0 bg-black flex items-center justify-center hidden z-[300] p-6">
        <div class="bg-[#111] w-full max-w-sm p-10 rounded-[40px] text-center border border-green-500/30">
            <div class="text-6xl mb-6">✅</div>
            <h2 class="text-3xl font-black mb-4 uppercase text-green-500">ГОТОВО!</h2>
            <p class="text-sm opacity-70 mb-8 leading-relaxed">Чтобы получить товар, напиши админу и скинь <b>скриншот оплаты</b>.</p>
            <button onclick="window.location.href='https://t.me/nmproda'" class="w-full py-6 btn-primary hot-btn text-sm">НАПИСАТЬ АДМИНУ</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        const TOKEN = '8730430332:AAGff_PCX2059o3EUwG-d9C19uTqcH4sAZ4';
        const ADMIN = '7727345054';
        const CSV = 'https://docs.google.com/spreadsheets/d/1q9vPlWM9t934ACzIwbZU4_EDtvpJdfO09-jodyIi9Ew/export?format=csv';

        window.db = JSON.parse(localStorage.getItem('boss_final_v99')) || {
            cart: [], refs: 0, lastSpin: 0, discount: 0, vip: false
        };
        window.products = [];
        window.currentCat = 'Все';

        window.save = () => localStorage.setItem('boss_final_v99', JSON.stringify(window.db));

        window.nav = (p) => {
            const app = document.getElementById('app');
            const cats = document.getElementById('cats');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('n-'+p).classList.add('active');
            window.save();

            cats.style.display = (p === 'shop') ? 'flex' : 'none';

            if (p === 'shop') {
                const unique = ['Все', ...new Set(window.products.map(x => x.cat))];
                cats.innerHTML = unique.map(c => `<button onclick="window.setCat('${c}')" class="cat-btn ${window.currentCat === c ? 'active' : ''}">${c}</button>`).join('');
                
                const filtered = window.currentCat === 'Все' ? window.products : window.products.filter(x => x.cat === window.currentCat);
                app.innerHTML = filtered.map((prod, i) => `
                    <div class="bg-[#111] border border-white/5 p-3 rounded-[30px] flex flex-col relative">
                        <img src="${prod.img}" class="w-full aspect-square object-cover rounded-[22px] mb-3">
                        <h3 class="text-[10px] font-black uppercase truncate mb-1 opacity-70">${prod.name}</h3>
                        <div class="mt-auto">
                            <div class="text-xl font-black italic mb-3" style="color: var(--main)">${prod.price} ₽</div>
                            <div class="flex gap-1">
                                <input type="number" id="q-${i}" value="1" min="1" class="w-12 bg-white/5 rounded-xl text-center text-xs font-black text-white">
                                <button onclick="window.add(${i})" class="flex-1 py-3 btn-primary text-[9px]">В КОРЗИНУ</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            if (p === 'reviews') {
                app.innerHTML = `<div class="col-span-2 space-y-3">` + Array.from({length: 30}, (_, i) => `<div class="bg-[#111] p-5 rounded-[25px] border-l-4 border-yellow-500"><p class="text-xs font-bold italic">Босс Store — это уровень! Всё пришло за 5 минут. (#${i+1})</p></div>`).join('') + `</div>`;
            }
            if (p === 'lucky') {
                const can = (Date.now() - window.db.lastSpin) > 86400000;
                app.innerHTML = `
                <div class="col-span-2 flex flex-col items-center py-10">
                    <div class="relative w-72 h-72 mb-12">
                        <div id="wheel-svg">
                            <svg viewBox="0 0 100 100">
                                <circle cx="50" cy="50" r="48" fill="#111" stroke="#333" stroke-width="2"/>
                                <path d="M50 50 L50 2 A48 48 0 0 1 98 50 Z" fill="#EAB308"/>
                                <path d="M50 50 L98 50 A48 48 0 0 1 50 98 Z" fill="#A855F7"/>
                                <path d="M50 50 L50 98 A48 48 0 0 1 2 50 Z" fill="#222"/>
                                <path d="M50 50 L2 50 A48 48 0 0 1 50 2 Z" fill="#444"/>
                                <g font-size="4" font-weight="900" fill="white" text-anchor="middle">
                                    <text transform="translate(68 32) rotate(45)">VIP</text>
                                    <text transform="translate(68 68) rotate(135)">-5%</text>
                                    <text transform="translate(32 68) rotate(225)" fill="#555">0</text>
                                    <text transform="translate(32 32) rotate(315)">ROLL</text>
                                </g>
                            </svg>
                        </div>
                        <div class="absolute -top-4 left-1/2 -translate-x-1/2 w-0 h-0 border-l-[15px] border-r-[15px] border-t-[30px] border-t-white z-20"></div>
                    </div>
                    <button onclick="window.spin()" class="px-16 py-6 btn-primary ${can ? 'hot-btn' : 'opacity-20'}">${can ? 'КРУТИТЬ' : 'ЗАВТРА'}</button>
                </div>`;
            }

            if (p === 'support') {
                const user = tg.initDataUnsafe.user || {id: 0, first_name: 'Boss'};
                app.innerHTML = `
                <div class="col-span-2 space-y-5">
                    <div class="bg-[#111] p-8 rounded-[40px] text-center border border-white/5 shadow-2xl">
                        <h3 class="text-2xl font-black italic mb-2 uppercase text-white">${user.first_name}</h3>
                        <p class="text-[9px] opacity-30 uppercase tracking-[4px] mb-8">Platinum Member</p>
                        <div class="flex justify-around text-xs font-black uppercase italic">
                            <div><p class="opacity-30 mb-1">Скидка</p><p style="color:var(--main)">${window.db.discount}%</p></div>
                            <div><p class="opacity-30 mb-1">Воркеры</p><p>${window.db.refs}</p></div>
                        </div>
                    </div>
                    <button onclick="window.copy('https://t.me/Boss_storesvzbot?start=${user.id}')" class="w-full py-6 bg-white/5 rounded-3xl text-xs font-black uppercase border border-white/10">Копировать реф-ссылку</button>
                    <button onclick="window.location.href='https://t.me/nmproda'" class="w-full bg-yellow-500/10 p-6 rounded-[35px] flex items-center gap-5 border border-yellow-500/20">
                        <div class="bg-yellow-500 w-12 h-12 rounded-2xl flex items-center justify-center text-black font-black italic text-xl">M</div>
                        <div class="text-left font-black uppercase"><p class="text-sm text-white">Менеджер</p><p class="text-[10px] opacity-40 text-white">@nmproda</p></div>
                    </button>
                    <button onclick="window.location.href='https://t.me/boss_storemy'" class="w-full bg-white/5 p-6 rounded-[35px] flex items-center gap-5 border border-white/10">
                    <div class="bg-white/10 w-12 h-12 rounded-2xl flex items-center justify-center text-white font-black italic text-xl">C</div>
                        <div class="text-left font-black uppercase"><p class="text-sm text-white">Наш Канал</p><p class="text-[10px] opacity-40 text-white">@boss_storemy</p></div>
                    </button>
                </div>`;
            }
        };

        window.setCat = (c) => { window.currentCat = c; window.nav('shop'); };
        window.add = (i) => {
            const qty = parseInt(document.getElementById('q-'+i).value) || 1;
            for(let k=0; k<qty; k++) window.db.cart.push(window.products[i]);
            tg.HapticFeedback.impactOccurred('medium');
            window.updateCart();
        };

        window.updateCart = () => {
            const bar = document.getElementById('cart-bar');
            if(window.db.cart.length === 0) { bar.classList.add('hidden'); return; }
            bar.classList.remove('hidden');
            let t = 0; window.db.cart.forEach(p => t += p.price);
            document.getElementById('total-price').innerText = Math.floor(t * (1 - window.db.discount/100)) + " ₽";
            const btn = document.getElementById('checkout-btn');
            if(window.db.discount > 0) btn.classList.add('hot-btn');
        };

        window.spin = () => {
            if((Date.now() - window.db.lastSpin) < 86400000) return;
            const w = document.getElementById('wheel-svg');
            const deg = 3600 + Math.floor(Math.random() * 360);
            w.style.transform = `rotate(${deg}deg)`;
            window.db.lastSpin = Date.now(); window.save();

            setTimeout(() => {
                const act = (360 - (deg % 360)) % 360;
                let prize = "ПУСТО";
                if(act >= 0 && act < 90) { window.db.vip = true; window.db.discount = 5; prize = "VIP СТАТУС!"; }
                else if(act >= 90 && act < 180) { window.db.discount = 2; prize = "СКИДКА 2%!"; }
                else if(act >= 270 && act < 360) { window.db.lastSpin = 0; prize = "ЕЩЕ ПОПЫТКА!"; }
                
                if(prize !== "ПУСТО") confetti();
                tg.showAlert("РЕЗУЛЬТАТ: " + prize);
                window.nav('lucky'); window.updateCart();
            }, 5100);
        };

        window.openPay = () => document.getElementById('pay-modal').classList.remove('hidden');
        window.closePay = () => document.getElementById('pay-modal').classList.add('hidden');
        window.copy = (t) => { navigator.clipboard.writeText(t); tg.showAlert("Скопировано!"); };

        window.finishPay = async () => {
            const user = tg.initDataUnsafe.user || {id: 0, username: 'boss'};
            let t = 0; const items = window.db.cart.map(x => { t += x.price; return x.name; }).join(', ');
            const text = `🚀 ЗАКАЗ\n👤 @${user.username}\n🛒 ${items}\n💰 Итого: ${t} ₽`;
            
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chat_id: ADMIN, text: text })
            });

            document.getElementById('pay-modal').classList.add('hidden');
            document.getElementById('success-modal').classList.remove('hidden');
            
            window.db.cart = []; window.save();
            window.updateCart();
            confetti({ particleCount: 200 });
        };

        async function init() {
            try {
                const res = await fetch(CSV);
                const text = await res.text();
                window.products = text.split('\n').slice(1).map(r => {
                    const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if(!c[1]) return null;
                    return { cat: c[0].replace(/"/g,''), name: c[1].replace(/"/g,''), price: parseFloat(c[2]), img: c[4].replace(/"/g,'') };
                }).filter(p => p);
                window.nav('shop');
            } catch (e) { document.getElementById('app').innerHTML = "Ошибка таблицы."; }
        }

        init();
    </script>
</body>
</html>
