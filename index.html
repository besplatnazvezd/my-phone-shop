<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOSS STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #000; color: #fff; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .cat-btn { transition: all 0.3s; border-radius: 20px; padding: 8px 20px; font-weight: 700; font-size: 12px; white-space: nowrap; }
        .cat-btn.active { background: #EAB308; color: #000; }
        .btn-click:active { transform: scale(0.95); }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="p-4 pb-32">

    <!-- HEADER -->
    <header class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-3xl font-black italic text-yellow-500 tracking-tighter">BOSS STORE</h1>
            <p class="text-[10px] text-gray-400 uppercase tracking-[3px]">Premium Agency</p>
        </div>
        <div class="glass p-3 rounded-2xl relative">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
            <span id="cart-count" class="absolute -top-2 -right-2 bg-yellow-500 text-black text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full hidden">0</span>
        </div>
    </header>

    <!-- КАТЕГОРИИ -->
    <div id="cat-list" class="flex gap-2 overflow-x-auto mb-8 pb-2 no-scrollbar"></div>

    <!-- КАТАЛОГ -->
    <div id="catalog" class="grid grid-cols-2 gap-4">
        <p id="loading-text" class="col-span-2 text-center text-gray-500 animate-pulse mt-10 text-sm italic">Загружаем товары...</p>
    </div>

    <!-- КНОПКА ЗАКАЗА (ВНИЗУ) -->
    <div id="checkout-bar" class="fixed bottom-6 left-4 right-4 glass p-4 rounded-[30px] flex justify-between items-center hidden z-50 shadow-2xl">
        <div>
                      <p class="text-[10px] text-gray-400 uppercase font-bold">Итого к оплате:</p>
            <p id="total-price" class="text-xl font-black text-yellow-500 italic">0 ₽</p>
        </div>
        <button onclick="confirmOrder()" id="main-confirm-btn" class="bg-yellow-500 text-black px-8 py-4 rounded-2xl font-black uppercase text-sm shadow-lg btn-click">Оформить</button>
    </div>

    <!-- МОДАЛКА ОПЛАТЫ -->
    <div id="pay-modal" class="fixed inset-0 bg-black/90 flex items-center justify-center hidden z-[100] p-6 backdrop-blur-md">
        <div class="glass w-full max-w-sm p-8 rounded-[40px] text-center border-yellow-500/30">
            <div class="w-20 h-20 bg-yellow-500 rounded-full flex items-center justify-center mx-auto mb-6 shadow-[0_0_30px_rgba(234,179,8,0.4)]">
                <svg class="w-10 h-10 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h2 class="text-2xl font-black mb-2 italic">ЗАКАЗ ПРИНЯТ!</h2>
            <p class="text-gray-400 text-sm mb-8 leading-relaxed">Наш менеджер свяжется с тобой в ЛС в течение пары минут для выдачи товара.</p>
            <button onclick="document.getElementById('pay-modal').classList.add('hidden')" class="w-full py-4 bg-white text-black rounded-2xl font-black uppercase text-xs tracking-widest">Понял, жду!</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.backgroundColor = '#000000';

        // --- ВСТАВЬ СВОИ ДАННЫЕ ТУТ ---
        const BOT_TOKEN = '7611596495:AAGrVvPST_iK266eR9G_PstV9Y8073M_C6I'; // Твой токен
        const ADMIN_ID = '7727345054'; // Твой ID
        const SHEET_ID = '1-OatX3M0yQ8UaK-X-yNnd8Lp-F-M2uG5oR_y-E17T_s'; // ID твоей таблицы
        // ------------------------------

        let products = [];
        let cart = [];
        let currentCat = 'Bce';

        async function loadData() {
            try {
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;
                const res = await fetch(url);
                                const data = await res.text();
                
                const rows = data.split('\n').slice(1);
                products = rows.map((row, i) => {
                    const c = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g).map(x => x.replace(/^"|"$/g, ''));
                    return { ID: i, Category: c[0] || '', Name: c[1] || '', Price: parseFloat(c[2]) || 0, Description: c[3] || '', Image: c[4] || '' };
                }).filter(p => p.Name && p.Price > 0);
                
                renderCats();
                renderItems();
            } catch (e) {
                document.getElementById('loading-text').innerText = "Ошибка таблицы";
                console.error(e);
            }
        }

        function renderCats() {
            const list = ['Bce', ...new Set(products.map(p => p.Category))];
            document.getElementById('cat-list').innerHTML = list.map(c => `
                <button onclick="setCat('${c}')" class="cat-btn glass ${currentCat === c ? 'active' : ''}">${c}</button>
            `).join('');
        }

        function setCat(c) { 
            currentCat = c; 
            renderCats(); 
            renderItems(); 
        }

        function renderItems() {
            const grid = document.getElementById('catalog');
            const filtered = currentCat === 'Bce' ? products : products.filter(p => p.Category === currentCat);
            
            grid.innerHTML = filtered.map(p => {
                const pIdx = products.indexOf(p);
                return `
                <div class="glass p-3 rounded-[30px] flex flex-col h-full relative">
                    <img src="${p.Image}" class="w-full aspect-square object-cover rounded-[22px] mb-3 shadow-lg">
                    <h3 class="text-[9px] font-black uppercase text-yellow-500 mb-1 px-1 tracking-tight">${p.Name}</h3>
                    <p class="text-[8px] text-gray-400 mb-3 flex-1 px-1 leading-tight italic line-clamp-2">${p.Description}</p>
                    <div class="flex justify-between items-center mt-auto bg-black/20 p-2 rounded-2xl border border-white/5">
                        <span class="text-white font-black text-xs italic">${p.Price} ₽</span>
                        <div class="flex items-center gap-1">
                            <input type="number" id="qty-${pIdx}" value="1" min="1" class="w-7 bg-transparent text-white text-[10px] text-center outline-none font-bold">
                            <button onclick="addToCart(${pIdx})" class="bg-white text-black w-7 h-7 rounded-xl font-black btn-click text-lg shadow-lg flex items-center justify-center">+</button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function addToCart(idx) {
            const qtyInput = document.getElementById(`qty-${idx}`);
            const qty = parseInt(qtyInput.value) || 1;
            for (let i = 0; i < qty; i++) { cart.push(products[idx]); }
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            updateUI();
            if(qtyInput) qtyInput.value = 1;
        }

        function updateUI() {
            const total = cart.reduce((s, p) => s + p.Price, 0);
            document.getElementById('total-price').innerText = total + ' ₽';
            const count = cart.length;
            const badge = document.getElementById('cart-count');
            if (count > 0) { badge.innerText = count; badge.classList.remove('hidden'); }
            const bar = document.getElementById('checkout-bar');
            if (count > 0) { bar.classList.remove('hidden'); } else { bar.classList.add('hidden'); }
        }

        async function confirmOrder() {
            const btn = document.getElementById('main-confirm-btn');
            const total = cart.reduce((s, p) => s + p.Price, 0);
            btn.innerText = "WAIT...";
            
            const userData = tg.initDataUnsafe.user;
            const userName = userData ? userData.first_name : "ПОКУПАТЕЛЬ (ТЕСТ)";
            const userId = userData ? userData.id : "ID_НЕ_ПЕРЕДАН";
            const userLink = userData ? `tg://user?id=${userId}` : "#";

            const itemsMap = {};
            cart.forEach(item => { itemsMap[item.Name] = (itemsMap[item.Name] || 0) + 1; });
            const itemsList = Object.entries(itemsMap).map(([name, count]) => `• ${name} x${count}`).join('\n');
            
            const adminText = `🚀 *НОВЫЙ ЗАКАЗ!*\n\n👤 Клиент: [${userName}](${userLink})\n🆔 ID: \`${userId}\`\n🛒 Товары:\n${itemsList}\n💰 Итого: *${total} ₽*`;

            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: ADMIN_ID, text: adminText, parse_mode: 'Markdown' })
                });
                document.getElementById('pay-modal').classList.remove('hidden');
                cart = []; updateUI();
            } catch (e) { tg.showAlert("Ошибка!");}
            btn.innerText = "Оформить";
        }

        loadData();
    </script>
</body>
</html>
