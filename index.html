<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOSS STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #FFD700; --bg: #000; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: #fff; margin: 0; padding-bottom: 140px; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        .boss-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 20px; }
        .btn-gold { background: linear-gradient(180deg, #FFD700 0%, #BA8B02 100%); color: #000; font-weight: 900; text-transform: uppercase; border-radius: 12px; cursor: pointer; }
        
        .q-input { background: #050505; border: 1px solid #1a1a1a; color: #fff; font-weight: 900; text-align: center; border-radius: 8px; width: 100%; outline: none; padding: 6px 0; font-size: 14px; }

        .checkout-bar { 
            position: fixed; bottom: 85px; left: 15px; right: 15px; 
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            border-radius: 20px; padding: 15px; display: flex; 
            justify-content: space-between; align-items: center; 
            z-index: 5000; transition: 0.3s; transform: translateY(150%);
        }
        .checkout-bar.active { transform: translateY(0); }

        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #050505; border-top: 1px solid #1a1a1a; padding: 10px 0 25px; display: flex; justify-content: space-around; z-index: 6000; }
        .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #333; cursor: pointer; flex: 1; }
        .nav-btn.active { color: var(--gold); }

        .cat-item { opacity: 0.3; font-size: 11px; font-weight: 900; white-space: nowrap; text-transform: uppercase; cursor: pointer; }
        .cat-item.active { opacity: 1; color: var(--gold); border-bottom: 2px solid var(--gold); }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; }
                #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--gold); color: #000; padding: 10px 20px; border-radius: 50px; font-weight: 900; font-size: 10px; z-index: 20000; display: none; }

        canvas { cursor: crosshair; touch-action: none; border-radius: 15px; }
    </style>
</head>
<body>

    <div id="toast">СКОПИРОВАНО!</div>

    <header class="pt-8 pb-2 text-center">
        <h1 class="text-xl font-black italic uppercase text-yellow-500 italic" id="greet-title">ДОБРЫЙ ДЕНЬ, BOSS</h1>
        <p class="text-[8px] opacity-20 uppercase tracking-[3px]">WELCOME, BOSS SYSTEM</p>
    </header>

    <div id="cats-nav" class="flex gap-6 overflow-x-auto px-6 mb-4 no-scrollbar"></div>
    <main id="app-content" class="px-4"></main>

    <div id="checkout-bar" class="checkout-bar">
        <div>
            <p id="total-price" class="text-xl font-black text-yellow-500">0 ₽</p>
            <p class="text-[7px] opacity-50 uppercase font-bold">К оплате со скидкой</p>
        </div>
        <div class="flex gap-2">
            <button onclick="hideCheckout()" class="bg-red-600 text-white font-black text-[10px] px-5 py-3 rounded-xl uppercase">Отмена</button>
            <button onclick="showRequisites()" class="btn-gold px-7 py-3 text-[10px]">Оплатить</button>
        </div>
    </div>

    <!-- РЕКВИЗИТЫ С КОПИРОВАНИЕМ -->
    <div id="pay-modal" class="modal hidden">
        <div class="boss-card w-full p-6 text-center">
            <h2 class="text-yellow-500 font-black uppercase mb-6 italic">Реквизиты</h2>
            <p class="text-[8px] opacity-40 mb-4 uppercase">Нажми на номер, чтобы скопировать</p>
            <div class="space-y-3">
                <div onclick="copyText('4100119121976236')" class="text-left bg-white/5 p-3 rounded-xl active:bg-white/10">
                    <p class="text-[7px] opacity-40 uppercase">ЮMoney</p><p class="text-xs font-bold">4100 1191 2197 6236</p>
                </div>
                <div onclick="copyText('2200701955299232')" class="text-left bg-white/5 p-3 rounded-xl active:bg-white/10">
                    <p class="text-[7px] opacity-40 uppercase">Карта</p><p class="text-xs font-bold">2200 7019 5529 9232</p>
                                    </div>
                <div onclick="copyText('+79501700787')" class="text-left bg-white/5 p-3 rounded-xl active:bg-white/10">
                    <p class="text-[7px] opacity-40 uppercase">СБП (Т-Банк)</p><p class="text-xs font-bold">+7 950 170 07 87</p>
                </div>
            </div>
            <button onclick="confirmPayment()" class="btn-gold w-full py-4 mt-6 text-xs">Я оплатил(а)</button>
            <button onclick="closeModal()" class="text-[9px] opacity-30 uppercase mt-5 block w-full font-bold">Назад</button>
        </div>
    </div>

    <div id="success-screen" class="modal hidden">
        <div class="flex flex-col items-center text-center">
            <span class="text-6xl mb-6">👑</span>
            <h2 class="text-2xl font-black text-yellow-500 italic uppercase">Босс доволен!</h2>
            <button onclick="contactManager()" class="btn-gold px-10 py-4 mt-8 text-xs">Написать менеджеру</button>
        </div>
    </div>

    <nav class="nav-bar">
        <div onclick="nav('shop')" id="n-shop" class="nav-btn active"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" stroke-width="2"/></svg><span class="text-[9px] font-bold uppercase">Шоп</span></div>
        <div onclick="nav('scratch')" id="n-scratch" class="nav-btn"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="00 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-width="2"/></svg><span class="text-[9px] font-bold uppercase">Удача</span></div>
        <div onclick="nav('status')" id="n-status" class="nav-btn"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" stroke-width="2"/></svg><span class="text-[9px] font-bold uppercase">Статус</span></div>
        <div onclick="nav('support')" id="n-support" class="nav-btn"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" stroke-width="2"/></svg><span class="text-[9px] font-bold uppercase">Связь</span></div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        const CSV_URL = 'https://docs.google.com/spreadsheets/d/1q9vPlWM9t934ACzIwbZU4_EDtvpJdfO09-jodyIi9Ew/export?format=csv';
        let state = JSON.parse(localStorage.getItem('BOSS_V9_FIX')) || { 
            totalSpent: 0, orders: [], discount: 0, regDate: '17.04.2026', lastScratch: 0 
        };
        let products = [];
        let currentCat = 'Все';
        let selectedProduct = null;

        function save() { localStorage.setItem('BOSS_V9_FIX', JSON.stringify(state)); }

        async function loadData() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                const rows = text.split('\n').slice(1);
                products = rows.map(r => {
                    const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    return { cat: c[0].replace(/"/g,'').trim(), name: c[1].replace(/"/g,'').trim(), price: parseFloat(c[2]) || 0, desc: c[3]?.replace(/"/g,'').trim() || '', img: c[4]?.replace(/"/g,'').trim() || '' };
                }).filter(p => p.name);
                nav('shop');
            } catch (e) { console.error(e); }
        }

        function isMysteryTime() {
            const now = new Date();
            const msk = new Date(now.getTime() + (now.getTimezoneOffset() + 180) * 60000);
            return msk.getHours() === 0; 
        }

        function nav(page) {
            const app = document.getElementById('app-content');
            const cats = document.getElementById('cats-nav');
            hideCheckout();
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('n-'+page).classList.add('active');
            cats.style.display = (page === 'shop') ? 'flex' : 'none';

            if(page === 'shop') {
                const unique = ['Все', ...new Set(products.map(p => p.cat))];
                cats.innerHTML = unique.map(c => `<div onclick="setCat('${c}')" class="cat-item ${currentCat === c ? 'active' : ''}">${c}</div>`).join('');
                let filtered = currentCat === 'Все' ? products : products.filter(p => p.cat === currentCat);
                
                let html = `<div class="grid grid-cols-2 gap-4 pb-10">`;
                
                // МИСТЕРИ КЕЙС
                if (isMysteryTime()) {
                    html += `
                    <div class="boss-card p-4 col-span-2 border-yellow-500 shadow-[0_0_15px_rgba(255,215,0,0.3)] bg-gradient-to-b from-yellow-500/10 to-transparent mb-2">
                        <div class="flex items-center gap-4">
                        <span class="text-4xl">🎁</span>
                            <div class="flex-1">
                                <h3 class="text-sm font-black text-yellow-500 uppercase italic">BOSS MYSTERY CASE</h3>
                                <p class="text-[8px] opacity-70 uppercase">Только до 01:00 МСК. Внутри может быть что угодно!</p>
                            </div>
                            <div class="text-right">
                                <p class="text-lg font-black italic">499 ₽</p>
                                <button onclick="buyMystery()" class="btn-gold px-4 py-2 text-[8px]">Забрать</button>
                            </div>
                        </div>
                    </div>`;
                }

                html += filtered.map((p, i) => `
                    <div class="boss-card p-4">
                        <img src="${p.img}" class="w-full aspect-square object-contain bg-[#111] rounded-2xl mb-3 p-1">
                        <h3 class="text-[10px] font-black text-yellow-500 uppercase italic mb-1 h-6 overflow-hidden">${p.name}</h3>
                        <p class="text-[9px] text-white opacity-80 uppercase mb-3 min-h-[24px] leading-tight">${p.desc}</p>
                        <input type="number" id="q-${i}" value="1" min="1" oninput="updatePriceLive(${i})" class="q-input mb-3">
                        <p class="text-base font-black italic mb-3 text-center">${p.price} ₽</p>
                        <button onclick="prepareOrder(${i})" class="btn-gold w-full py-3 text-[10px]">Добавить</button>
                    </div>`).join('') + `</div>`;
                app.innerHTML = html;
            }

            if(page === 'scratch') {
                const canScratch = (Date.now() - state.lastScratch) > 86400000;
                app.innerHTML = `
                <div class="py-10 flex flex-col items-center">
                    <h2 class="text-yellow-500 font-black italic uppercase mb-6">Стирай и выигрывай</h2>
                    <div class="relative w-64 h-40 boss-card overflow-hidden flex items-center justify-center">
                        <div class="text-4xl font-black text-yellow-500" id="scratch-result">? ? ?</div>
                        ${canScratch ? '<canvas id="scratch-canvas" class="absolute inset-0 z-20"></canvas>' : ''}
                    </div>
                    <p class="text-[9px] opacity-40 uppercase font-black mt-6 tracking-widest text-center px-10">
                        ${canScratch ? 'Сотри слой пальцем, чтобы получить скидку на сегодня!' : 'Приходи завтра за новой скидкой!'}
                    </p>
                </div>`;
                if(canScratch) initScratch();
                else document.getElementById('scratch-result').innerText = `-${state.discount}%`;
            }

            if(page === 'status') {
                const progress = Math.min((state.totalSpent / 5000) * 100, 100);
                app.innerHTML = `
                    <div class="boss-card p-6 mb-4">
                        <p class="text-[7px] font-black text-yellow-500 uppercase mb-3 italic">Карточка босса</p>
                        <div class="mb-5">
                            <div class="flex justify-between text-[9px] font-black mb-1"><span>ПРОГРЕСС VIP</span><span>${state.totalSpent} / 5000 ₽</span></div>
                            <div class="w-full h-1.5 bg-white/5 rounded-full"><div class="h-full bg-yellow-500 rounded-full" style="width:${progress}%"></div></div>
                        </div>
                        <div class="grid grid-cols-2 gap-3 text-[9px] font-bold opacity-60">
                            <div>ID: ${tg.initDataUnsafe.user?.id || '7727345054'}</div>
                            <div>ЮЗЕР: @${tg.initDataUnsafe.user?.username || 'NMPRODA'}</div>
                            <div>СКИДКА: ${state.discount}%</div>
                            <div>РЕГ: ${state.regDate}</div>
                        </div>
                    </div>`;
            }
            
            if(page === 'support') {
                app.innerHTML = `
                <div onclick="window.open('https://t.me/+P3p-W1BvO8syMzVi')" class="boss-card p-6 flex items-center gap-4 mb-4"><span class="text-3xl">📢</span><div><h2 class="font-black uppercase italic text-sm">Канал</h2><p class="text-[8px] opacity-40 uppercase">Новости</p></div></div>
                <div onclick="window.open('https://t.me/nmproda')" class="boss-card p-6 flex items-center gap-4"><span class="text-3xl">🧑‍💻</span><div><h2 class="font-black uppercase italic text-sm">Менеджер</h2><p class="text-[8px] opacity-40 uppercase">@nmproda</p></div></div>`;
            }
        }

        function initScratch() {
            const canvas = document.getElementById('scratch-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 256; canvas.height = 160;
            ctx.fillStyle = '#333'; ctx.fillRect(0,0,256,160);
            ctx.fillStyle = '#444'; ctx.font = '20px Montserrat'; ctx.fillText('BOSS STORE', 60, 90);
            
            let isDrawing = false;
            const scratch = (e) => {
                if(!isDrawing) return;
                const rect = canvas.getBoundingClientRect();
                const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
                const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath(); ctx.arc(x, y, 25, 0, Math.PI * 2); ctx.fill();
                checkScratch();
            };

            const checkScratch = () => {
                const data = ctx.getImageData(0,0,256,160).data;
                let transparent = 0;
                for(let i=3; i<data.length; i+=4) if(data[i] === 0) transparent++;
                if(transparent > data.length / 4 * 0.5) {
                    canvas.remove();
                    const win = Math.floor(Math.random() * 3) + 1; // 1-3%
                    state.discount = win;
                    state.lastScratch = Date.now();
                    save();
                    document.getElementById('scratch-result').innerText = `-${win}%`;
                    tg.HapticFeedback.notificationOccurred('success');
                }
            };

            canvas.addEventListener('mousedown', () => isDrawing = true);
            canvas.addEventListener('touchstart', () => isDrawing = true);
            window.addEventListener('mouseup', () => isDrawing = false);
            window.addEventListener('touchend', () => isDrawing = false);
            canvas.addEventListener('mousemove', scratch);
            canvas.addEventListener('touchmove', scratch);
        }

        function copyText(txt) {
            navigator.clipboard.writeText(txt);
            const t = document.getElementById('toast');
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 1500);
            tg.HapticFeedback.impactOccurred('medium');
        }

        function prepareOrder(i) {
            const p = products[i];
            const q = document.getElementById('q-'+i).value || 1;
            const final = Math.floor((p.price * q) * (1 - state.discount/100));
            selectedProduct = { ...p, q, final };
            document.getElementById('total-price').innerText = final + " ₽";
            document.getElementById('checkout-bar').classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        }

        function buyMystery() {
            selectedProduct = { name: "BOSS MYSTERY CASE", q: 1, final: 499 };
            showRequisites();
        }

        function updatePriceLive(i) {
            if(selectedProduct && products[i].name === selectedProduct.name) prepareOrder(i);
        }

        function hideCheckout() { document.getElementById('checkout-bar').classList.remove('active'); selectedProduct = null; }
        function showRequisites() { document.getElementById('pay-modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('pay-modal').classList.add('hidden'); }

        function confirmPayment() {
            document.getElementById('pay-modal').classList.add('hidden');
            document.getElementById('checkout-bar').classList.remove('active');
            document.getElementById('success-screen').classList.remove('hidden');
            state.totalSpent += selectedProduct.final;
            state.orders.unshift({ name: selectedProduct.name, price: selectedProduct.final });
            save();
        }

        function contactManager() {
            const msg = `Привет! Оплатил(а) ${selectedProduct.name} за ${selectedProduct.final}₽. ID: ${tg.initDataUnsafe.user?.id || '000'}`;
            window.open(`https://t.me/nmproda?text=${encodeURIComponent(msg)}`);
            location.reload();
        }

        function setCat(c) { currentCat = c; nav('shop'); }
        window.onload = loadData;
    </script>
</body>
</html>
