                                <button onclick="addToCart(${pIdx})" class="bg-yellow-500 text-black w-10 h-10 rounded-xl font-black flex items-center justify-center shadow-lg btn-click">+</button>
                            </div>
                        </div>
                    </div>`;
                });
                main.innerHTML = html + `</div>`;
            } else if (currentPage === 'reviews') {main.innerHTML = `<div class="space-y-4 h-[65vh] overflow-y-auto no-scrollbar">${reviewsData.map(t => `<div class="glass p-6 rounded-[30px] border-l-4 border-yellow-500 shadow-xl"><p class="text-white text-[11px] italic leading-relaxed font-medium">"${t}"</p></div>`).join('')}</div>`;
            } else if (currentPage === 'lucky') {
                const rolled = localStorage.getItem('boss_lucky_rolled');
                if (!rolled) {
                    main.innerHTML = `<div class="text-center mt-10"><div class="glass p-10 rounded-[50px] border-yellow-500/20 shadow-2xl"><div id="dice-val" class="text-8xl mb-10 font-black italic text-yellow-500">?</div><h2 class="text-2xl font-black italic text-yellow-500 uppercase mb-4 tracking-tighter">Испытай удачу</h2><p class="text-white text-[10px] italic mb-8 opacity-70">Выпадет 1, 2 или 3 — скидка на товар!<br>(Но 1, 2 и 3 не выпадают 😉)</p><button onclick="rollDice()" id="roll-btn" class="w-full py-5 bg-yellow-500 text-black rounded-3xl font-black uppercase text-xs btn-click">Бросить кубик</button></div></div>`;
                } else {
                    main.innerHTML = `<div class="text-center mt-10"><div class="vip-card p-10 rounded-[50px] shadow-2xl"><div class="text-6xl mb-6">👑</div><h2 class="text-2xl font-black italic uppercase mb-2 tracking-tighter">BOSS VIP CLUB</h2><p class="text-sm font-bold italic mb-6">Выпало 4, 5 или 6!<br>Тебе открыт VIP-статус.</p><button onclick="window.location.href='https://t.me/nmproda'" class="w-full py-5 bg-black text-white rounded-3xl font-black uppercase text-xs btn-click shadow-2xl">Написать Админу</button></div></div>`;
                }
            } else if (currentPage === 'support') {
                const user = tg.initDataUnsafe.user || {id: 0};
                main.innerHTML = `<div class="space-y-4 mt-6">
                    <div class="glass p-8 rounded-[40px] text-center mb-6">
                        <h3 class="text-yellow-500 font-black italic uppercase mb-2">Твоя рефералка</h3>
                        <p class="text-[10px] text-gray-400 italic mb-6 leading-relaxed px-4">Покажи эту ссылку другу. Если он совершит покупку — вы оба получите секретный бонус!</p>
                        <button onclick="copyText('https://t.me/Boss_storesvzbot?start=${user.id}', 'Ссылка')" class="w-full py-4 bg-white/5 text-white rounded-2xl border border-white/10 text-[10px] font-black uppercase tracking-widest cursor-pointer">Копировать</button>
                    </div>
                    <button onclick="window.location.href='https://t.me/nmproda'" class="w-full glass p-8 rounded-[40px] flex items-center gap-6 active:scale-95 transition-all shadow-xl">
                        <div class="bg-yellow-500 p-4 rounded-2xl text-black font-black text-xl">M</div>
                        <div class="text-left"><p class="font-black italic text-lg text-yellow-500 uppercase">Менеджер</p><p class="text-[9px] text-gray-500 uppercase font-black tracking-[2px]">Личка: @nmproda</p></div>
                    </button>
                    <button onclick="window.location.href='https://t.me/boss_storemy'" class="w-full glass p-8 rounded-[40px] flex items-center gap-6 active:scale-95 transition-all shadow-xl">
                        <div class="bg-white/10 p-4 rounded-2xl text-white font-black text-xl">C</div>
                        <div class="text-left"><p class="font-black italic text-lg text-white uppercase opacity-80">BOSS КАНАЛ</p><p class="text-[9px] text-gray-500 uppercase font-black tracking-[2px]">Связь через бота</p></div>
                    </button>
                </div>`;
            }
        }function setCat(c) { currentCat = c; renderPage(); if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light'); }
        function changePage(p) { currentPage = p; document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); document.getElementById('nav-'+p).classList.add('active'); renderPage(); if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium'); window.scrollTo(0,0); }

        function addToCart(idx) {
            const qtyInput = document.getElementById(`qty-${idx}`);
            const qty = parseInt(qtyInput.value) || 1;
            for(let i = 0; i < qty; i++) cart.push(products[idx]);
            updateUI();
            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            qtyInput.value = 1; // Сбрасываем на 1 после добавления
        }

        function clearCart() { cart = []; updateUI(); if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('warning'); }
        function updateUI() {
            const total = cart.reduce((s, p) => s + p.Price, 0);
            document.getElementById('total-price').innerText = total + ' ₽';
            document.getElementById('checkout-bar').classList.toggle('hidden', cart.length === 0);
        }

        function copyText(txt, msg) {
            const el = document.createElement('textarea'); el.value = txt; document.body.appendChild(el);
            el.select(); document.execCommand('copy'); document.body.removeChild(el);
            tg.showAlert(msg + " успешно скопирован(а)!");
        }

        function rollDice() {
            const btn = document.getElementById('roll-btn'); const dice = document.getElementById('dice-val');
            btn.disabled = true; dice.classList.add('dice-anim');
            setTimeout(() => {
                const res = Math.floor(Math.random() * 3) + 4; // Только 4, 5, 6
                dice.innerText = res; dice.classList.remove('dice-anim');
                localStorage.setItem('boss_lucky_rolled', 'true');
                tg.showAlert("Выпало " + res + "! Тебе открыт VIP-статус.");
                setTimeout(() => renderPage(), 1500); // Обновляем страницу, чтобы показать VIP-карту
            }, 600);
        }

        function openPayment() { document.getElementById('pay-modal').classList.remove('hidden'); }

        async function confirmOrder() {
            const total = cart.reduce((s, p) => s + p.Price, 0);
            // Получаем ID пользователя из Telegram Web App
            const userId = tg.initDataUnsafe.user?.id;
            const userName = tg.initDataUnsafe.user?.first_name || "BOSS CLIENT";

            if (!userId) {
                tg.showAlert("Ошибка: Ваш ID не найден. Попробуйте заново.");
                return;
            }

            const counts = {}; cart.forEach(p => counts[p.Name] = (counts[p.Name] || 0) + 1);
            const itemsList = Object.entries(counts).map(([name, count]) => `• ${name} x${count}`).join('\n');
            
            const payload = {
                chat_id: ADMIN_ID,
                text: `🚀 <b>НОВЫЙ ЗАКАЗ</b>\n\n👤 Клиент: <b>${userName}</b>\n🆔 ID: <code>${userId}</code>\n\n🛒 Товары:\n${itemsList}\n\n💰 Итого: <b>${total} ₽</b>`,
                parse_mode: 'HTML',
                reply_markup: JSON.stringify({
                    inline_keyboard: [[
                        { text: "✅ Одобрено", callback_data: `approve_${userId}` },
                        { text: "❌ Не одобрено", callback_data: `decline_${userId}` }
                    ]]
                })
            };

            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                if (!response.ok) {
                    const errorData = await response.json();
                    console.error("Telegram API Error:", errorData);
                    throw new Error(`Telegram API Error: ${errorData.description}`);
                }
                tg.showAlert("Заказ отправлен! Ожидай ответа в боте.");
                document.getElementById('pay-modal').classList.add('hidden');
                cart = []; updateUI();
            } catch (e) { 
                console.error("Error confirming order:", e);
                tg.showAlert("Ошибка отправки заказа! Попробуйте позже."); 
            }
        }
        init();
    </script>
</body>
</html>
