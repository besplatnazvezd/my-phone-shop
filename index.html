<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TG Analyzer Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #030303; color: white; -webkit-tap-highlight-color: transparent; }
        .cyber-font { font-family: 'Orbitron', sans-serif; }
        .glow-transition { transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        input::placeholder { color: #3f3f46; }
        .animate-fade { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between overflow-hidden">

    <!-- ЭКРАН ЗАГРУЗКИ -->
    <div id="loading-screen" class="fixed inset-0 z-50 bg-[#030303] flex flex-col items-center justify-center space-y-6">
        <div class="relative w-20 h-20">
            <div class="absolute inset-0 rounded-full border-4 border-indigo-500/10"></div>
            <div class="absolute inset-0 rounded-full border-4 border-indigo-500 border-t-transparent animate-spin"></div>
        </div>
        <div class="text-center">
            <h2 class="cyber-font text-sm font-bold tracking-[0.3em] text-indigo-400">ANALYZING</h2>
            <p id="loading-status" class="text-[10px] text-zinc-500 mt-2 uppercase tracking-widest">Accessing Blockchain...</p>
        </div>
    </div>

    <!-- ОСНОВНОЙ ЭКРАН -->
    <div id="main-screen" class="hidden flex-grow flex flex-col justify-between p-4 animate-fade">
        <div class="text-center pt-2">
            <span class="text-[9px] cyber-font uppercase tracking-[0.4em] text-indigo-500/80">Calibration Complete</span>
            <h1 id="header-title" class="text-xl font-black mt-1 uppercase tracking-tight">Твой Профиль</h1>
        </div>

        <!-- КАРТОЧКА -->
        <div id="card-container" class="relative w-full max-w-sm mx-auto bg-zinc-950 border-2 border-zinc-900 rounded-[35px] p-6 glow-transition my-4">
            <!-- Свечение на фоне внутри карточки -->
                      <div id="glow-bg-1" class="absolute -top-20 -left-20 w-40 h-40 rounded-full blur-[80px] opacity-30 glow-transition"></div>
            <div id="glow-bg-2" class="absolute -bottom-20 -right-20 w-40 h-40 rounded-full blur-[80px] opacity-30 glow-transition"></div>

            <div class="relative z-10 flex flex-col items-center">
                <!-- Аватар -->
                <div id="avatar-border" class="w-20 h-20 rounded-full border-2 border-zinc-800 p-1 glow-transition bg-zinc-900/50">
                    <div class="w-full h-full rounded-full overflow-hidden flex items-center justify-center bg-zinc-800">
                        <img id="user-avatar" src="" class="w-full h-full object-cover hidden">
                        <span id="avatar-fallback" class="cyber-font text-2xl font-bold">TG</span>
                    </div>
                </div>

                <!-- Имя и Ранг -->
                <div class="mt-4 flex items-center gap-2">
                    <span id="user-name" class="text-xl font-extrabold tracking-tight">@username</span>
                    <div id="verified-badge" class="hidden">
                        <svg class="w-5 h-5 text-blue-400" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                        </svg>
                    </div>
                </div>
                <div id="user-rank" class="mt-1.5 px-3 py-0.5 rounded-full bg-white/5 border border-white/10 text-[9px] cyber-font font-bold text-zinc-400 uppercase tracking-wider">Обычный</div>

                <div class="w-full h-[1px] bg-white/5 my-5"></div>

                <!-- Статистика -->
                <div class="w-full space-y-3.5">
                    <div class="flex justify-between text-[11px]">
                        <span class="text-zinc-500 font-medium">ID Профиля:</span>
                        <span id="stat-id" class="font-bold text-zinc-300">---</span>
                    </div>
                    <div class="flex justify-between text-[11px]">
                        <span class="text-zinc-500 font-medium">Регистрация:</span>
                                                <span id="stat-year" class="font-bold text-zinc-300">---</span>
                    </div>
                    
                    <!-- КУРС ЦЕНЫ -->
                    <div class="flex justify-between items-start text-[11px]">
                        <span class="text-zinc-500 font-medium">Стоимость аккаунта:</span>
                        <div class="text-right">
                            <div id="stat-value" class="font-black text-amber-400 cyber-font">0 ⭐️</div>
                            <div id="stat-price-change" class="text-[9px] font-bold mt-0.5"></div>
                        </div>
                    </div>

                    <div class="flex justify-between text-[11px]">
                        <span class="text-zinc-500 font-medium">Стихия:</span>
                        <span id="stat-element" class="font-black uppercase italic">---</span>
                    </div>
                    
                    <div class="flex justify-between text-[11px]">
                        <span class="text-zinc-500 font-medium">Аура:</span>
                        <span id="stat-aura" class="font-bold text-purple-400">+0 XP</span>
                    </div>

                    <!-- Токсичность -->
                    <div class="flex justify-between items-center text-[11px]">
                        <span class="text-zinc-500 font-medium">Токсичность:</span>
                        <div class="flex items-center gap-2">
                            <div class="w-16 h-1.5 bg-zinc-900 rounded-full overflow-hidden">
                                <div id="stat-toxic-bar" class="h-full bg-rose-500 glow-transition" style="width: 0%"></div>
                            </div>
                            <span id="stat-toxic-pct" class="font-bold text-rose-500">0%</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Кнопки -->
        <div class="w-full max-w-sm mx-auto px-2 space-y-2.5 pb-4">
            <button id="btn-compat" onclick="checkCompatibility()" class="hidden w-full bg-gradient-to-r from-pink-600 to-rose-600 text-white py-4 rounded-[22px] text-[10px] cyber-font font-bold uppercase tracking-widest shadow-lg shadow-rose-500/20">
                ❤️ Совместимость
            </button>
            <button onclick="shareResult()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-4 rounded-[22px] text-[10px] cyber-font font-bold uppercase tracking-widest transition-all">
                Поделиться результатом
            </button>
            <p class="text-[8px] text-zinc-600 text-center uppercase tracking-tighter opacity-50">Data secured by Telegram Blockchain API</p>
        </div>
    </div>

    <!-- ЭКРАН ПОИСКА -->
    <div id="search-screen" class="hidden flex-grow flex flex-col p-6 animate-fade">
        <div class="text-center pt-4 mb-10">
            <span class="text-[10px] cyber-font uppercase tracking-[0.3em] text-indigo-500">Global Scanner</span>
            <h1 class="text-2xl font-black mt-2">Поиск Профиля</h1>
        </div>

        <div class="bg-zinc-900/40 border border-zinc-800 p-8 rounded-[40px] space-y-6">
            <div class="space-y-3">
                <label class="text-[10px] cyber-font text-zinc-500 ml-1 tracking-widest">Username или ID:</label>
                <input id="search-input" type="text" placeholder="@pavel_durov" 
                    class="w-full bg-zinc-950 border-2 border-zinc-800 focus:border-indigo-500 px-6 py-4 rounded-2xl text-sm font-bold text-white transition-all outline-none">
            </div>
            <button onclick="searchUser()" class="w-full bg-white text-black py-4 rounded-2xl text-[11px] cyber-font font-black uppercase tracking-widest hover:bg-indigo-400 hover:text-white transition-all">
                Начать поиск
            </button>
        </div>
    </div>

    <!-- МЕНЮ -->
    <nav class="bg-zinc-950/80 border-t border-zinc-900 px-6 py-4 flex justify-around items-center backdrop-blur-md">
        <button id="tab-btn-my" onclick="switchTab('my')" class="flex flex-col items-center gap-1 text-indigo-500">
            <div class="w-5 h-5 rounded-md border-2 border-current flex items-center justify-center text-[10px] font-bold">М</div>
            <span class="text-[8px] cyber-font font-bold uppercase tracking-widest">Профиль</span>
        </button>
        <button id="tab-btn-search" onclick="switchTab('search')" class="flex flex-col items-center gap-1 text-zinc-600 transition-colors">
            <div class="w-5 h-5 rounded-full border-2 border-current flex items-center justify-center text-[12px] font-bold">?</div>
            <span class="text-[8px] cyber-font font-bold uppercase tracking-widest">Поиск</span>
        </button>
    </nav>

    <script>
        const tg = window.Telegram?.WebApp;
        let myUser = null;
        let currentViewedUser = null;

        window.onload = () => {
            if (tg) { tg.ready(); tg.expand(); }
            myUser = tg?.initDataUnsafe?.user || { id: 8491563038, first_name: "Boss", username: "boss_user", is_premium: true };
            startAnalysis(myUser, true);
        };

        function startAnalysis(user, isMe) {
            currentViewedUser = user;
            document.getElementById('loading-screen').classList.remove('hidden');
            document.getElementById('main-screen').classList.add('hidden');
            document.getElementById('search-screen').classList.add('hidden');

            let progress = 0;
            const statuses = ["Accessing Database...", "Pricing Profile...", "Element Sync...", "Ready!"];
            const interval = setInterval(() => {
                document.getElementById('loading-status').innerText = statuses[progress];
                progress++;
                if (progress >= statuses.length) {
                    clearInterval(interval);
                    document.getElementById('loading-screen').classList.add('hidden');
                    document.getElementById('main-screen').classList.remove('hidden');
                    document.getElementById('header-title').innerText = isMe ? "Твой Профиль" : "Анализ Профиля";
                    document.getElementById('btn-compat').classList.toggle('hidden', isMe);
                    renderCard(user);
                }
            }, 600);
        }

        function getDailyPrice(id) {
            const seed = new Date().getDate() + new Date().getMonth();
            const base = Math.floor((id % 4000) + 1200);
            const delta = (Math.abs(Math.sin(id + seed) * 500) - 250).toFixed(0);
            return { price: base + Number(delta), delta: Number(delta) };
        }

        function getAge(id) {
            const data = [
                {limit: 1e8, y: 2014, r: "ЛЕГЕНДА"}, {limit: 4e8, y: 2016, r: "ДРЕВНИЙ"},
                {limit: 9e8, y: 2018, r: "ЭПИЧЕСКИЙ"}, {limit: 1.8e9, y: 2021, r: "РЕДКИЙ"},
                {limit: 5e9, y: 2024, r: "ОБЫЧНЫЙ"}
            ];
            const found = data.find(d => id < d.limit) || {y: 2025, r: "НОВИЧОК"};
            return { year: found.y, rank: found.r, age: new Date().getFullYear() - found.y };
        }

        function renderCard(user) {
            const id = Number(user.id);
            const ageData = getAge(id);
            const priceData = getDailyPrice(id);

            // Стихии
            const elements = [
                {n: "Огонь", c: "text-orange-500", g: "rgba(249,115,22,0.4)", b: "border-orange-500/30"},
                {n: "Вода", c: "text-blue-400", g: "rgba(96,165,250,0.4)", b: "border-blue-500/30"},
                {n: "Эфир", c: "text-cyan-400", g: "rgba(34,211,238,0.4)", b: "border-cyan-500/30"},
                {n: "Пустота", c: "text-purple-500", g: "rgba(168,85,247,0.4)", b: "border-purple-500/30"}
            ];
            const el = elements[id % elements.length];

            // Применяем стили
            const card = document.getElementById('card-container');
            card.style.boxShadow = `0 0 40px ${el.g}`;
            card.className = `relative w-full max-w-sm mx-auto bg-zinc-950 border-2 ${el.b} rounded-[35px] p-6 glow-transition my-4`;
            document.getElementById('glow-bg-1').style.backgroundColor = el.g;
            document.getElementById('glow-bg-2').style.backgroundColor = el.g;
            document.getElementById('avatar-border').className = `w-20 h-20 rounded-full border-2 ${el.b} p-1 glow-transition bg-zinc-900/50`;
            
            const elText = document.getElementById('stat-element');
            elText.innerText = el.n; elText.className = `font-black uppercase italic ${el.c}`;

            // Данные
            document.getElementById('user-name').innerText = user.username ? `@${user.username}` : user.first_name;
            document.getElementById('user-rank').innerText = ageData.rank;
            document.getElementById('stat-id').innerText = id;
            document.getElementById('stat-year').innerText = `~ ${ageData.year} год`;
            document.getElementById('stat-value').innerText = `${priceData.price.toLocaleString()} ⭐️`;
            
            const change = document.getElementById('stat-price-change');
            change.innerText = (priceData.delta >= 0 ? `▲ +${priceData.delta}` : `▼ ${priceData.delta}`) + " ⭐️";
            change.className = `text-[9px] font-bold mt-0.5 ${priceData.delta >= 0 ? 'text-emerald-400' : 'text-rose-500'}`;

            document.getElementById('stat-aura').innerText = `+${((id % 15000) + 200).toLocaleString()} XP`;
            const toxic = id % 100;
            document.getElementById('stat-toxic-pct').innerText = toxic + "%";
            document.getElementById('stat-toxic-bar').style.width = toxic + "%";

            // Галочка
            document.getElementById('verified-badge').classList.toggle('hidden', !(user.is_premium || ageData.year < 2016));

            // Аватар
            const img = document.getElementById('user-avatar');
            const fall = document.getElementById('avatar-fallback');
            if (user.photo_url) {
                img.src = user.photo_url; img.classList.remove('hidden'); fall.classList.add('hidden');
            } else {
                img.classList.add('hidden'); fall.classList.remove('hidden');
                fall.innerText = (user.username || user.first_name || "U").substring(0, 2).toUpperCase();
            }
        }

        function switchTab(tab) {
            document.getElementById('tab-btn-my').classList.toggle('text-indigo-500', tab === 'my');
            document.getElementById('tab-btn-my').classList.toggle('text-zinc-600', tab !== 'my');
            document.getElementById('tab-btn-search').classList.toggle('text-indigo-500', tab === 'search');
            document.getElementById('tab-btn-search').classList.toggle('text-zinc-600', tab !== 'search');

            if (tab === 'my') { startAnalysis(myUser, true); }
            else {
                document.getElementById('main-screen').classList.add('hidden');
                document.getElementById('search-screen').classList.remove('hidden');
            }
        }

        function searchUser() {
            const input = document.getElementById('search-input').value.trim();
            if (!input) return;
            const clean = input.replace('@', '');
            let hash = 0;
            for (let i = 0; i < clean.length; i++) { hash = clean.charCodeAt(i) + ((hash << 5) - hash); }
            const fakeId = /^\d+$/.test(clean) ? Number(clean) : Math.abs(hash % 8000000000) + 100000000;
            startAnalysis({ id: fakeId, first_name: clean, username: clean, is_premium: hash % 3 === 0 }, false);
        }

        function checkCompatibility() {
            const p = ((myUser.id + currentViewedUser.id) % 95) + 5;
            alert(`❤️ Совместимость с @${currentViewedUser.username}: ${p}%`);
        }

        function shareResult() {
            const text = `💎 Мой аккаунт оценили в ${document.getElementById('stat-value').innerText}! Узнай свою стоимость в боте:`;
            tg.openTelegramLink(`https://t.me/share/url?url=https://t.me/Boss_storesvzbot&text=${encodeURIComponent(text)}`);
        }
    </script>
</body>
</html>
