<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>BOSS PREMIUM STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --main: #EAB308; --bg: #000; --dark: #0a0a0a; --glass: rgba(255,255,255,0.03); }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: #fff; padding-bottom: 130px; overflow-x: hidden; }
        
        .glass { background: var(--glass); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(15px); position: relative; z-index: 10; }
        .btn-primary { background: var(--main); color: #000; font-weight: 900; text-transform: uppercase; border-radius: 20px; transition: 0.2s; position: relative; z-index: 20; }
        .btn-primary:active { transform: scale(0.95); }
        .hot-btn { animation: pulse-buy 2s infinite; } /* Для кнопки оплаты */

        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,10,10,0.9); border-top: 1px solid rgba(255,255,255,0.05); padding: 15px 10px 30px 10px; display: flex; justify-content: space-around; z-index: 1000; border-radius: 40px 40px 0 0; }
        .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #555; font-size: 8px; font-weight: 900; text-transform: uppercase; border: none; background: none; flex: 1; position: relative; z-index: 20; }
        .nav-btn.active { color: var(--main); }

        .cat-chip { white-space: nowrap; padding: 10px 20px; border-radius: 99px; font-size: 10px; font-weight: 900; background: #111; border: 1px solid #222; position: relative; z-index: 15; }
        .cat-chip.active { background: var(--main); color: #000; border-color: var(--main); }

        /* СКРЕТЧ-КАРТА */
        .scratch-wrapper { width: 280px; height: 160px; margin: 0 auto; position: relative; cursor: grab; z-index: 15; }
        .scratch-card { position: absolute; inset: 0; background: #1a1a1a; border-radius: 25px; border: 3px solid var(--main); overflow: hidden; z-index: 10; }
                .scratch-canvas { position: absolute; top: 0; left: 0; z-index: 2; touch-action: pan-y; }
        .scratch-prize { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 28px; color: var(--main); z-index: 1; text-align: center; background: #111; opacity: 0; transition: opacity 0.5s; }
        .scratch-card.scratched .scratch-prize { opacity: 1; }
        .scratch-prize-icon { font-size: 60px; margin-top: 10px; }

        @keyframes pulse-buy { 0% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(234, 179, 8, 0); } 100% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input[type="number"] { -moz-appearance: textfield; outline: none; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>

    <header class="p-8 text-center">
        <h1 class="text-3xl font-black italic uppercase tracking-tighter text-yellow-500">Boss Store</h1>
        <p class="text-[7px] opacity-30 uppercase tracking-[5px] font-bold">The Luxury Choice</p>
    </header>

    <div id="cats-nav" class="flex overflow-x-auto gap-2 px-5 mb-6 no-scrollbar" style="position: relative; z-index: 15;"></div>
    <div id="page-content"></div>

    <!-- КОРЗИНА -->
    <div id="cart-bar" class="fixed top-24 left-4 right-4 glass p-4 rounded-[30px] flex justify-between items-center hidden z-[500] shadow-2xl">
        <div>
            <p id="total-price" class="text-2xl font-black italic" style="color: var(--main)">0 ₽</p>
            <p class="text-[8px] text-green-500 font-bold uppercase">Скидка применена</p>
        </div>
        <button onclick="window.openPay()" id="checkout-btn" class="btn-primary px-10 py-4 text-xs">ОФОРМИТЬ</button>
    </div>

    <!-- МЕНЮ -->
    <nav class="nav-bar">
        <button onclick="window.nav('shop')" id="n-shop" class="nav-btn active"><svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" stroke-width="2"/></svg><span class="text-[9px] font-black uppercase">Шоп</span></button>
                <button onclick="window.nav('status')" id="n-status" class="nav-btn"><svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" stroke-width="2"/></svg><span class="text-[9px] font-black uppercase">Фулл стату</span></button>
        <button onclick="window.nav('scratch')" id="n-scratch" class="nav-btn"><svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-width="2"/></svg><span class="text-[9px] font-black uppercase">Скретч</span></button>
        <button onclick="window.nav('support')" id="n-support" class="nav-btn"><svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" stroke-width="2"/></svg><span class="text-[9px] font-black uppercase">Связь</span></button>
    </nav>

    <!-- ОКНО ОПЛАТЫ -->
    <div id="pay-modal" class="fixed inset-0 bg-black/95 flex items-center justify-center hidden z-[200] p-6">
        <div class="bg-[#111] w-full max-w-sm p-8 rounded-[40px] text-center border border-white/10 shadow-2xl">
            <h2 class="text-2xl font-black mb-6 uppercase" style="color: var(--main)">Оплата</h2>
            <div class="space-y-4 mb-8">
                <div onclick="window.copy('4100119121976236')" class="bg-white/5 p-4 rounded-2xl text-left active:bg-white/10">
                    <p class="text-[10px] opacity-40 uppercase font-black mb-1">ЮMoney</p>
                    <p class="text-base font-black tracking-tighter">4100 1191 2197 6236</p>
                </div>
                <div onclick="window.copy('2200701955299232')" class="bg-white/5 p-4 rounded-2xl text-left active:bg-white/10">
                    <p class="text-[10px] opacity-40 uppercase font-black mb-1">Карта Т-Банк</p>
                    <p class="text-base font-black tracking-tighter">2200 7019 5529 9232</p>
                </div>
                <div onclick="window.copy('+79501700787')" class="bg-white/5 p-4 rounded-2xl text-left active:bg-white/10">
                    <p class="text-[10px] opacity-40 uppercase font-black mb-1">СБП (Т-Банк / Сбер)</p>
                    <p class="text-base font-black tracking-tighter">+7 950 170 07 87</p>
                </div>
            </div>
            <button onclick="window.finishPay()" class="w-full py-6 btn-primary hot-btn text-sm">Я ОПЛАТИЛ(А)</button>
           <button onclick="window.closePay()" class="mt-6 py-3 px-8 border border-white/20 rounded-xl text-xs opacity-50 uppercase font-bold text-white active:scale-95 transition-all">ОТМЕНА</button>
            
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        const BOT_TOKEN = '8730430332:AAGff_PCX2059o3EUwG-d9C19uTqcH4sAZ4';
        const ADMIN_ID = '7727345054';
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/1q9vPlWM9t934ACzIwbZU4_EDtvpJdfO09-jodyIi9Ew/export?format=csv';

        window.db = JSON.parse(localStorage.getItem('boss_final_scratch_v1')) || {
            cart: [], history: [], lastScratch: 0, totalSpent: 0, ordersCount: 0, discount: 0, vipLevel: 0
        };
        window.products = [];
        window.currentCat = 'Все';
        window.isScratchCardActive = false;

        window.save = () => localStorage.setItem('boss_final_scratch_v1', JSON.stringify(window.db));

        window.nav = (page) => {
            document.getElementById('page-content').innerHTML = ''; // Очищаем предыдущее содержимое
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`n-${page}`).classList.add('active');
            document.getElementById('cats-nav').classList.toggle('hidden', page !== 'shop');
            window.updateCartBar();

            if (page === 'shop') {
                const uniqueCats = ['Все', ...new Set(window.products.map(p => p.cat))];
                                document.getElementById('page-content').innerHTML = `<div class="grid grid-cols-2 gap-4">` + filteredProducts.map((p, i) => `
                    <div class="glass p-3 rounded-[30px] flex flex-col">
                        <img src="${p.img || 'placeholder.png'}" alt="Product Image" class="w-full aspect-square object-cover rounded-[22px] mb-3">
                        <h3 class="text-[9px] font-black uppercase truncate opacity-40 px-1">${p.name || 'Без названия'}</h3>
                        <div class="mt-auto px-1">
                            <div class="text-xl font-black italic mb-3" style="color: var(--main)">
                                ${(Number(p.price) || 0).toLocaleString('ru-RU')} ₽
                            </div>
                            <div class="flex gap-2">
                                <input type="number" value="1" min="1" id="qty-${i}" class="w-10 bg-white/5 rounded-lg text-center text-[10px] font-black border border-white/5">
                                <button onclick="window.addItemToCart('${(p.name || 'product').replace(/'/g, "\\'")}', ${i})" class="flex-1 py-3 btn-primary text-[9px]">В КОРЗИНУ</button>
                            </div>
                        </div>
                    </div>
                `).join('') + `</div>`;
                
                    </div>
                `).join('') + `</div>`;
            } else if (page === 'status') {
                const vipLevels = { 0: 5000, 1: 15000, 2: 30000 }; // Пороги для уровней
                const currentLevel = window.db.vipLevel;
                const nextLevelThreshold = vipLevels[currentLevel] || 0;
                const spentForNext = Math.max(0, nextLevelThreshold - window.db.totalSpent);
                const progress = nextLevelThreshold > 0 ? Math.min(100, (window.db.totalSpent / nextLevelThreshold) * 100) : 100;

                document.getElementById('page-content').innerHTML = `
                <div class="space-y-6">
                    <div class="glass p-8 rounded-[40px] text-center border-yellow-500/20 shadow-2xl">
                        <p class="text-[9px] font-black opacity-30 uppercase tracking-[4px] mb-2">Твоя статистика</p>
                        <h2 class="text-4xl font-black italic text-white mb-8">${window.db.totalSpent.toLocaleString('ru-RU')} ₽</h2>
                        <div class="grid grid-cols-2 gap-4 text-left">
                            <div class="bg-white/5 p-4 rounded-2xl"><p class="text-[8px] opacity-40 uppercase">Заказы</p><p class="text-lg font-black">${window.db.ordersCount}</p></div>
                            <div class="bg-white/5 p-4 rounded-2xl"><p class="text-[8px] opacity-40 uppercase">Скидка</p><p class="text-lg font-black text-yellow-500">${window.db.discount}%</p></div>
                        </div>
                    </div>
                    <div class="glass p-6 rounded-[30px]">
                        <div class="flex justify-between text-[10px] font-black uppercase mb-2"><span>Уровень ${currentLevel}</span><span>Уровень ${currentLevel + 1}</span></div>
                        <div class="w-full h-3 bg-white/5 rounded-full overflow-hidden"><div class="h-full bg-yellow-500" style="width: ${progress}%"></div></div>
                        <p class="text-[8px] opacity-30 mt-3 text-center uppercase">Осталось ${spentForNext.toLocaleString('ru-RU')} ₽ для следующего уровня</p>
                    </div>
                    <div class="glass p-6 rounded-[30px]">
                        <p class="text-[9px] font-black opacity-40 uppercase tracking-[4px] mb-4">Преимущества VIP:</p>
                        <ul class="list-disc list-inside text-[10px] opacity-70 space-y-1">
                            <li>Эксклюзивные товары</li>
                            <li>Повышенные скидки</li>
                            <li>Приоритетная поддержка</li>
                            <li>Ранний доступ к акциям</li>
                        </ul>
                    </div>
                    <div class="glass p-6 rounded-[30px] text-center">
                        <p class="text-[10px] font-black text-yellow-500 uppercase mb-4 tracking-widest">Последние заказы</p>
                        ${window.db.history.slice(-5).map(h => `
                            <div class="flex justify-between text-[9px] font-bold mb-1">
                                <span>${h.items.length > 30 ? h.items.slice(0, 30) + '...' : h.items}</span>
                                <span class="text-yellow-500">${h.sum.toLocaleString('ru-RU')} ₽</span>
                            </div>
                        `).join('') || '<p class="text-[8px] opacity-30">История пуста...</p>'}
                    </div>
                </div>`;
            } else if (page === 'scratch') {
                const canPlay = (Date.now() - window.db.lastScratch) > 86400000; // 24 часа
                document.getElementById('page-content').innerHTML = `
                <div class="text-center py-10">
                    <h2 class="text-2xl font-black mb-2 uppercase italic text-yellow-500">Скретч-Карта</h2>
                    <p class="text-[10px] opacity-40 mb-10 uppercase font-black">Сотри защитный слой пальцем</p>
                    <div class="scratch-wrapper ${canPlay ? '' : 'cursor-not-allowed'}" id="scratch-card-wrapper">
                        <div class="scratch-card" id="scratch-card">
                            <canvas id="scratch-canvas" class="scratch-canvas"></canvas>
                            <div class="scratch-prize" id="scratch-prize-text">?</div>
                        </div>
                    </div>
                    ${!canPlay ? `<p class="mt-10 text-xs font-black text-white/20 uppercase tracking-widest">Следующий шанс завтра</p>` : ''}
                </div>`;
                if (canPlay) window.initScratchCard();
            } else if (page === 'support') {
                document.getElementById('page-content').innerHTML = `
                <div class="space-y-4">
                    <div onclick="window.openLink('https://t.me/nmproda')" class="glass p-8 rounded-[40px] flex items-center gap-6 border-l-4 border-yellow-500 active:scale-95 transition-all shadow-xl">
                        <div class="w-16 h-16 bg-yellow-500 rounded-2xl flex items-center justify-center text-black font-black text-3xl shadow-lg">M</div>
                        <div><p class="text-xl font-black uppercase italic">Менеджер</p><p class="text-xs opacity-40">@nmproda — Жми для связи</p></div>
                    </div>
                    <div onclick="window.openLink('https://t.me/boss_storemy')" class="glass p-8 rounded-[40px] flex items-center gap-6 border-l-4 border-white/20 active:scale-95 transition-all shadow-xl">
                        <div class="w-16 h-16 bg-white/10 rounded-2xl flex items-center justify-center text-white font-black text-3xl">C</div>
                        <div><p class="text-xl font-black uppercase italic">Наш Канал</p><p class="text-xs opacity-40">@boss_storemy — Новости</p></div>
                    </div>
                </div>`;
            }
        };

        window.setCategory = (cat) => { 
            window.currentCat = cat; 
            window.nav('shop'); 
        };

        window.addItemToCart = (name, index) => {
            const product = window.products.find(p => p.name === name);
            const quantityInput = document.getElementById(`qty-${index}`);
            const quantity = parseInt(quantityInput.value) || 1;
            
            if (isNaN(quantity) || quantity < 1) {
                tg.showAlert("Неверное количество!");
                quantityInput.value = 1;
                return;
            }

            if (!product) {
                console.error("Продукт не найден:", name);
                tg.showAlert("Ошибка: товар не найден.");
                return;
            }

            for (let i = 0; i < quantity; i++) {
                window.db.cart.push(product);
            }
            tg.HapticFeedback.impactOccurred('light');
            window.updateCartBar();
            quantityInput.value = 1; // Сброс количества после добавления
        };

        window.updateCartBar = () => {
            const cartBar = document.getElementById('cart-bar');
            if (window.db.cart.length === 0) {
                cartBar.classList.add('hidden');
                return;
            }
            cartBar.classList.remove('hidden');
            let totalPrice = 0;
            window.db.cart.forEach(item => totalPrice += item.price);
            const finalSum = Math.floor(totalPrice * (1 - window.db.discount / 100));
            document.getElementById('total-price').innerText = finalSum.toLocaleString('ru-RU') + " ₽";
        };

        window.copy = (text) => { navigator.clipboard.writeText(text); tg.showAlert("Скопировано!"); };
        window.openLink = (url) => window.open(url, '_blank');

        window.initScratchCard = () => {
            if (window.isScratchCardActive) return;
            window.isScratchCardActive = true;

            const canvas = document.getElementById('scratch-canvas');
            const ctx = canvas.getContext('2d');
            const prizeTextElement = document.getElementById('scratch-prize-text');
            const cardWrapper = document.getElementById('scratch-card-wrapper');
            const cardElement = document.getElementById('scratch-card');

            const prizes = [
                { value: 1, text: "1% Скидка 🔥", icon: "🔥" },
                { value: 2, text: "2% Скидка 🔥", icon: "🔥" },
                { value: 3, text: "3% Скидка 🔥", icon: "🔥" }
            ];
            
            const selectedPrize = prizes[Math.floor(Math.random() * prizes.length)];
            prizeTextElement.innerHTML = `<span class="scratch-prize-icon">${selectedPrize.icon}</span><br>${selectedPrize.text}`;

            ctx.fillStyle = '#444';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.globalCompositeOperation = 'source-over';
            ctx.font = '900 14px Montserrat';
            ctx.fillStyle = '#555';
            ctx.textAlign = 'center';
            ctx.fillText('BOSS STORE', canvas.width / 2, canvas.height / 2 - 10);
            ctx.font = '700 10px Montserrat';
            ctx.fillStyle = '#666';
            ctx.fillText('Скретч-карта', canvas.width / 2, canvas.height / 2 + 15);

            let isDrawing = false;
            const getCoords = (e) => {
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches ? e.touches[0] : e;
                return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
            };

            const draw = (e) => {
                if (!isDrawing) return;
                const { x, y } = getCoords(e);
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath();
                ctx.arc(x, y, 20, 0, Math.PI * 2);
                ctx.fill();
                checkScratchProgress();
            };

            const checkScratchProgress = () => {
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                let transparentPixels = 0;
                for (let i = 3; i < data.length; i += 4) {
                    if (data[i] === 0) transparentPixels++;
                }
                if (transparentPixels >= (canvas.width * canvas.height * 0.6)) { // 60% стерто
                    cardElement.classList.add('scratched');
                    cardWrapper.style.cursor = 'default';
                    cardWrapper.removeEventListener('mousemove', draw);
                    cardWrapper.removeEventListener('touchmove', draw);
                    window.db.lastScratch = Date.now();
                    window.db.discount = selectedPrize.value; // Применяем скидку
                    window.db.history.push({ items: `Приз: ${selectedPrize.text}`, sum:0 }); // Записываем в историю
                    window.save();
                    confetti({ particleCount: 100, spread: 60, origin: { y: 0.5 } });
                    setTimeout(() => { prizeTextElement.style.opacity = '1'; }, 300);
                }
            };

            cardWrapper.addEventListener('mousedown', (e) => { isDrawing = true; cardWrapper.style.cursor = 'grabbing'; });
            cardWrapper.addEventListener('touchstart', (e) => { isDrawing = true; cardWrapper.style.cursor = 'grabbing'; });
            cardWrapper.addEventListener('mouseup', () => { isDrawing = false; cardWrapper.style.cursor = 'grab'; });
            cardWrapper.addEventListener('touchend', () => { isDrawing = false; cardWrapper.style.cursor = 'grab'; });
            cardWrapper.addEventListener('mousemove', draw);
            cardWrapper.addEventListener('touchmove', draw);
        };

        window.openPay = () => {
            if (window.db.cart.length === 0) {
                tg.showAlert("Корзина пуста! Добавь товары, чтобы оформить заказ.");
                return;
            }
            document.getElementById('pay-modal').classList.remove('hidden');
        };

        window.closePay = () => {
            document.getElementById('pay-modal').classList.add('hidden');
        };

        window.finishPay = async () => {
            const user = tg.initDataUnsafe.user || { username: 'guest' };
            let totalProductPrice = 0;
            const items = window.db.cart.map(p => { totalProductPrice += p.price; return p.name; }).join(', ');
            const finalSum = Math.floor(totalProductPrice * (1 - window.db.discount / 100));
            const orderId = Math.floor(Math.random() * 9000) + 1000;

            const message = `🚀 ЗАКАЗ #${orderId}\n👤 @${user.username}\n🛒 ${items}\n💰 СУММА: ${finalSum.toLocaleString('ru-RU')} ₽\n(Скидка: ${window.db.discount}%)\n\nУведомить клиента: /notify_${orderId}`;

            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: ADMIN_ID, text: message })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                window.db.history.push({ items: items, sum: finalSum });
                window.db.totalSpent += finalSum;
                window.db.ordersCount += 1;
                window.db.cart = [];
                window.save();

                document.getElementById('pay-modal').classList.add('hidden'); // Скрываем окно оплаты
                document.getElementById('page-content').innerHTML = `
                    <div class="text-center py-10 px-4">
                        <div class="w-20 h-20 bg-yellow-500 rounded-full flex items-center justify-center mx-auto mb-6 text-black text-4xl shadow-[0_0_50px_rgba(234,179,8,0.3)]">✓</div>
                        <h2 class="text-2xl font-black mb-4 uppercase italic">Заказ #${orderId} принят!</h2>
                        <p class="text-sm opacity-50 mb-10">Сделай скриншот этого экрана и отправь менеджеру для получения товара.</p>
                        <div class="glass p-6 rounded-[30px] mb-10 text-left border-yellow-500/10">
                            <p class="text-[9px] opacity-40 uppercase font-black mb-2">Детали заказа #${orderId}</p>
                            <p class="text-xs font-black uppercase mb-1">${items.length > 30 ? items.slice(0, 30) + '...' : items}</p>
                            <p class="text-xl font-black text-yellow-500">${finalSum.toLocaleString('ru-RU')} ₽</p>
                        </div>
                        <button onclick="window.openLink('https://t.me/nmproda')" class="w-full py-6 btn-primary hot-btn text-sm">Написать @nmproda</button>
                    </div>`;
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                window.updateCartBar();

            } catch (error) {
                console.error("Ошибка отправки заказа:", error);
                tg.showAlert("Произошла ошибка при оформлении заказа. Попробуй позже.");
            }
        };

        async function loadProducts() {
            try {
                const response = await fetch(CSV_URL);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const text = await response.text();
                window.products = text.split('\n').map(row => {
                    const columns = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (columns.length < 5 || !columns[1]) return null; // Проверяем, что есть хотя бы 5 столбцов и название товара
                    try {
                        return {
                            cat: columns[0].replace(/"/g, '').trim(),
                            name: columns[1].replace(/"/g, '').trim(),
                            price: parseFloat(columns[2]),
                            img: columns[4].replace(/"/g, '').trim()
                        };
                    } catch (parseError) {
                        console.error("Ошибка парсинга строки CSV:", row, parseError);
                        return null;
                    }
                }).filter(p => p && p.name && p.price !== undefined && p.img); // Фильтруем только валидные продукты
                
                if (window.products.length === 0) {
                    throw new Error("Нет товаров для загрузки или данные некорректны.");
                }
                window.nav('shop'); // Загрузили товары, переходим в магазин
            } catch (error) {
                console.error("Ошибка загрузки продуктов:", error);
                document.getElementById('page-content').innerHTML = "<p class='text-center opacity-30'>Ошибка загрузки данных. Пожалуйста, проверьте URL или формат файла.</p>";
            }
        }

        // Инициализация
        loadProducts();
    </script>
</body>
</html>
