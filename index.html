<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOSS STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #FFD700; --bg: #000; --card: #0d0d0d; --neon: #ff00ff; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: #fff; margin: 0; padding-bottom: 120px; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }

        .boss-card { background: var(--card); border-radius: 18px; border: 1px solid rgba(255, 215, 0, 0.08); overflow: hidden; position: relative; }
        .btn-gold { background: linear-gradient(180deg, #FFD700 0%, #BA8B02 100%); color: #000; font-weight: 900; text-transform: uppercase; border-radius: 10px; }
        
        /* SOLD OUT */
        .sold-out { opacity: 0.3; pointer-events: none; }
        .sold-out-stamp { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-15deg); background: #ff0000; color: #fff; font-weight: 900; padding: 5px 15px; border-radius: 4px; font-size: 14px; z-index: 100; border: 2px solid white; }

        /* НЕОН ПРИ ПРОМО */
        .neon-border { position: fixed; top: 0; bottom: 0; width: 6px; z-index: 9999; display: none; background: linear-gradient(to bottom, #ff00ff, #8b5cf6, #ff00ff); box-shadow: 0 0 20px var(--neon); }
        .promo-active .neon-border { display: block; }
        .promo-active .price-glow { color: #ff00ff !important; text-shadow: 0 0 10px #ff00ff; }

        /* СКРЕТЧ КАРТА (БОЛЬШАЯ) */
        #scr-wrap { position: relative; width: 320px; height: 180px; background: #111; border-radius: 20px; display: flex; align-items: center; justify-content: center; border: 2px solid rgba(255,215,0,0.2); overflow: hidden; }
        canvas { position: absolute; inset: 0; z-index: 10; cursor: crosshair; touch-action: none; }

        /* НАВИГАЦИЯ */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: rgba(5,5,5,0.95); backdrop-filter: blur(10px); border-top: 1px solid rgba(255,215,0,0.1); padding: 10px 0 30px; display: flex; justify-content: space-around; z-index: 1000; }
                .nav-item { color: #444; font-size: 8px; font-weight: 800; text-transform: uppercase; display: flex; flex-direction: column; align-items: center; gap: 4px; width: 20%; transition: 0.3s; }
        .nav-item.active { color: var(--gold); transform: translateY(-2px); }

        .cat-scroll { display: flex; overflow-x: auto; gap: 15px; padding: 15px 5px; scrollbar-width: none; }
        .cat-item { white-space: nowrap; font-size: 9px; font-weight: 900; color: #333; text-transform: uppercase; }
        .cat-item.active { color: var(--gold); border-bottom: 2px solid var(--gold); }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .hidden { display: none !important; }

        input[type="number"], input[type="text"] { background: #1a1a1a; border: 1px solid rgba(255,215,0,0.2); border-radius: 12px; padding: 12px; color: #fff; font-weight: 900; text-align: center; outline: none; }
        input:focus { border-color: var(--gold); }
    </style>
</head>
<body id="b-tag">

    <div class="neon-border left-0"></div>
    <div class="neon-border right-0"></div>

    <div id="toast" class="fixed top-5 left-1/2 -translate-x-1/2 bg-yellow-500 text-black px-6 py-2 rounded-full font-black text-[10px] z-[10000] hidden uppercase">Скопировано</div>

    <main id="app" class="px-4 pt-6"></main>

    <!-- ОКНО ОПЛАТЫ -->
    <div id="m-pay" class="modal hidden">
        <div class="boss-card w-full max-w-sm p-6 text-center bg-[#0a0a0a]">
            <h2 id="p-name" class="text-yellow-500 font-black italic uppercase mb-4 text-xl italic"></h2>
            
            <div class="mb-6">
                <p class="text-[8px] opacity-30 font-black uppercase mb-2">Введите количество:</p>
                <input type="number" id="p-qty" value="1" class="w-full text-2xl" oninput="calcTotal()">
            </div>

            <div class="space-y-2 mb-6">
                <div onclick="copy('+79501700787')" class="bg-white/5 p-3 rounded-xl border border-white/5">
                    <p class="text-[7px] opacity-40 uppercase font-black mb-1">💛 Т-Банк / СБП</p>
                                        <p class="font-bold text-yellow-500 text-sm">+7 950 170 07 87</p>
                </div>
                <div onclick="copy('2200701955299232')" class="bg-white/5 p-3 rounded-xl border border-white/5">
                    <p class="text-[7px] opacity-40 uppercase font-black mb-1">💳 Карта Т-Банк</p>
                    <p class="font-bold text-yellow-500 text-sm">2200 7019 5529 9232</p>
                </div>
            </div>

            <div class="mb-6">
                <p class="text-[10px] font-black italic opacity-40">ИТОГО К ОПЛАТЕ:</p>
                <p id="p-total" class="text-2xl font-black text-yellow-500 price-glow">0.00 ₽</p>
            </div>

            <div class="flex gap-3">
                <button onclick="closeM()" class="w-1/3 py-4 text-[9px] font-black opacity-20">НАЗАД</button>
                <button onclick="order()" class="w-2/3 btn-gold py-4 text-[10px]">Я ОПЛАТИЛА</button>
            </div>
        </div>
    </div>

    <nav class="nav-bar">
        <div onclick="render('shop')" id="n-shop" class="nav-item active"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" stroke-width="2"/></svg><span>Шоп</span></div>
        <div onclick="render('luck')" id="n-luck" class="nav-item"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-width="2"/></svg><span>
            Удача</span></div>
        <div onclick="render('status')" id="n-status" class="nav-item"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10" stroke-width="2"/></svg><span>Статус</span></div>
        <div onclick="render('promo')" id="n-promo" class="nav-item"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 8v13m0-13V6a2 2 0 112 2h-2zm0 0V5.5A2.5 2.5 0 109.5 8H12" stroke-width="2"/></svg><span>Промо</span></div>
        <div onclick="render('support')" id="n-support" class="nav-item"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 12h.01M12 12h.01M16 12h.01" stroke-width="2"/></svg><span>Связь</span></div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        let state = JSON.parse(localStorage.getItem('BOSS_V25')) || { 
            discount: 0, lastLuck: 0, spent: 1177469, promoActive: false, promoVal: 0,
            promos: [{c:'BOSS777', l:15, d:7}, {c:'GOLD99', l:5, d:9}, {c:'START4', l:50, d:4}]
        };
        let products = [];
        let curCat = 'BCE';
        let activeItem = null;

        async function render(page) {
            const app = document.getElementById('app');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('n-'+page).classList.add('active');
            document.getElementById('b-tag').classList.toggle('promo-active', state.promoActive);

            if(page === 'shop') {
                app.innerHTML = `<h1 class="text-xl font-black italic text-yellow-500 uppercase text-center mb-4 italic">ДОБРЫЙ ДЕНЬ, BOSS</h1><div class="cat-scroll" id="cat-bar"></div><div id="grid" class="grid grid-cols-2 gap-4 pb-10"></div>`;
                if(products.length === 0) {
                    const res = await fetch('https://docs.google.com/spreadsheets/d/1q9vPlWM9t934ACzIwbZU4_EDtvpJdfO09-jodyIi9Ew/export?format=csv');
                    const text = await res.text();
                    products = text.split('\n').slice(1).map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
                }
                const cats = ['BCE', ...new Set(products.map(p => p[0]?.replace(/"/g,'')).filter(Boolean))];
                document.getElementById('cat-bar').innerHTML = cats.map(c => `<div onclick="setCat('${c}')" class="cat-item ${curCat === c ? 'active' : ''}">${c}</div>`).join('');
                setCat(curCat);
            }

            if(page === 'luck') {
                const can = (Date.now() - state.lastLuck) > 86400000;
                app.innerHTML = `<div class="flex flex-col items-center pt-10"><h2 class="text-yellow-500 font-black italic uppercase mb-10 italic">СКРЕТЧ-КАРТА</h2><div id="scr-wrap"><div class="text-center"><p class="text-[10px] font-black text-yellow-500 opacity-40 mb-2">ВАША СКИДКА:</p><div class="text-6xl font-black text-yellow-500 italic">${state.discount > 0 ? '-'+state.discount+'%' : '???'}</div></div>${can ? '<canvas id="can"></canvas>' : ''}</div></div>`;
                if(can) initScr();
            }

            if(page === 'promo') {
                app.innerHTML = `
                <div class="pt-6">
                    <h2 class="text-yellow-500 font-black italic uppercase text-center mb-8 italic">АКТИВАЦИЯ ПРОМО</h2>
                    <div class="boss-card p-6 mb-10 bg-white/5">
                        <input type="text" id="p-in" placeholder="ВВЕДИТЕ КОД" class="w\uppercase">
                        <button onclick="applyP()" class="btn-gold w-full py-4 text-[11px]">АКТИВИРОВАТЬ</button>
                    </div>
                    <p class="text-[8px] font-black opacity-30 uppercase mb-4 tracking-widest">Доступные коды:</p>
                    <div class="space-y-3">
                        ${state.promos.map(p => `
                            <div onclick="copy('${p.c}')" class="boss-card p-4 flex justify-between items-center bg-white/5 border-white/5">
                                <div><p class="font-black text-yellow-500">${p.c}</p><p class="text-[7px] opacity-40 font-black">СКИДКА ${p.d}%</p></div>
                                <div class="text-right"><p class="font-black text-xs">${p.l}</p><p class="text-[6px] opacity-30 uppercase">ОСТАЛОСЬ</p></div>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
            }

            if(page === 'status') {
                app.innerHTML = `<div class="boss-card p-8 bg-gradient-to-br from-yellow-500/10 to-transparent"><p class="text-yellow-500 font-black italic text-[10px] uppercase mb-10 tracking-[3px]">BOSS VIP CARD</p><div class="mb-10"><div class="flex justify-between text-[11px] font-black mb-3"><span>PROGRESS</span><span>${state.spent.toLocaleString()} ₽</span></div><div class="h-1.5 bg-white/5 rounded-full overflow-hidden"><div class="h-full bg-yellow-500 shadow-[0_0_15px_#FFD700]" style="width:${Math.min(state.spent/50000, 100)}%"></div></div></div><div class="grid grid-cols-2 gap-8 text-[10px] font-black uppercase"><div><p class="opacity-20 mb-1 text-[7px]">ID КЛИЕНТА</p>${tg.initDataUnsafe.user?.id || '7727345054'}</div><div><p class="opacity-20 mb-1 text-[7px]">ЮЗЕР</p>@${tg.initDataUnsafe.user?.username || 'nmproda'}</div><div class="text-yellow-500"><p class="opacity-20 mb-1 text-[7px] text-white">СКИДКА</p>${state.discount + state.promoVal}%</div><div><p class="opacity-20 mb-1 text-[7px]">РЕГ</p>18.04.2026</div></div></div>`;
            }

            if(page === 'support') {
                app.innerHTML = `<div class="space-y-4 pt-10"><div onclick="window.open('https://t.me/+P3p-W1BvO8syMzVi')" class="boss-card p-6 flex items-center gap-6 bg-white/5"><div class="text-3xl">📢</div><div><p class="font-black text-sm uppercase">BOSS КАНАЛ</p><p class="text-[8px] opacity-40 uppercase">Новости и скидки</p></div></div><div onclick="window.open('https://t.me/nmproda')" class="boss-card p-6 flex items-center gap-6 bg-white/5"><div class="text-3xl">🤵</div><div><p class="font-black text-sm uppercase">МЕНЕДЖЕР</p><p class="text-[8px] opacity-40 uppercase">@NMPRODA</p></div></div></div>`;
            }
        }

        function setCat(c) {
            curCat = c;
            const grid = document.getElementById('grid');
            const filt = c === 'BCE' ? products : products.filter(p => p[0]?.replace(/"/g,'') === c);
            grid.innerHTML = filt.map(p => {
                const name = p[1]?.replace(/"/g,''), price = parseFloat(p[2]), desc = p[3]?.replace(/"/g,''), img = p[4]?.replace(/"/g,''), stock = parseInt(p[5]);
                if(!name) return '';
                const out = stock <= 0;
                return `
                <div class="boss-card flex flex-col ${out ? 'sold-out' : ''}">
                    ${out ? '<div class="sold-out-stamp">SOLD OUT</div>' : ''}
                    <img src="${img}" class="w-full aspect-[4/3] object-cover">
                    <div class="p-3 flex flex-col flex-1">
                    <h3 class="text-[9px] font-black text-yellow-500 uppercase leading-none mb-2">${name}</h3>
                        <div class="mt-auto">
                            <div class="flex justify-between items-center mb-3">
                                <span class="text-xs font-black price-glow italic">${price.toFixed(2)} ₽</span>
                                <span class="text-[7px] font-black opacity-30 uppercase">${stock} шт.</span>
                            </div>
                            <button onclick="openPay('${name}', ${price}, ${stock})" class="btn-gold w-full py-2.5 text-[9px]">ДОБАВИТЬ</button>
                            <p class="text-[7px] opacity-30 uppercase font-black mt-3 leading-tight">${desc}</p>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function openPay(n, p, s) {
            activeItem = { n, p, s };
            document.getElementById('p-name').innerText = n;
            document.getElementById('p-qty').value = 1;
            calcTotal();
            document.getElementById('m-pay').classList.remove('hidden');
        }

        function calcTotal() {
            let q = parseInt(document.getElementById('p-qty').value) || 1;
            if(q > activeItem.s) q = activeItem.s;
            const total = (activeItem.p * q) * (1 - (state.discount + state.promoVal)/100);
            document.getElementById('p-total').innerText = total.toFixed(2) + ' ₽';
        }

        function applyP() {
            const code = document.getElementById('p-in').value.toUpperCase();
            const p = state.promos.find(x => x.c === code);
            if(p && p.l > 0) {
                p.l--; state.promoActive = true; state.promoVal = p.d;
                save(); render('shop');
            } else alert('НЕВЕРНЫЙ КОД');
        }

        function order() {
            let q = document.getElementById('p-qty').value;
            const total = ((activeItem.p * q) * (1 - (state.discount + state.promoVal)/100)).toFixed(2);
            const text = `Босс, я оплатила!\n\n🛒 Товар: ${activeItem.n}\n🔢 Кол-во: ${q} шт.\n📦 Остаток: ${activeItem.s} шт.\n💰 Сумма: ${total} ₽\n🎁 Скидка: ${state.discount + state.promoVal}%\n👤 Юзер: @${tg.initDataUnsafe.user?.username || 'user'}\n🆔 ID: ${tg.initDataUnsafe.user?.id || '000'}`;
            try { tg.sendData(text); } catch(e) {}
            window.open(`https://t.me/nmproda?text=${encodeURIComponent(text)}`);
            closeM();
        }

        function initScr() {
            const can = document.getElementById('can'), ctx = can.getContext('2d');
            can.width = 320; can.height = 180;
            ctx.fillStyle = '#222'; ctx.fillRect(0,0,320,180);
            ctx.fillStyle = '#FFD700'; ctx.font = '900 24px Montserrat';
            for(let i=0; i<5; i++) for(let j=0; j<3; j++) ctx.fillText('?', 40 + i*60, 50 + j*50);
            let active = false;
            const scratch = (e) => {
                if(!active) return;
                const r = can.getBoundingClientRect();
                const x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left, y = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath(); ctx.arc(x,y,30,0,Math.PI*2); ctx.fill();
                const d = ctx.getImageData(0,0,320,180).data;
                let t = 0; for(let i=3; i<d.length; i+=4) if(d[i]===0) t++;
                if(t > d.length/4*0.5) {
                    can.remove();
                    const r = Math.random();
                    state.discount \ 
= r < 0.45 ? 1 : (r < 0.9 ? 2 : 3);
                    state.lastLuck = Date.now(); save(); render('luck');
                }
            };
            can.addEventListener('mousedown',()=>active=true); can.addEventListener('touchstart',()=>active=true);
            window.addEventListener('mouseup',()=>active=false); window.addEventListener('touchend',()=>active=false);
            can.addEventListener('mousemove',scratch); can.addEventListener('touchmove',scratch);
        }

        function copy(t) {
            navigator.clipboard.writeText(t);
            const o = document.getElementById('toast'); o.classList.remove('hidden');
            setTimeout(()=>o.classList.add('hidden'), 1500);
            tg.HapticFeedback.impactOccurred('medium');
        }

        function save() { localStorage.setItem('BOSS_V25', JSON.stringify(state)); }
        function closeM() { document.getElementById('m-pay').classList.add('hidden'); }
        render('shop');
    </script>
</body>
</html>
