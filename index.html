<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOSS STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #FFD700; --bg: #000000; --card: #0a0a0a; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: #fff; margin: 0; padding-bottom: 120px; overflow-x: hidden; }

        .boss-card { background: var(--card); border: 1px solid rgba(255, 215, 0, 0.08); border-radius: 24px; overflow: hidden; height: 100%; display: flex; flex-direction: column; }
        .btn-gold { background: linear-gradient(180deg, #FFD700 0%, #BA8B02 100%); color: #000; font-weight: 900; text-transform: uppercase; border-radius: 14px; transition: 0.2s; }
        .btn-gold:active { transform: scale(0.96); opacity: 0.9; }

        /* КАТЕГОРИИ */
        .category-scroll { display: flex; overflow-x: auto; gap: 18px; padding: 10px 5px; scrollbar-width: none; }
        .category-scroll::-webkit-scrollbar { display: none; }
        .cat-item { white-space: nowrap; font-size: 10px; font-weight: 900; text-transform: uppercase; color: #333; transition: 0.3s; padding-bottom: 5px; border-bottom: 2px solid transparent; }
        .cat-item.active { color: var(--gold); border-bottom: 2px solid var(--gold); }

        /* ОПИСАНИЕ (ТЕПЕРЬ ВНИЗУ И ВИДНО) */
        .product-desc { font-size: 9px; line-height: 1.4; color: rgba(255,255,255,0.4); text-transform: uppercase; font-weight: 600; margin-top: 4px; word-wrap: break-word; }

        /* РУЛЕТКА */
        .roulette-container { position: relative; width: 100%; height: 150px; overflow: hidden; background: #050505; border-radius: 20px; border: 1px solid rgba(255,215,0,0.1); }
        .roulette-strip { display: flex; position: absolute; left: 0; transition: transform 8s cubic-bezier(0.1, 0, 0.05, 1); }
        .roulette-item { min-width: 120px; height: 150px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-right: 1px solid rgba(255,255,255,0.02); }
                .roulette-pointer { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: var(--gold); z-index: 20; box-shadow: 0 0 15px var(--gold); transform: translateX(-50%); }

        /* Редкость предметов */
        .rarity-common { background: linear-gradient(180deg, rgba(75,105,255,0.15) 0%, transparent 100%); border-bottom: 4px solid #4b69ff; }
        .rarity-epic { background: linear-gradient(180deg, rgba(211,46,230,0.15) 0%, transparent 100%); border-bottom: 4px solid #d32ee6; }
        .rarity-arcane { background: linear-gradient(180deg, rgba(235,75,75,0.15) 0%, transparent 100%); border-bottom: 4px solid #eb4b4b; }

        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(5,5,5,0.95); border-top: 1px solid rgba(255,255,255,0.05); padding: 15px 0 40px; display: flex; justify-content: space-around; z-index: 1000; backdrop-filter: blur(10px); }
        .nav-item { color: #444; font-size: 9px; font-weight: 900; text-transform: uppercase; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .nav-item.active { color: var(--gold); }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 5000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .hidden { display: none !important; }

        canvas { background: #111; border-radius: 20px; cursor: crosshair; touch-action: none; }
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--gold); color: #000; padding: 12px 24px; border-radius: 50px; font-weight: 900; font-size: 10px; z-index: 10000; display: none; }
    </style>
</head>
<body>

    <div id="toast">СКОПИРОВАНО!</div>

    <main id="app" class="px-5 pt-8">
        <!-- Сюда грузим всё -->
    </main>

    <!-- МОДАЛКА ОПЛАТЫ (ДЛЯ ВСЕХ ТОВАРОВ) -->
    <div id="m-pay" class="modal hidden">
        <div class="boss-card w-full max-w-sm p-8 text-center border-yellow-500/20">
            <h2 id="pay-name" class="text-yellow-500 font-black italic uppercase mb-6">ОПЛАТА ТОВАРА</h2>
            <div class="space-y-4 mb-8">
                <div onclick="copy('4100119121976236')" class="bg-white/5 p-5 rounded-2xl text-left active:bg-white/10">
                                        <p class="text-[8px] opacity-40 uppercase mb-1">ЮMoney</p>
                    <p class="font-bold text-sm">4100 1191 2197 6236</p>
                </div>
                <div onclick="copy('2200701955299232')" class="bg-white/5 p-5 rounded-2xl text-left active:bg-white/10">
                    <p class="text-[8px] opacity-40 uppercase mb-1">Карта (РФ)</p>
                    <p class="font-bold text-sm">2200 7019 5529 9232</p>
                </div>
            </div>
            <button id="pay-btn" class="btn-gold w-full py-5 text-[10px]">Я ОПЛАТИЛА</button>
            <button onclick="closeM()" class="mt-4 text-[9px] opacity-30 uppercase font-black">Назад</button>
        </div>
    </div>

    <!-- МОДАЛКА РУЛЕТКИ -->
    <div id="m-roll" class="modal hidden">
        <div class="w-full text-center">
            <h2 class="text-xl font-black italic text-yellow-500 uppercase mb-10 tracking-widest">ОТКРЫТИЕ КЕЙСА</h2>
            <div class="roulette-container">
                <div class="roulette-pointer"></div>
                <div id="roll-strip" class="roulette-strip"></div>
            </div>
            <div id="won-box" class="hidden mt-12 animate-pulse">
                <p class="text-[10px] opacity-40 uppercase mb-2">ВАШ ПРИЗ:</p>
                <h3 id="won-item" class="text-3xl font-black text-yellow-500 uppercase italic"></h3>
                <button onclick="claimM()" class="btn-goldpx-12 py-5 mt-10 text-[10px]">ЗАБРАТЬ ПРИЗ</button>
            </div>
        </div>
    </div>

    <nav class="nav-bar">
        <div onclick="nav('shop')" id="n-shop" class="nav-item active"><span>Шоп</span></div>
        <div onclick="nav('luck')" id="n-luck" class="nav-item"><span>Удача</span></div>
        <div onclick="nav('status')" id="n-status" class="nav-item"><span>Статус</span></div>
        <div onclick="nav('support')" id="n-support" class="nav-item"><span>Связь</span></div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        const CSV_URL = 'https://docs.google.com/spreadsheets/d/1q9vPlWM9t934ACzIwbZU4_EDtvpJdfO09-jodyIi9Ew/export?format=csv';
        let state = JSON.parse(localStorage.getItem('BOSS_S18')) || { discount: 0, lastLuck: 0, spent: 1177469 };
        let products = [];
        let currentCategory = 'BCE';
        let activeOrder = null;

        const CASE_POOL = [
            { n: "1000 звёзд", r: "arcane", i: "⭐" }, { n: "Прем на год", r: "arcane", i: "👑" },
            { n: "Прем на 6 месяцев", r: "epic", i: "💎" }, { n: "500 звёзд", r: "epic", i: "🌟" },
            { n: "100 звёзд", r: "common", i: "✨" }, { n: "ТГ Аккаунт", r: "common", i: "📱" }
        ];

        function is00Time() {
            const msk = new Date(new Date().getTime() + (new Date().getTimezoneOffset() + 180) * 60000);
            return msk.getHours() === 0;
        }

        async function nav(p) {
            const app = document.getElementById('app');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('n-'+p).classList.add('active');

            if(p === 'shop') {
                app.innerHTML = `
                <header class="text-center mb-6">
                    <h1 class="text-2xl font-black italic text-yellow-500 uppercase">ДОБРЫЙ ДЕНЬ, BOSS</h1>
                    <p class="text-[8px] opacity-20 tracking-[5px] font-bold">WELCOME BOSS SYSTEM</p>
                </header>
                <div class="category-scroll mb-4" id="cat-bar"></div>
                <div id="mystery-bar"></div>
                <div id="grid" class="grid grid-cols-2 gap-5 pb-10"></div>`;

                if(is00Time()) {
                    document.getElementById('mystery-bar').innerHTML = `
                    <div onclick="initPay('MYSTERY', 499)" class="boss-card p-6 mb-8 border-2 border-yellow-500/30 bg-yellow-500/5 flex items-center justify-between">
                        <div><h3 class="text-sm font-black italic text-yellow-500 uppercase">MYSTERY CASE</h3><p class="text-[7px] opacity-40 uppercase font-bold mt-1 tracking-widest">ДО 01:00 МСК</p></div>
                        <span class="text-xl font-black italic">499 ₽</span>
                    </div>`;
                }

                if(products.length === 0) {
                    const res = await fetch(CSV_URL);
                    const text = await res.text();
                    products = text.split('\n').slice(1).map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
                }

                const cats = ['BCE', ...new Set(products.map(p => p[0]?.replace(/"/g,'')).filter(Boolean))];
                document.getElementById('cat-bar').innerHTML = cats.map(c => `<div onclick="setCat('${c}')" class="cat-item ${currentCategory === c ? 'active' : ''}">${c}</div>`).join('');
                
                setCat(currentCategory);
            }

            if(p === 'luck') {
                const can = (Date.now() - state.lastLuck) > 86400000;
                app.innerHTML = `<div class="flex flex-col items-center pt-10"><h2 class="text-yellow-500 font-black italic uppercase mb-8 italic">Скретч-карта</h2><div class="relative w-[280px] h-[160px] boss-card flex items-center justify-center"><div class="text-5xl font-black text-yellow-500">${state.discount > 0 ? '-'+state.discount+'%' : '?'}</div>${can ? '<canvas id="can" class="absolute inset-0 z-30"></canvas>' : ''}</div><p class="text-[9px] opacity-30 uppercase font-black mt-10 tracking-[3px]">Приходи завтра!</p></div>`;
                if(can) initScratch();
            }

            if(p === 'status') {
                app.innerHTML = `<div class="boss-card p-8 bg-gradient-to-b from-white/5 to-transparent"><p class="text-[8px] font-black text-yellow-500 uppercase mb-8 italic tracking-widest">КАРТОЧКА БОССА</p><div class="mb-10"><div class="flex justify-between text-[10px] font-black mb-3 italic"><span>ПРОГРЕСС VIP</span><span>${state.spent.toLocaleString()} / 5,000,000 ₽</span></div><div class="h-1.5 bg-white/5 rounded-full overflow-hidden"><div class="h-full bg-yellow-500 shadow-[0_0_10px_#FFD700]" style="width:${Math.min(state.spent/50000, 100)}%"></div></div></div><div class="grid grid-cols-2 gap-8 text-[9px] font-black uppercase opacity-60"><div><p class="opacity-30 mb-1 italic text-[7px]">ID КЛИЕНТА</p>${tg.initDataUnsafe.user?.id || '7727345054'}</div><div><p class="opacity-30 mb-1 italic text-[7px]">ЮЗЕР</p>@${tg.initDataUnsafe.user?.username || 'nmproda'}</div><div><p class="opacity-30 mb-1 italic text-[7px]">СКИДКА</p>${state.discount}%</div><div><p class="opacity-30 mb-1 italic text-[7px]">РЕГ</p>18.04.2026</div></div></div>`;
            }

            if(p === 'support') {
                app.innerHTML = `<div class="space-y-5 pt-10"><div onclick="window.open('https://t.me/+P3p-W1BvO8syMzVi')" class="boss-card p-6 flex items-center justify-between"> <div class="flex items-center gap-5"><span>📢</span><div><h3 class="font-black italic uppercase text-sm">КАНАЛ</h3><p class="text-[8px] opacity-30 uppercase font-black tracking-widest">НОВОСТИ</p></div></div> </div><div onclick="window.open('https://t.me/nmproda')" class="boss-card p-6 flex items-center justify-between"> <div class="flex items-center gap-5"><span>🤵</span><div><h3 class="font-black italic uppercase text-sm">МЕНЕДЖЕР</h3><p class="text-[8px] opacity-30 uppercase font-black tracking-widest">@NMPRODA</p></div></div> </div></div>`;
            }
        }

        function setCat(c) {
            currentCategory = c;
            document.querySelectorAll('.cat-item').forEach(i => i.classList.toggle('active', i.innerText === c));
            const grid = document.getElementById('grid');
            if(!grid) return;
            const filtered = c === 'BCE' ? products : products.filter(p => p[0]?.replace(/"/g,'') === c);
            grid.innerHTML = filtered.map(p => {
                if(!p[1]) return '';
                const name = p[1].replace(/"/g,''), price = p[2], desc = p[3]?.replace(/"/g,'') || '', img = p[4]?.replace(/"/g,'') || '', stock = parseInt(p[5]) || 0;
                const out = stock <= 0;
                return `
                <div class="boss-card p-4 ${out ? 'opacity-30 grayscale' : ''}">
                    <img src="${img}" class="w-full aspect-square object-contain bg-white/5 rounded-2xl p-2 mb-4">
                    <h3 class="text-[10px] font-black text-yellow-500 uppercase leading-none truncate">${name}</h3>
                    <div class="product-desc mb-4">${desc}</div>
                    <div class="mt-auto">
                        <divclass="flex justify-between items-center mb-3">
                            <span class="text-[11px] font-black italic tracking-tighter">${price} ₽</span>
                            <span class="text-[7px] font-black ${out ? 'text-red-500' : 'text-green-500'} uppercase">${out ? 'SOLD' : stock+' ШТ.'}</span>
                        </div>
                        <button onclick="initPay('${name}', ${price})" ${out ? 'disabled' : ''} class="btn-gold w-full py-3 text-[9px]">${out ? 'ЖДЕМ' : 'ДОБАВИТЬ'}</button>
                    </div>
                </div>`;
            }).join('');
        }

        function initPay(name, price) {
            activeOrder = { name, price };
            document.getElementById('pay-name').innerText = name === 'MYSTERY' ? 'ОПЛАТА КЕЙСА' : name;
            document.getElementById('pay-btn').onclick = name === 'MYSTERY' ? startRoulette : sendOrder;
            document.getElementById('m-pay').classList.remove('hidden');
        }

        function sendOrder() {
            const disc = state.discount || 0;
            const final = Math.floor(activeOrder.price * (1 - disc/100));
            const text = `Босс, я оплатила товар!\n\n🛒 Товар: ${activeOrder.name}\n💰 Сумма: ${final} ₽\n🎁 Скидка: ${disc}%\n🆔 Мой ID: ${tg.initDataUnsafe.user?.id || '0000'}`;
            window.open(`https://t.me/nmproda?text=${encodeURIComponent(text)}`);
            closeM();
        }

        function startRoulette() {
            document.getElementById('m-pay').classList.add('hidden');
            document.getElementById('m-roll').classList.remove('hidden');
            const strip = document.getElementById('roll-strip');
            let html = '';
            for(let i=0; i<80; i++) {
                const it = CASE_POOL[Math.floor(Math.random()*CASE_POOL.length)];
                html += `<div class="roulette-item rarity-${it.r}"><span class="text-4xl mb-2">${it.i}</span><span class="text-[8px] font-black uppercase">${it.n}</span></div>`;
            }
            strip.innerHTML = html;
            const winIdx = 70;
            activeOrder.won = CASE_POOL[Math.floor(Math.random()*CASE_POOL.length)];
            const winEl = strip.querySelectorAll('.roulette-item')[winIdx];
            winEl.innerHTML = `<span class="text-4xl mb-2">${activeOrder.won.i}</span><span class="text-[8px] font-black uppercase">${activeOrder.won.n}</span>`;
            winEl.className = `roulette-item rarity-${activeOrder.won.r}`;

            setTimeout(() => {
                const offset = (winIdx * 120) - (document.querySelector('.roulette-container').offsetWidth/2) + 60;
                strip.style.transform = `translateX(-${offset}px)`;
            }, 100);

            setTimeout(() => {
                document.getElementById('won-box').classList.remove('hidden');
                document.getElementById('won-item').innerText = activeOrder.won.n;
                tg.HapticFeedback.notificationOccurred('success');
            }, 8500);
        }

        function claimM() {
            const text = `Босс, я оплатила кейс!\n\n🎁 Выпало: ${activeOrder.won.n}\n🆔 ID: ${tg.initDataUnsafe.user?.id || '0000'}`;
            window.open(`https://t.me/nmproda?text=${encodeURIComponent(text)}`);
            location.reload();
        }

        function initScratch() {
            const can = document.getElementById('can'), ctx = can.getContext('2d');
            can.width = 280; can.height = 160;
            ctx.fillStyle = '#222'; ctx.fillRect(0,0,280,160);
            ctx.fillStyle = '#FFD700'; ctx.font = '900 20px Montserrat'; ctx.fillText('BOSS SCRATCH', 60, 90);
            let paint = false;
            const scr = (e) => {
                if(!paint) return;
                const r = can.getBoundingClientRect();
                const x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
                const y = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath(); ctx.arc(x,y,20,0,Math.PI*2); ctx.fill();
                const d = ctx.getImageData(0,0,280,160).data;
                let t = 0; for(let i=3; i<d.length; i+=4) if(d[i]===0) t++;
                if(t > d.length/4*0.6) {
                    can.remove(); state.discount = Math.floor(Math.random()*3)+1; state.lastLuck = Date.now();
                    localStorage.setItem('BOSS_S18', JSON.stringify(state));
                    render('luck');
                }
            };
            can.addEventListener('mousedown',()=>paint=true); can.addEventListener('touchstart',()=>paint=true);
            window.addEventListener('mouseup',()=>paint=false); window.addEventListener('touchend',()=>paint=false);
            can.addEventListener('mousemove',scr); can.addEventListener('touchmove',scr);
        }

        function copy(t) {
            navigator.clipboard.writeText(t);
            const o = document.getElementById('toast'); o.style.display = 'block';
            setTimeout(()=>o.style.display='none', 1500);
            tg.HapticFeedback.impactOccurred('medium');
        }

        function closeM() { document.querySelectorAll('.modal').forEach(m => m.classList.add('hidden')); }
        nav('shop');
    </script>
</body>
</html>
