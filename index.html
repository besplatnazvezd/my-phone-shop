        /* НЕОНОВЫЕ ЭФФЕКТЫ ПРИ ПРОМО */

        .promo-active .neon-frame { display: block; }
        .promo-active .price-glow { color: var(--neon) !important; text-shadow: 0 0 12px var(--neon); }
        .promo-active .boss-card { border-color: var(--neon); }

        .boss-card { background: var(--card); border-radius: 18px; border: 1px solid rgba(255, 215, 0, 0.08); overflow: hidden; position: relative; transition: 0.4s; }
        .btn-gold { background: linear-gradient(180deg, #FFD700 0%, #BA8B02 100%); color: #000; font-weight: 900; text-transform: uppercase; border-radius: 12px; }
        
        .sold-out { opacity: 0.3; pointer-events: none; }
        .sold-out-stamp { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) rotate(-15deg); background: #ff0000; color: #fff; font-weight: 900; padding: 5px 15px; border-radius: 4px; z-index: 100; border: 2px solid white; font-size: 14px; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: rgba(5,5,5,0.96); backdrop-filter: blur(12px); border-top: 1px solid rgba(255,215,0,0.1); padding: 12px 0 35px; display: flex; justify-content: space-around; z-index: 10000; }

        .cat-item.active { color: var(--gold); border-bottom: 2px solid var(--gold); }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 20000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .hidden { display: none !important; }

            <div class="space-y-2 mb-6 text-left">
                <div onclick="copy('+79501700787')" class="bg-white/5 p-4 rounded-xl border border-white/5"><p class="text-[7px] opacity-40 font-black uppercase">💛 Т-Банк / СБП</p><p class="font-bold text-yellow-500 text-sm">+7 950 170 07 87</p></div>

        <div onclick="render('promo')" id="n-promo" class="nav-item"><span>Промо</span></div>
        <div onclick="render('support')" id="n-support" class="nav-item"><span>Связь</span></div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        const BOT_TOKEN = '8730430332:AAGff_PCX2059o3EUwG-d9C19uTqcH4sAZ4';
        const ADMIN_ID = '7727345054';

        tg.ready(); tg.expand();

        let state = JSON.parse(localStorage.getItem('BOSS_V35')) || { 
            discount: 0, lastLuck: 0, spent: 0, promoActive: false, promoVal: 0,
            regDate: new Date().toLocaleDateString('ru-RU'),
            promos: [{c:'BOSS2026', l:25, d:5}, {c:'VIPGOLD', l:25, d:10}]
        };
        let products = []; let curCat = 'BCE'; let activeItem = null;

        async function render(page) {
            const app = document.getElementById('app');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('n-'+page).classList.add('active');
            document.getElementById('b-tag').classList.toggle('promo-active', state.promoActive);

            if(page === 'shop') {
                app.innerHTML = `<h1 class="text-xl font-black italic text-yellow-500 uppercase text-center mb-2 italic">BOSS STORE</h1><div class="flex overflow-x-auto gap-4 mb-4" id="cat-bar"></div><div id="grid" class="grid grid-cols-2 gap-4 pb-10"></div>`;
                if(products.length === 0) {
                    const res = await fetch('https://docs.google.com/spreadsheets/d/1q9vPlWM9t934ACzIwbZU4_EDtvpJdfO09-jodyIi9Ew/export?format=csv');
                    const text = await res.text();
                    if(text) products = text.split('\n').slice(1).map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
                }
                const cats = ['BCE', ...new Set(products.map(p => p[0]?.replace(/"/g,'')).filter(Boolean))];
                document.getElementById('cat-bar').innerHTML = cats.map(c => `<div onclick="setCat('${c}')" class="cat-item ${curCat === c ? 'active' : ''}">${c}</div>`).join('');
                setCat(curCat);
            }

            if(page === 'status') {
                const user = tg.initDataUnsafe.user || {id: '7727345054', username: 'nmproda'};
                app.innerHTML = `<div class="boss-card p-8 bg-gradient-to-br from-yellow-500/10 to-transparent">
                    <p class="text-yellow-500 font-black italic text-[10px] uppercase mb-10 tracking-[3px]">BOSS VIP STATUS</p>
                    <div class="mb-10">
                        <div class="flex justify-between text-[11px] font-black mb-3"><span>PROGRESS</span><span>${state.spent} ₽</span></div>
                        <div class="h-1.5 bg-white/5 rounded-full overflow-hidden"><div class="h-full bg-yellow-500" style="width:${Math.min(state.spent/500, 100)}%"></div></div>
                    </div>
                    <div class="grid grid-cols-2 gap-8 text-[10px] font-black uppercase">
                        <div><p class="opacity-20 mb-1 text-[7px]">ID КЛИЕНТА</p>${user.id}</div>
                        <div><p class="opacity-20 mb-1 text-[7px]">ЮЗЕР</p>@${user.username}</div>
                        <div class="text-yellow-500"><p class="opacity-20 mb-1 text-[7px] text-white">СКИДКА</p>${state.discount + state.promoVal}%</div>
                        <div><p class="opacity-20 mb-1 text-[7px]">РЕГ</p>${state.regDate}</div>
                    </div></div>`;
            }
            if(page === 'luck' || page === 'promo' || page === 'support') {
                app.innerHTML = `<div class="text-center pt-10 font-black text-yellow-500 uppercase">Раздел ${page} активен</div>`;
                if(page === 'promo') renderPromo(app);
            }
        }

        function renderPromo(app) {
            app.innerHTML = `<div class="pt-6"><h2 class="text-yellow-500 font-black italic uppercase text-center mb-8 italic">АКТИВАЦИЯ ПРОМО</h2><div class="boss-card p-6 mb-8 bg-white/5"><input type="text" id="p-in" placeholder="ВВЕДИТЕ КОД" class="uppercase mb-4 font-black"><button onclick="applyP()" class="btn-gold w-full py-4 text-[11px] mt-2">АКТИВИРОВАТЬ</button></div></div>`;
        }

        function setCat(c) {
            curCat = c; const grid = document.getElementById('grid'); if(!grid) return;
            const filt = c === 'BCE' ? products : products.filter(p => p[0]?.replace(/"/g,'') === c);
            grid.innerHTML = filt.map(p => {
                const name = p[1]?.replace(/"/g,''), price = parseFloat(p[2]), img = p[4]?.replace(/"/g,''), stock = parseInt(p[5]);
                if(!name) return ''; const out = stock <= 0;
                return `<div class="boss-card flex flex-col ${out ? 'sold-out' : ''}">${out ? '<div class="sold-out-stamp">SOLD OUT</div>' : ''}<img src="${img}" class="w-full aspect-square object-cover"><div class="p-3"><h3 class="text-[9px] font-black text-yellow-500 uppercase mb-2">${name}</h3><span class="text-xs font-black price-glow">${price} ₽</span><button onclick="openPay('${name}', ${price}, ${stock})" class="btn-gold w-full py-2 mt-2 text-[9px]">КУПИТЬ</button></div></div>`;
            }).join('');
        }

        function openPay(n, p, s) { activeItem={n,p,s}; document.getElementById('p-name').innerText=n; document.getElementById('p-qty').value=1; calcTotal(); document.getElementById('m-pay').classList.remove('hidden'); }
        function calcTotal() { let q=parseInt(document.getElementById('p-qty').value)||1; const total=(activeItem.p*q)*(1-(state.discount+state.promoVal)/100); document.getElementById('p-total').innerText=total.toFixed(2)+' ₽'; }
        
        function applyP() {
            const code=document.getElementById('p-in').value.toUpperCase();
            const p=state.promos.find(x=>x.c===code);
            if(p && p.l>0){ p.l--; state.promoActive=true; state.promoVal=p.d; save(); render('shop'); } else alert('КОД НЕВЕРЕН');
        }

        async function order() {
            let q = parseInt(document.getElementById('p-qty').value) || 1;
            const total = ((activeItem.p * q) * (1 - (state.discount + state.promoVal)/100)).toFixed(2);
            const user = tg.initDataUnsafe.user || {id: '7727345054', username: 'nmproda'};
            
            // Текст для отправки в бота
            const textForBot = `🔥НОВЫЙ ЗАКАЗ🔥\n💎 Товар-${activeItem.n}💎\n 📦Количество-${q}📦\n 🔢Остаток-${activeItem.s - q}🔢\n 👛Цена-${total} ₽👛\n 🙊Скидка-${state.discount + state.promoVal}%🙈\n ❤️Мой айди-${user.id}❤️\n ⭐️Мой юзернейм-@${user.username}⭐️`;
            
            // 1. Отправка тебе в бота
            try { await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ADMIN_ID}&text=${encodeURIComponent(textForBot)}`); } catch(e){}

            // 2. Обновление честной статистики
            state.spent += parseFloat(total);
            state.promoActive = false; state.promoVal = 0; save();

            // 3. Отправка в ЛС менеджеру (другой текст)
            const textForManager = `💥 Новый заказ от клиента!\n\nТовар: ${activeItem.n}\nКоличество: ${q}\nИтого к оплате: ${total} ₽\nСкидка: ${state.discount + state.promoVal}%\n\nID клиента: ${user.id}\nНик: @${user.username}`;
            tg.openTelegramLink(`https://t.me/nmproda?text=${encodeURIComponent(textForManager)}`);
            
            closeM(); render('status');
        }

        function copy(t) { navigator.clipboard.writeText(t); document.getElementById('toast').classList.remove('hidden'); setTimeout(()=>document.getElementById('toast').classList.add('hidden'),1500); }
        function save() { localStorage.setItem('BOSS_V35', JSON.stringify(state)); }
        function closeM() { document.getElementById('m-pay').classList.add('hidden'); }
        render('shop');
    </script>
