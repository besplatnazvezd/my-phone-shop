<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOSS STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #FFD700; --bg: #000; --card: #0d0d0d; --neon: #ff00ff; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: #fff; margin: 0; padding-bottom: 110px; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .neon-frame { position: fixed; inset: 0; border: 3px solid var(--neon); box-shadow: inset 0 0 15px var(--neon), 0 0 15px var(--neon); z-index: 9998; pointer-events: none; display: none; opacity: 0.6; animation: breathe 1.5s infinite ease-in-out; }
        @keyframes breathe { 0%, 100% { opacity: 0.3; box-shadow: inset 0 0 10px var(--neon), 0 0 10px var(--neon); } 50% { opacity: 0.8; box-shadow: inset 0 0 25px var(--neon), 0 0 25px var(--neon); } }
        .promo-active .neon-frame { display: block; }
        .promo-active .price-glow { color: var(--neon) !important; text-shadow: 0 0 12px var(--neon); }
        .promo-active .boss-card { border-color: var(--neon); }
        .boss-card { background: var(--card); border-radius: 18px; border: 1px solid rgba(255, 215, 0, 0.08); overflow: hidden; position: relative; transition: 0.4s; }
        .btn-gold { background: linear-gradient(180deg, #FFD700 0%, #BA8B02 100%); color: #000; font-weight: 900; text-transform: uppercase; border-radius: 12px; }
        .sold-out { opacity: 0.3; pointer-events: none; }
        .sold-out-stamp { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) rotate(-15deg); background: #ff0000; color: #fff; font-weight: 900; padding: 5px 15px; border-radius: 4px; z-index: 100; border: 2px solid white; font-size: 14px; }
        #scr-wrap { position: relative; width: 330px; height: 210px; background: #111; border-radius: 24px; display: flex; align-items: center; justify-content: center; border: 2px solid rgba(255, 215, 0, 0.2); overflow: hidden; }
        canvas { position: absolute; inset: 0; z-index: 10; touch-action: none; cursor: crosshair; }
                .nav-bar { position: fixed; bottom: 0; width: 100%; background: rgba(5,5,5,0.96); backdrop-filter: blur(12px); border-top: 1px solid rgba(255, 215, 0, 0.1); padding: 12px 0 35px; display: flex; justify-content: space-around; z-index: 10000; }
        .nav-item { color: #444; font-size: 8px; font-weight: 800; text-transform: uppercase; display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
        .nav-item.active { color: var(--gold); }
        .cat-scroll { display: flex; overflow-x: auto; gap: 15px; padding: 10px 0 20px; scrollbar-width: none; }
        .cat-item { white-space: nowrap; font-size: 9px; font-weight: 900; color: #333; text-transform: uppercase; border-bottom: 2px solid transparent; padding-bottom: 2px; }
        .cat-item.active { color: var(--gold); border-bottom: 2px solid var(--gold); }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 20000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .hidden { display: none !important; }
        input, textarea { background: #1a1a1a !important; border: 1px solid rgba(255, 215, 0, 0.2) !important; border-radius: 12px; padding: 14px; color: #fff; font-weight: 900; text-align: center; outline: none; width: 100%; }
        textarea { text-align: left; resize: none; }
    </style>
</head>
<body id="b-tag">

    <div class="neon-frame"></div>
    <div id="toast" class="fixed top-5 left-1/2 -translate-x-1/2 bg-yellow-500 text-black px-6 py-2 rounded-full font-black text-[10px] z-[30000] hidden uppercase">Скопировано</div>

    <main id="app" class="px-4 pt-6"></main>

    <!-- Окно оплаты реквизиты -->
    <div id="m-pay" class="modal hidden">
        <div class="boss-card w-full max-w-sm p-6 text-center bg-[#0a0a0a]">
            <h2 id="p-name" class="text-yellow-500 font-black italic uppercase mb-6 text-xl"></h2>
            <div class="mb-6">
                <p class="text-[8px] opacity-30 font-black uppercase mb-2">Количество:</p>
                <input type="number" id="p-qty" value="1" oninput="calcTotal()">
            </div>
            <div class="space-y-2 mb-6 text-left">
                <div onclick="copy('+79501700787')" class="bg-white/5 p-4 rounded-xl border border-white/5">
                    <p class="text-[7px] opacity-40 font-black uppercase">💛 Т-Банк / СБП</p>
                    <p class="font-bold text-yellow-500 text-sm">+7 950 170 07 87</p>
                </div>
                <div onclick="copy('2200701955299232')" class="bg-white/5 p-4 rounded-xl border border-white/5">
                    <p class="text-[7px] opacity-40 font-black uppercase">💳 Карта Т-Банк</p>
                    <p class="font-bold text-yellow-500 text-sm">2200 7019 5529 9232</p>
                </div>
            </div>
            <div class="mb-6">
                <p class="text-[9px] font-black opacity-40 uppercase">К оплате:</p>
                <p id="p-total" class="text-2xl font-black text-yellow-500 price-glow">0.00 ₽</p>
            </div>
            <div class="flex gap-3">
                <button onclick="closeM()" class="w-1/3 py-4 text-[9px] font-black opacity-30">НАЗАД</button>
                <button onclick="showInfoCard()" class="w-2/3 btn-gold py-4 text-[10px]">Я ОПЛАТИЛА</button>
            </div>
        </div>
    </div>

    <!-- ТВОЯ НОВАЯ КАРТОЧКА ДАННЫХ -->
    <div id="m-info" class="modal hidden">
        <div class="boss-card w-full max-w-sm p-6 text-center bg-[#0a0a0a]">
            <h2 class="text-yellow-500 font-black italic uppercase mb-4 text-lg">КУДА ОТПРАВИТЬ?</h2>
            <p class="text-[8px] opacity-40 uppercase mb-4">Укажите данные для получения</p>
            <textarea id="delivery-data" rows="3" placeholder="Пример: тг звёзды, юзернейм @nnnnn" class="text-xs mb-6"></textarea>
            <div class="flex gap-3">
                <button onclick="hideInfoCard()" class="w-1/3 py-4 text-[9px] font-black opacity-30">ОТМЕНА</button>
                <button onclick="order()" class="w-2/3 btn-gold py-4 text-[10px]">ОТПРАВИТЬ ЗАКАЗ</button>
            </div>
        </div>
    </div>

    <nav class="nav-bar">
        <div onclick="render('shop')" id="n-shop" class="nav-item active"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" stroke-width="2"/></svg><span>Шоп</span></div>
        <div onclick="render('luck')" id="n-luck" class="nav-item"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-width="2"/></svg><span>Удача</span></div>
        <div onclick="render('status')" id="n-status" class="nav-item"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" stroke-width="2"/></svg><span>Статус</span></div>
        <div onclick="render('promo')" id="n-promo" class="nav-item"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 8v13m0-13V6a2 2 0 112 2h-2zm0 0V5.5A2.5 2.5 0 109.5 8H12z" stroke-width="2"/></svg><span>Промо</span></div>
        <div onclick="render('support')" id="n-support" class="nav-item"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" stroke-width="2"/></svg><span>Связь</span></div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        const BOT_TOKEN = '8730430332:AAGff_PCX2059o3EUwG-d9C19uTqcH4sAZ4';
        const ADMIN_ID = '7727345054';

        tg.ready(); tg.expand();

        // Получаем уникальный ID пользователя Telegram или используем 'default_user' для тестов
        const userId = tg.initDataUnsafe.user?.id || 'default_user';
        let state = {};

        // Загружаем состояние конкретного пользователя из localStorage
        const storedState = localStorage.getItem('BOSS_V32_' + userId);
        
        if (storedState) {
            state = JSON.parse(storedState);
            // Убедимся, что промокодов всегда 100, даже если старое состояние было другим
            state.promos.forEach(p => { 
                if (p.l < 100) p.l = 100; // Исправлено на 100, если было меньше
            });
        } else {
            // Начальное состояние для нового пользователя
            state = {
                discount: 0, 
                lastLuck: 0, 
                spent: 0, 
                promoActive: false, 
                promoVal: 0, 
                items: [],
                regDate: new Date().toLocaleDateString('ru-RU'), // Дата регистрации нового пользователя
                promos: [{c:'BOSS3', l:100, d:3}, {c:'BOSS6', l:100, d:6}] // Промокоды по 100 штук
            };
        }
        
        let products = [];
        let curCat = 'ВСЕ';
        let activeItem = null;

        // Функция сохранения состояния (теперь с привязкой к userId)
        function save() { 
            localStorage.setItem('BOSS_V32_' + userId, JSON.stringify(state)); 
        }

        async function render(page) {
            const app = document.getElementById('app');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            const activeBtn = document.getElementById('n-'+page);
            if(activeBtn) activeBtn.classList.add('active');
            document.getElementById('b-tag').classList.toggle('promo-active', state.promoActive);

            if (page === 'shop') {
                app.innerHTML = `<h1 class="text-xl font-black italic text-yellow-500 uppercase text-center mb-2 italic">BOSS STORE</h1><div class="cat-scroll" id="cat-bar"></div><div id="grid" class="grid grid-cols-2 gap-4 pb-10"></div>`;
                if(products.length === 0) {
                    try {
                        const res = await fetch('https://docs.google.com/spreadsheets/d/1q9vPlWM9t934ACzIwbZU4_EDtvpJdfO09-jodyIi9Ew/export?format=csv');
                        const text = await res.text();
                        products = text.split('\n').slice(1).map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
                    } catch(e) { console.error("Load error"); }
                }
                const cats = ['ВСЕ', ...new Set(products.map(p => p[0]?.replace(/"/g, '')).filter(Boolean))];
                document.getElementById('cat-bar').innerHTML = cats.map(c => `<div onclick="setCat('${c}')" class="cat-item ${curCat === c ? 'active' : ''}">${c}</div>`).join('');
                setCat(curCat); // Убедимся, что при рендере категории правильно выделяются
            } 
            else if (page === 'luck') {
                const canScratch = (Date.now() - state.lastLuck) > 86400000;
                app.innerHTML = `
                    <div class="flex flex-col items-center pt-10">
                        <h2 class="text-yellow-500 font-black italic uppercase mb-10 italic">СКРЕТЧ-КАРТА</h2>
                        <div id="scr-wrap">
                            <div class="text-center">
                                <p class="text-[10px] font-black text-yellow-500 opacity-40 mb-2 uppercase">ВАША СКИДКА:</p>
                                <div class="text-6xl font-black text-yellow-500 italic">${canScratch ? '???' : (state.discount > 0 ? '-'+state.discount+'%' : '---')}</div>
                            </div>
                            ${canScratch ? '<canvas id="can"></canvas>' : ''}
                        </div>
                        ${!canScratch && state.discount === 0 ? '<p class="text-[8px] opacity-40 uppercase mt-4">Приходите завтра за новой скидкой!</p>' : ''}
                    </div>`;
                if(canScratch) initScr();
            }
            else if (page === 'promo') {
                app.innerHTML = `<div class="pt-6"><h2 class="text-yellow-500 font-black italic uppercase text-center mb-8 italic">АКТИВАЦИЯ ПРОМО</h2><div class="boss-card p-6 mb-8 bg-white/5"><input type="text" id="p-in" placeholder="ВВЕДИТЕ КОД" class="uppercase mb-4 font-black"><button onclick="applyP()" class="btn-gold w-full py-4 text-[11px] mt-2">АКТИВИРОВАТЬ</button></div><div class="space-y-3">${state.promos.map(p => `<div onclick="copy('${p.c}')" class="boss-card p-4 flex justify-between items-center bg-white/5 border-white/5"><div><p class="font-black text-yellow-500">${p.c}</p><p class="text-[7px] opacity-40 font-black">СКИДКА ${p.d}%</p></div><div class="text-right"><p class="font-black text-xs">${p.l}</p><p class="text-[6px] opacity-30 uppercase">ОСТАЛОСЬ</p></div></div>`).join('')}</div></div>`;
            }
            else if (page === 'status') {
                const limit = 100000;
                const progress = Math.min((state.spent / limit) * 100, 100);app.innerHTML = `<div class="boss-card p-8 bg-gradient-to-br from-yellow-500/10 to-transparent"><p class="text-yellow-500 font-black italic text-[10px] uppercase mb-10 tracking-[3px]">BOSS VIP STATUS</p><div class="mb-10"><div class="flex justify-between text-[11px] font-black mb-3"><span>PROGRESS TO 100K</span><span>${Math.floor(state.spent).toLocaleString()} / 100 000 ₽</span></div><div class="h-1.5 bg-white/5 rounded-full overflow-hidden"><div class="h-full bg-yellow-500" style="width:${progress}%"></div></div></div><div class="grid grid-cols-2 gap-8 text-[10px] font-black uppercase text-left"><div><p class="opacity-20 mb-1 text-[7px]">ID КЛИЕНТА</p>${tg.initDataUnsafe.user?.id || '---'}</div><div><p class="opacity-20 mb-1 text-[7px]">ЮЗЕР</p>@${tg.initDataUnsafe.user?.username || 'user'}</div><div class="text-yellow-500"><p class="opacity-20 mb-1 text-[7px] text-white">СКИДКА</p>${state.discount + state.promoVal}%</div><div><p class="opacity-20 mb-1 text-[7px]">РЕГ</p>${state.regDate}</div></div><div class="mt-8 border-t border-white/5 pt-4 text-left"><p class="text-[8px] opacity-40 mb-3 uppercase font-black italic">ИСТОРИЯ ПОКУПОК:</p><div class="space-y-2 max-h-48 overflow-y-auto pr-2">${state.items.length === 0 ? '<p class="text-[9px] opacity-20 italic text-center">ПОКА ПУСТО</p>' : state.items.slice().reverse().map(i => `<div class="bg-white/5 p-3 rounded-xl flex justify-between items-center border-white/5"><div class="text-[9px] font-bold uppercase truncate pr-2">${i.name}</div><div class="text-[9px] text-yellow-500 font-black whitespace-nowrap">${i.total} ₽</div></div>`).join('')}</div></div></div>`;
            }
            else if (page === 'support') {
                app.innerHTML = `<div class="space-y-4 pt-10"><div onclick="window.open('https://t.me/osnovabossstore')" class="boss-card p-6 flex items-center gap-6 bg-white/5"><div class="text-3xl">📢</div><div class="text-left"><p class="font-black text-sm uppercase italic">BOSS КАНАЛ</p><p class="text-[8px] opacity-40 uppercase font-bold">НОВОСТИ И СКИДКИ</p></div></div><div onclick="window.open('https://t.me/nmproda')" class="boss-card p-6 flex items-center gap-6 bg-white/5"><div class="text-3xl">👨‍💻</div><div class="text-left"><p class="font-black text-sm uppercase italic">МЕНЕДЖЕР</p><p class="text-[8px] opacity-40 uppercase font-bold">@NMPRODA</p></div></div></div>`;
            }
        }

        function setCat(c) {
            curCat = c; 
            // Управление активным классом для подчеркивания
            document.querySelectorAll('.cat-item').forEach(el => {
                el.classList.remove('active');
            });
            const activeCatElement = document.querySelector(`#cat-bar .cat-item[onclick="setCat('${c}')"]`);
            if (activeCatElement) {
                activeCatElement.classList.add('active');
            }

            const grid = document.getElementById('grid'); if(!grid) return;
            const filt = c === 'ВСЕ' ? products : products.filter(p => p[0]?.replace(/"/g, '') === c);
            grid.innerHTML = filt.map(p => {
                const name = p[1]?.replace(/"/g, ''), price = parseFloat(p[2]), desc = p[3]?.replace(/"/g, ''), img = p[4]?.replace(/"/g, ''), stock = parseInt(p[5]);
                if(!name) return ''; const out = stock <= 0;
                return `<div class="boss-card flex flex-col ${out ? 'sold-out' : ''}">${out ? '<div class="sold-out-stamp">SOLD OUT</div>' : ''}<img src="${img}" class="w-full aspect-square object-cover"><div class="p-3 flexflex-col flex-1"><h3 class="text-[9px] font-black text-yellow-500 uppercase leading-none mb-2 italic">${name}</h3><div class="mt-auto"><div class="flex justify-between items-center mb-3"><span class="text-xs font-black price-glow">${price.toFixed(2)} ₽</span><span class="text-[7px] font-black opacity-30 uppercase">${stock} шт.</span></div><button onclick="openPay('${name}', ${price}, ${stock})" class="btn-gold w-full py-2.5 text-[9px]">ДОБАВИТЬ</button><p class="text-[7px] opacity-30 uppercase font-bold mt-4 leading-tight">${desc}</p></div></div></div>`;
            }).join('');
        }

        function openPay(n, p, s) { activeItem = {n, p, s}; document.getElementById('p-name').innerText=n; document.getElementById('p-qty').value=1; calcTotal(); document.getElementById('m-pay').classList.remove('hidden'); }
        function calcTotal() {
            let q = parseInt(document.getElementById('p-qty').value)||1;
            if(q > activeItem.s) q = activeItem.s;
            const total = (activeItem.p * q) * (1 - (state.discount + state.promoVal)/100);
            document.getElementById('p-total').innerText = total.toFixed(2) + ' ₽';
        }

        function showInfoCard() { document.getElementById('m-pay').classList.add('hidden'); document.getElementById('m-info').classList.remove('hidden'); }
        function hideInfoCard() { document.getElementById('m-info').classList.add('hidden'); document.getElementById('m-pay').classList.remove('hidden'); }

        async function order() {
            const delivery = document.getElementById('delivery-data').value;
            if(!delivery) return alert("Введите данные для отправки!");
            
            let q = parseInt(document.getElementById('p-qty').value);
            if (q > activeItem.s) q = activeItem.s;
            const finalPrice = ((activeItem.p * q) * (1 - (state.discount + state.promoVal)/100)).toFixed(2);
            const user = tg.initDataUnsafe.user || {id: 'default_user_id', username: 'default_user'}; // Fallback для пользователя

            const text = `🔥 НОВЫЙ ЗАКАЗ 🔥\n💎 Товар- [${activeItem.n}]💎\n📦 Количество- [${q}]📦\n📉 Остаток- [${activeItem.s - q}]📉\n💰 Цена- [${finalPrice} ₽]💰\n🎁 Скидка- [${state.discount + state.promoVal}%]🎁\n👤 Мой айди- [${user.id}]❤️\n⭐ Мой юзернейм- [@${user.username}]⭐\n\n📍 КУДА ОТПРАВИТЬ:\n${delivery}`;

            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ADMIN_ID}&text=${encodeURIComponent(text)}`);
                state.spent += parseFloat(finalPrice);
                state.items.push({ name: activeItem.n, total: finalPrice });
                state.promoActive = false; state.promoVal = 0;
                save();
                alert("ЗАКАЗ ОТПРАВЛЕН АДМИНУ!");
                document.getElementById('m-info').classList.add('hidden');
                document.getElementById('delivery-data').value = "";
                render('status');
                tg.HapticFeedback.notificationOccurred('success');
            } catch(e) {
                alert("Ошибка при отправке. Попробуйте еще раз.");
            }
        }

        function applyP() {
            if(state.promoActive){alert('У вас уже есть активный промокод!'); return;}
            const code = document.getElementById('p-in').value.toUpperCase();
            const p = state.promos.find(x=>x.c===code);
            if(p && p.l>0){
                p.l--; state.promoActive=true; state.promoVal=p.d;
                save(); render('shop');
                tg.HapticFeedback.notificationOccurred('success');
            } else alert('КОД НЕВЕРЕН ИЛИ ЗАКОНЧИЛСЯ');
        }

        function initScr() {
            const can=document.getElementById('can'), ctx=can.getContext('2d'); can.width=330; can.height=210;
            ctx.fillStyle='#222'; ctx.fillRect(0,0,330,210); // Заливка карты
            ctx.fillStyle='#FFD700'; ctx.font='900 28px Montserrat';
            for(let i=0;i<4;i++) for(let j=0;j<3;j++) ctx.fillText('?',50+i*80,70+j*65); // Отображаем '???'
            let active=false;
            const scratch=(e)=>{
                if(!active)return;
                const r=can.getBoundingClientRect();
                const x=(e.touches?e.touches[0].clientX:e.clientX)-r.left, y=(e.touches?e.touches[0].clientY:e.clientY)-r.top;
                ctx.globalCompositeOperation='destination-out';
                ctx.beginPath(); ctx.arc(x,y,40,0,Math.PI*2); ctx.fill();
                const d=ctx.getImageData(0,0,330,210).data; let t=0;
                for(let i=3;i<d.length;i+=4) if(d[i]===0) t++;
                if(t>d.length/4*0.5){ // Если стерто более 50%
                    can.remove(); // Удаляем канвас
                    const r=Math.random();
                    state.discount=r<0.5?1:(r<0.9?2:3); // Выдаем новую скидку
                    state.lastLuck=Date.now(); // Обновляем время последнего использования
                    save(); render('luck'); // Сохраняем и перерисовываем
                }
            };
            can.addEventListener('mousedown',()=>active=true); can.addEventListener('touchstart',()=>active=true);
            window.addEventListener('mousemove',scratch); window.addEventListener('touchmove',scratch);
            window.addEventListener('mouseup',()=>active=false); window.addEventListener('touchend',()=>active=false);
        }

        function copy(t) { navigator.clipboard.writeText(t); document.getElementById('toast').classList.remove('hidden'); setTimeout(()=>document.getElementById('toast').classList.add('hidden'),1500); tg.HapticFeedback.impactOccurred('medium'); }
        function closeM() { document.getElementById('m-pay').classList.add('hidden'); }

        render('shop'); // Изначально рендерим страницу "Шоп"
    </script>
</body>
</html>
