<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOSS STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #000; color: #fff; overflow-x: hidden; padding-bottom: 130px; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .cat-btn { transition: 0.3s; border-radius: 10px; padding: 8px 14px; font-weight: 700; font-size: 10px; white-space: nowrap; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.02); }
        .cat-btn.active { background: #EAB308; color: #000; border-color: #EAB308; box-shadow: 0 0 15px rgba(234,179,8,0.4); }
        .btn-click:active { transform: scale(0.95); }
        .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #444; transition: 0.3s; background: none; border: none; flex: 1; }
        .nav-btn.active { color: #EAB308; filter: drop-shadow(0 0 8px rgba(234,179,8,0.6)); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.4s ease forwards; }
    </style>
</head>
<body>

    <header class="p-8 pb-2 text-center">
        <h1 class="text-4xl font-black italic text-yellow-500 tracking-tighter italic uppercase">Boss Store</h1>
        <p class="text-[8px] text-gray-500 uppercase tracking-[6px] font-black opacity-50">Premium Agency</p>
    </header>

    <main id="main-content" class="p-4 min-h-[60vh]"></main>

    <!-- КОРЗИНА -->
    <div id="checkout-bar" class="fixed bottom-28 left-4 right-4 glass p-4 rounded-[25px] flex justify-between items-center hidden z-[90] border-yellow-500/20 shadow-2xl">
        <div>
            <p id="total-price" class="text-xl font-black text-yellow-500 italic">0 ₽</p>
                        <p class="text-[7px] text-gray-500 uppercase font-black tracking-widest">КОРЗИНА: <span id="cart-count">0</span></p>
        </div>
        <button onclick="confirmOrder()" class="bg-yellow-500 text-black px-8 py-3 rounded-xl font-black uppercase text-[10px] btn-click">Оформить</button>
    </div>

    <!-- МЕНЮ -->
    <nav class="fixed bottom-0 left-0 right-0 glass border-t border-white/5 p-4 flex justify-around items-center z-[100] rounded-t-[30px]">
        <button onclick="changePage('shop')" id="nav-shop" class="nav-btn active">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
            <span class="text-[8px] font-black uppercase">Шоп</span>
        </button>
        <button onclick="changePage('reviews')" id="nav-reviews" class="nav-btn">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span class="text-[8px] font-black uppercase">Отзывы</span>
        </button>
        <button onclick="changePage('ref')" id="nav-ref" class="nav-btn">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
            <span class="text-[8px] font-black uppercase">Друзья</span>
        </button>
        <button onclick="changePage('support')" id="nav-support" class="nav-btn">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z" stroke="currentColor" stroke-width="2"></path></svg>
            <span class="text-[8px] font-black uppercase">Связь</span>
        </button>
    </nav>

    <!-- ОПЛАТА -->
    <div id="pay-modal" class="fixed inset-0 bg-black/98 flex items-center justify-center hidden z-[200] p-6 backdrop-blur-2xl">
                <div class="glass w-full max-w-sm p-8 rounded-[45px] text-center border-yellow-500/20">
            <h2 class="text-2xl font-black mb-1 italic text-yellow-500 uppercase">ОПЛАТА</h2>
            <p class="text-gray-500 text-[8px] mb-8 tracking-[3px] uppercase font-black italic">Тапни для копирования</p>
            
            <div onclick="copyText(BANK_CARD, 'Карта Т-Банк скопирована!')" class="bg-white/5 p-4 rounded-[20px] mb-2 border border-white/5 active:scale-95 transition-all text-left cursor-pointer">
                <p class="text-[7px] text-gray-500 mb-1 font-black uppercase italic tracking-widest">Карта Т-Банк</p>
                <p class="text-sm font-black text-white italic tracking-widest" id="display-card">...</p>
            </div>
            <div onclick="copyText(SBP_PHONE, 'Номер Т-банк СБП скопирован!')" class="bg-white/5 p-4 rounded-[20px] mb-2 border border-white/5 active:scale-95 transition-all text-left cursor-pointer">
                <p class="text-[7px] text-gray-500 mb-1 font-black uppercase italic tracking-widest">СБП (Т-Банк)</p>
                <p class="text-sm font-black text-white italic tracking-widest" id="display-sbp">...</p>
            </div>
            <div onclick="copyText(YOOMONEY, 'ЮMoney скопирован!')" class="bg-white/5 p-4 rounded-[20px] mb-8 border border-white/5 active:scale-95 transition-all text-left cursor-pointer">
                <p class="text-[7px] text-gray-500 mb-1 font-black uppercase italic tracking-widest">ЮMoney</p>
                <p class="text-sm font-black text-white italic tracking-widest" id="display-yoo">...</p>
            </div>

            <button onclick="document.getElementById('pay-modal').classList.add('hidden')" class="w-full py-5 bg-yellow-500 text-black rounded-2xl font-black uppercase text-[10px] btn-click shadow-xl">Я оплатил(а)</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // --- ДАННЫЕ (ПРОВЕРЬ АЙДИ!) ---
        const BOT_TOKEN = '7611596495:AAGrVvPST_iK266eR9G_PstV9Y8073M_C6I';
        const ADMIN_ID = '7727345054';
        const SHEET_ID = '1-OatX3M0yQ8UaK-X-yNnd8Lp-F-M2uG5oR_y-E17T_s';
        const BANK_CARD = '2200 7019 5529 9232'; 
        const SBP_PHONE = '+79501700787'; 
        const YOOMONEY = '4100119121976236';
        // -------------------------

        document.getElementById('display-card').innerText = BANK_CARD;
        document.getElementById('display-sbp').innerText = SBP_PHONE;
        document.getElementById('display-yoo').innerText = YOOMONEY;

        let products = []; let cart = []; let currentCat = 'Bce'; let currentPage = 'shop';

        const reviewsData = [
            "Лучший шоп! Всё выдали за 5 минут. Рекомендую BOSS STORE!",
            "Цены на накрутку — огонь, @nmproda помог всё топ.",
            "Брал 1000 робуксов, пришли сразу. Сервис на высоте.",
            "Спасибо за честность! В BOSS STORE реально не кидают.",
            "Качество на высоте. Подписки держатся долго.",
            "Самый адекватный админ. Всё по красоте.",
            "Звезды ТГ залетели моментально! Самый низкий прайс.",
            "BOSS STORE — реально боссы в своем деле.",
            "Брала просмотры, пришли за минут 20. Супер!",
            "Быстро, дешево, надежно. Теперь только сюда.",
            "Менеджер ответил за минуту, помог с выбором.",
            "Респект за сервис. Качество — пушка.",
            "Всё пришло в лучшем виде, даже с бонусом сверху!",
            "Накрутка самая дешевая на всем рынке.",
            "Очень довольна покупкой. Всё просто и удобно.",
            "Сервис топ, интерфейс очень стильный.",
            "Всё честно, nmproda.",
            "Беру тут постоянно расходники для ТГ, всё ок.",
            "Оперативно работают ребята, поддержка 10/10.",
            "Лучший выбор цифровых товаров в одном месте.",
            "BOSS STORE — это любовь с первого заказа!"
            "Купила тг акк, все гуд, не слет, верно выдали nmproda."
            "Можно доверять бос сторе топ."
        ];

        async function loadData() {
            try {
                const url = `https://docs.google.com/spreadsheets/d/1q9vPlWM9t934ACzIwbZU4_EDtvpJdfO09-jodyIi9Ew/export?format=csv`;
                const res = await fetch(url);
                const text = await res.text();
                const lines = text.split(/\r?\n/).slice(1);
                products = lines.map((line, i) => {
                    const cols = line.split(/[,;](?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    const clean = (s) => s ? s.replace(/^"|"$/g, '').trim() : '';
                    return { ID: i, Category: clean(cols[0]), Name: clean(cols[1]), Price: parseFloat(clean(cols[2])) || 0, Description: clean(cols[3]), Image: clean(cols[4]) };
                }).filter(p => p.Name && p.Price > 0);
                renderPage();
            } catch (e) { document.getElementById('main-content').innerHTML = "<div class='text-center mt-20 opacity-30 italic'>Синхронизация...</div>"; }
        }

        function renderPage() {
            const main = document.getElementById('main-content');
            main.innerHTML = "";
            if (currentPage === 'shop') {
                const cats = ['Bce', ...new Set(products.map(p => p.Category))];
                let html = `<div class="flex gap-2 overflow-x-auto mb-6 pb-2 no-scrollbar px-2 animate-fade">${cats.map(c => `<button onclick="setCat('${c}')" class="cat-btn ${currentCat === c ? 'active' : ''}">${c}</button>`).join('')}</div>`;
                html += `<div class="grid grid-cols-2 gap-4 animate-fade">`;
                products.filter(p => currentCat === 'Bce' || p.Category === currentCat).forEach(p => {
                    const pIdx = products.indexOf(p);
                    html += `<div class="glass p-4 rounded-[30px] flex flex-col h-full border-white/5">
                        <img src="${p.Image}" class="w-full aspect-square object-cover rounded-[22px] mb-3">
                        <h3 class="text-[10px] font-black uppercase text-yellow-500 mb-1 px-1 italic">${p.Name}</h3>
                        <p class="text-[8px] text-gray-500 mb-4 flex-1 px-1 italic line-clamp-2">${p.Description}</p>
                        <div class="flex flex-col gap-2 bg-black/40 p-2 rounded-xl border border-white/5 mt-auto">
                            <span class="text-white font-black text-[10px] italic text-center">${p.Price}₽</span>
                            <div class="flex items-center justify-between gap-1">
                                <input type="number" id="qty-${pIdx}" value="1" min="1" class="w-full bg-white/5 text-white text-[11px] text-center outline-none font-black py-1 rounded-md border border-white/10">
                                <button onclick="addToCart(${pIdx})" class="bg-yellow-500 text-black w-8 h-8 rounded-lg font-black btn-click flex items-center justify-center shadow-lg">+</button>
                            </div>
                        </div>
                    </div>`;
                });
                main.innerHTML = html + `</div>`;
            } else if (currentPage === 'reviews') {
                main.innerHTML = `<div class="space-y-4 animate-fade">${reviewsData.map(t => `<div class="glass p-6 rounded-[30px] border-l-4 border-yellow-500"><p class="text-white text-[11px] italic leading-relaxed">"${t}"</p></div>`).join('')}</div>`;
            } else if (currentPage === 'ref') {
                main.innerHTML = `<div class="mt-10 text-center animate-fade"><div class="glass p-8 rounded-[40px] border-yellow-500/20"><div class="text-4xl mb-6">🎁</div><h2 class="text-2xl font-black italic text-yellow-500 uppercase mb-4">Приведи друга</h2><p class="text-white text-sm italic mb-6">Друг покупает — ты получаешь <span class="text-yellow-500 font-black">СКИДКУ</span> на следующий заказ!</p><button onclick="copyText('https://t.me/твой_бот', 'Ссылка скопирована!')" class="w-full py-4 bg-yellow-500 text-black rounded-2xl font-black uppercase text-[11px] btn-click">Получить ссылку</button></div></div>`;
            } else if (currentPage === 'support') {
                main.innerHTML = `<div class="space-y-4 mt-10 animate-fade"><button onclick="window.location.href='https://t.me/nmproda'" class="w-full glass p-8 rounded-[35px] flex items-center gap-6 active:scale-95 transition-all"><div class="bg-yellow-500 p-4 rounded-xl text-black font-black text-xl">M</div><div class="text-left"><p class="font-black italic text-lg text-yellow-500 uppercase">Менеджер</p><p class="text-[9px] text-gray-400 uppercase font-black">@nmproda</p></div></button></div>`;
            }
        }

        function setCat(c) { currentCat = c; renderPage(); if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light'); }
        function changePage(p) { currentPage = p; document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); document.getElementById('nav-'+p).classList.add('active'); renderPage(); if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium'); }

        function addToCart(idx) {
            const qtyInput = document.getElementById(`qty-${idx}`);
            const qty = parseInt(qtyInput.value) || 1;
            for(let i = 0; i < qty; i++) {
                cart.push(products[idx]);
            }
            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            qtyInput.value = 1;
            updateUI();
        }

        function updateUI() {
            const total = cart.reduce((s, p) => s + p.Price, 0);
            document.getElementById('total-price').innerText = total + ' ₽';
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('checkout-bar').classList.toggle('hidden', cart.length === 0);
        }

        function copyText(txt, msg) {
            const el = document.createElement('textarea'); el.value = txt; document.body.appendChild(el);
            el.select(); document.execCommand('copy'); document.body.removeChild(el);
            tg.showAlert(msg);
            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        }

        async function confirmOrder() {
            const total = cart.reduce((s, p) => s + p.Price, 0);
            const user = tg.initDataUnsafe.user || {first_name: "BOSS CLIENT", id: "0"};
            
            // Группируем товары для красивого списка
            const counts = {};
            cart.forEach(p => counts[p.Name] = (counts[p.Name] || 0) + 1);
            const itemsList = Object.entries(counts).map(([name, count]) => `• <b>${name}</b> x${count}`).join('\n');

            const text = `🚀 <b>НОВЫЙ ЗАКАЗ</b>\n\n👤 Клиент: <b>${user.first_name}</b>\n🆔 ID: <code>${user.id}</code>\n\n🛒 Товары:\n${itemsList}\n\n💰 Итого: <b>${total} ₽</b>`;
            
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: ADMIN_ID, text: text, parse_mode: 'HTML' })
                });
                document.getElementById('pay-modal').classList.remove('hidden');
                cart = []; updateUI();
            } catch (e) { tg.showAlert("Ошибка связи с ботом!"); }
        }

        loadData();
    </script>
</body>
</html>
